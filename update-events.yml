name: 更新巴哈姆特動漫活動

on:
  workflow_dispatch:
  schedule:
    # 台灣時間每天上午 8:17（UTC 00:17）
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-bahamut-events
  cancel-in-progress: false

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: 下載儲存庫
        uses: actions/checkout@v6

      - name: 安裝 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 執行日期解析自我測試
        run: SELF_TEST=1 node scripts/update-events.mjs

      - name: 讀取並篩選巴哈姆特近期活動
        run: node scripts/update-events.mjs

      - name: 儲存更新結果
        shell: bash
        run: |
          if git diff --quiet -- events.json; then
            echo "events.json 沒有變更。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add events.json
          git commit -m "更新近期動漫活動並移除過期資料"
          git push
