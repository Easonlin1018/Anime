<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>台灣動漫活動雷達｜巴哈姆特測試版</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-2: #111827;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #8b5cf6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        .container {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            margin: 8px 0 6px;
            text-align: center;
            font-size: 25px;
            color: #c4b5fd;
        }

        .subtitle {
            margin: 0 0 20px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .panel {
            margin-bottom: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--card);
        }

        .status {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 13px;
            line-height: 1.6;
        }

        .status-dot {
            width: 11px;
            height: 11px;
            flex: 0 0 11px;
            margin-top: 5px;
            border-radius: 50%;
            background: var(--warning);
        }

        .status-dot.success {
            background: var(--success);
        }

        .status-dot.error {
            background: var(--danger);
        }

        .filters {
            display: grid;
            grid-template-columns: 1.6fr 1fr 1fr;
            gap: 8px;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            color: var(--text);
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 9px;
        }

        .count {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
        }

        .event-card {
            margin-bottom: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            background: var(--card);
        }

        .event-title {
            margin: 0 0 9px;
            font-size: 16px;
            line-height: 1.5;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 9px;
        }

        .badge {
            padding: 3px 7px;
            border-radius: 999px;
            background: #312e81;
            color: #ddd6fe;
            font-size: 11px;
        }

        .badge.location {
            background: #164e63;
            color: #a5f3fc;
        }

        .meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .summary {
            margin: 10px 0;
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.65;
        }

        .verify {
            margin: 9px 0;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(245, 158, 11, 0.12);
            color: #fcd34d;
            font-size: 12px;
            line-height: 1.5;
        }

        .source-link {
            display: inline-block;
            margin-top: 4px;
            padding: 8px 11px;
            border-radius: 8px;
            color: white;
            background: #2563eb;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
        }

        .empty {
            padding: 28px 16px;
            color: var(--muted);
            text-align: center;
            border: 1px dashed var(--border);
            border-radius: 12px;
            line-height: 1.7;
        }

        @media (max-width: 650px) {
            .filters {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🇹🇼 台灣動漫活動雷達</h1>

    <p class="subtitle">
        巴哈姆特 GNN 官方 RSS 測試版<br>
        自動篩選快閃店、主題咖啡廳、展覽及見面會消息
    </p>

    <section class="panel">
        <div class="status">
            <span
                id="status-dot"
                class="status-dot"
            ></span>

            <div>
                <strong id="status-title">
                    正在讀取 events.json…
                </strong>

                <div id="status-detail">
                    請稍候
                </div>
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="filters">
            <input
                id="keyword-filter"
                type="search"
                placeholder="搜尋作品或活動名稱"
            >

            <select id="location-filter">
                <option value="">全部地區</option>
            </select>

            <select id="type-filter">
                <option value="">全部類型</option>
            </select>
        </div>

        <div
            id="result-count"
            class="count"
        ></div>
    </section>

    <main id="event-list"></main>
</div>

<script>
    let allEvents = [];

    const eventList =
        document.getElementById("event-list");

    const resultCount =
        document.getElementById("result-count");

    const keywordFilter =
        document.getElementById("keyword-filter");

    const locationFilter =
        document.getElementById("location-filter");

    const typeFilter =
        document.getElementById("type-filter");

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
        if (!value) {
            return "日期不明";
        }

        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
            return "日期不明";
        }

        return new Intl.DateTimeFormat(
            "zh-TW",
            {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                timeZone: "Asia/Taipei"
            }
        ).format(date);
    }

    function setStatus(meta) {
        const dot =
            document.getElementById("status-dot");

        const title =
            document.getElementById("status-title");

        const detail =
            document.getElementById("status-detail");

        dot.className = "status-dot";

        if (meta.fetchStatus === "success") {
            dot.classList.add("success");
            title.textContent = "自動更新正常";

            detail.textContent =
                `最後成功：${formatDate(
                    meta.lastSuccessfulUpdateAt
                )}｜目前 ${meta.storedEventCount || 0} 則消息`;
        } else if (meta.fetchStatus === "error") {
            dot.classList.add("error");
            title.textContent =
                "本次讀取失敗，已保留舊資料";

            detail.textContent =
                meta.lastError || meta.note || "";
        } else {
            title.textContent =
                "尚未執行自動更新";

            detail.textContent =
                meta.note || "請先執行 GitHub Actions。";
        }
    }

    function fillFilterOptions() {
        const locations = [
            ...new Set(
                allEvents.flatMap(
                    event =>
                        Array.isArray(event.locations)
                            ? event.locations
                            : []
                )
            )
        ].sort();

        const types = [
            ...new Set(
                allEvents
                    .map(event => event.type)
                    .filter(Boolean)
            )
        ].sort();

        locationFilter.innerHTML =
            '<option value="">全部地區</option>' +
            locations
                .map(location =>
                    `<option value="${escapeHtml(location)}">` +
                    `${escapeHtml(location)}` +
                    `</option>`
                )
                .join("");

        typeFilter.innerHTML =
            '<option value="">全部類型</option>' +
            types
                .map(type =>
                    `<option value="${escapeHtml(type)}">` +
                    `${escapeHtml(type)}` +
                    `</option>`
                )
                .join("");
    }

    function renderEvents() {
        const keyword =
            keywordFilter.value.trim().toLowerCase();

        const location =
            locationFilter.value;

        const type =
            typeFilter.value;

        const filtered = allEvents.filter(event => {
            const text =
                `${event.title || ""} ` +
                `${event.summary || ""}`.toLowerCase();

            const matchesKeyword =
                !keyword ||
                text.includes(keyword);

            const matchesLocation =
                !location ||
                (
                    Array.isArray(event.locations) &&
                    event.locations.includes(location)
                );

            const matchesType =
                !type ||
                event.type === type;

            return (
                matchesKeyword &&
                matchesLocation &&
                matchesType
            );
        });

        resultCount.textContent =
            `顯示 ${filtered.length} / ${allEvents.length} 則活動消息`;

        if (filtered.length === 0) {
            eventList.innerHTML = `
                <div class="empty">
                    目前沒有符合條件的活動消息。<br>
                    第一次使用時，請先到 GitHub Actions 手動執行更新。
                </div>
            `;

            return;
        }

        eventList.innerHTML =
            filtered.map(event => {
                const locations =
                    Array.isArray(event.locations)
                        ? event.locations
                        : [];

                return `
                    <article class="event-card">
                        <h2 class="event-title">
                            ${escapeHtml(event.title)}
                        </h2>

                        <div class="badges">
                            <span class="badge">
                                ${escapeHtml(event.type || "活動")}
                            </span>

                            ${locations.map(location => `
                                <span class="badge location">
                                    📍 ${escapeHtml(location)}
                                </span>
                            `).join("")}
                        </div>

                        <div class="meta">
                            📰 消息發布：
                            ${escapeHtml(formatDate(event.publishedAt))}
                            ｜資料來源：
                            ${escapeHtml(event.source || "巴哈姆特 GNN")}
                        </div>

                        ${
                            event.summary
                                ? `
                                    <p class="summary">
                                        ${escapeHtml(event.summary)}
                                    </p>
                                `
                                : ""
                        }

                        <div class="verify">
                            ⚠️ ${
                                escapeHtml(
                                    event.verification ||
                                    "活動詳情請以原文及主辦方公告為準"
                                )
                            }
                        </div>

                        <a
                            class="source-link"
                            href="${escapeHtml(event.url)}"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            前往巴哈姆特查看原文
                        </a>
                    </article>
                `;
            }).join("");
    }

    async function loadEvents() {
        try {
            const response = await fetch(
                `events.json?t=${Date.now()}`,
                {
                    cache: "no-store"
                }
            );

            if (!response.ok) {
                throw new Error(
                    `events.json HTTP ${response.status}`
                );
            }

            const data = await response.json();

            allEvents =
                Array.isArray(data.events)
                    ? data.events
                    : [];

            setStatus(data.meta || {});
            fillFilterOptions();
            renderEvents();
        } catch (error) {
            document
                .getElementById("status-dot")
                .classList.add("error");

            document
                .getElementById("status-title")
                .textContent =
                "無法讀取 events.json";

            document
                .getElementById("status-detail")
                .textContent =
                "請從 GitHub Pages 開啟此頁，不要直接雙擊本機 HTML。";

            eventList.innerHTML = `
                <div class="empty">
                    ${escapeHtml(error.message)}
                </div>
            `;
        }
    }

    keywordFilter.addEventListener(
        "input",
        renderEvents
    );

    locationFilter.addEventListener(
        "change",
        renderEvents
    );

    typeFilter.addEventListener(
        "change",
        renderEvents
    );

    loadEvents();
</script>
</body>
</html>
