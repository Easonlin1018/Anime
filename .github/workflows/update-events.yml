name: 更新多來源動漫活動 v10.5.1

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: anime-events-data-write
  cancel-in-progress: false

jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 下載最新 main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: 安裝 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 確認使用最新版本
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: 執行日期解析自我測試
        run: SELF_TEST=1 node scripts/update-events.mjs

      - name: 讀取多來源活動資訊
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: node scripts/update-events.mjs

      - name: 儲存更新結果
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git add events.json

            if git diff --cached --quiet; then
              echo "events.json 沒有變更"
              exit 0
            fi

            git commit -m "更新多來源動漫活動資料"

            if git push origin HEAD:main; then
              echo "活動資料已成功寫入 main"
              exit 0
            fi

            echo "main 已被其他流程更新，準備以最新資料重新更新（第 ${attempt} 次）"

            if [ "$attempt" -ge 3 ]; then
              echo "三次推送皆失敗"
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main
            node scripts/update-events.mjs
            sleep $((attempt * 3))
          done
