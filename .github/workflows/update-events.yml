name: 更新巴哈姆特動漫活動

on:
  workflow_dispatch:
  schedule:
    # 台灣時間每天上午 8:17（UTC 00:17）
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-bahamut-events
  cancel-in-progress: false

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: 下載儲存庫
        uses: actions/checkout@v7

      - name: 安裝 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 讀取巴哈姆特 GNN RSS
        run: node scripts/update-events.mjs

      - name: 儲存更新結果
        shell: bash
        run: |
          if git diff --quiet -- events.json; then
            echo "events.json 沒有變更，不需要提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add events.json
          git commit -m "自動更新巴哈姆特動漫活動"
          git push

