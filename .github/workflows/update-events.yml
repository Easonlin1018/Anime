name: 更新多來源動漫活動

on:
  workflow_dispatch:
  schedule:
    # 台灣時間每天上午 8:17（UTC 00:17）
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-anime-events
  cancel-in-progress: false

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: 下載儲存庫
        uses: actions/checkout@v6

      - name: 安裝 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 執行日期解析自我測試
        run: SELF_TEST=1 node scripts/update-events.mjs

      - name: 讀取多來源活動資訊
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: node scripts/update-events.mjs

      - name: 儲存更新結果
        shell: bash
        run: |
          if git diff --quiet -- events.json; then
            echo "events.json 沒有變更。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add events.json
          git commit -m "更新多來源動漫活動與收藏功能"
          git push

