name: 🛰️ 每日全自動動漫快閃店雷達同步

on:
  schedule:
    - cron: '0 16 * * *' # 每天台灣時間半夜 12 點自動執行
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 複製專案代碼
      uses: actions/checkout@v3

    - name: 🐍 初始化 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 📦 安裝連線套件
      run: pip install requests

    - name: 🛰️ 執行全網雷達掃描
      run: python update_radar.py

    - name: 📤 自動提交並更新網頁
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ 雷達自動同步：更新線下最新快閃店資料" && git push)

