<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v8.5</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: var(--accent-color); font-size: 24px; margin-bottom: 20px; }
        .section { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--accent-color); display: flex; justify-content: space-between; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); box-sizing: border-box; }
        button { background-color: #2563eb; color: white; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; }
        button:active { filter: brightness(0.8); }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        .anime-item { background: var(--bg-color); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border-color); }
        .anime-title { font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
        .anime-meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .btn-group button { padding: 6px; font-size: 12px; margin: 0; width: auto; flex: 1; min-width: 55px; }
        .btn-edit { background-color: #0284c7; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .btn-scan { background-color: #7c3aed; margin-bottom: 12px; font-size: 14px; }
        .btn-backup { background-color: #0d9488; }
        .toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); padding: 20px; border-radius: 12px; border: 2px solid var(--accent-color); text-align: center; display: none; z-index: 100; width: 80%; max-width: 300px; line-height: 1.6; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 全自動動漫追番基地 v8.5</h1>

    <div class="section">
        <div class="section-title">➕ 一鍵自動化新增 (智慧格式分流版)</div>
        <input type="text" id="search-input" placeholder="輸入動漫稱呼（外傳/OVA將自動精準標記）">
        <button id="search-btn" onclick="searchAnime()">🔍 智慧網格搜尋</button>
    </div>

    <div class="section">
        <div class="section-title">⚙️ 資料控制與智慧雷達</div>
        <button class="btn-scan" onclick="manualScanSequels()">🛰️ 立即手動主動偵測續作</button>
        <div style="display: flex; gap: 10px;">
            <button class="btn-backup" onclick="exportData()" style="margin-bottom:0; flex:1;">📤 匯出資料檔案</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn-edit" onclick="document.getElementById('import-file').click()" style="margin-bottom:0; flex:1;">📥 匯入檔案還原</button>
        </div>
    </div>

    <div class="section"><div class="section-title">⚡ 正在連載 / 正在追</div><div id="list-watching"></div></div>
    <div class="section"><div class="section-title">🎬 官方已完結（補番中）</div><div id="list-backlog"></div></div>
    <div class="section"><div class="section-title">⏳ 敲碗等待開播</div><div id="list-waiting"></div></div>
    <div class="section"><div class="section-title">🎉 已追完 / 看完了</div><div id="list-completed"></div></div>
</div>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px; width:auto; padding:5px 15px; background-color:#475569;" onclick="closeToast()">關閉</button>
</div>

<script>
let animeList = JSON.parse(localStorage.getItem('anime_list_v8_5')) || [];
let toastTimer = null;

// 完美跨版本數據自動無縫繼承
const oldKeys = ['anime_list_v8_4', 'anime_list_v8_3', 'anime_list_v8_2', 'anime_list_v8_1', 'anime_list_v8_0', 'anime_list_v7_9', 'anime_list_v7_8'];
if (animeList.length === 0) {
    for (let key of oldKeys) {
        if (localStorage.getItem(key)) { try { animeList = JSON.parse(localStorage.getItem(key)); break; } catch(e){} }
    }
    localStorage.setItem('anime_list_v8_5', JSON.stringify(animeList));
}

const searchBtn = document.getElementById('search-btn');

function saveAndRender() {
    localStorage.setItem('anime_list_v8_5', JSON.stringify(animeList));
    renderList();
}

function showToast(msg) { 
    clearTimeout(toastTimer);
    document.getElementById('toast-msg').innerHTML = msg; 
    document.getElementById('toast-box').style.display = 'block'; 
    toastTimer = setTimeout(closeToast, 3500); 
}
function closeToast() { document.getElementById('toast-box').style.display = 'none'; }

async function translateText(text, toLang = "zh-TW") {
    try {
        const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await response.json();
        if (data && data[0] && data[0][0] && data[0][0][0]) return data[0][0][0];
    } catch (e) { console.error(e); }
    return null;
}

function hasJapaneseKana(str) { return /[\u3040-\u309F\u30A0-\u30FF]/.test(str); }

// ✨ 核心升級：動態格式分流與核心標籤引擎
function generateSmartTitle(media, parentChineseTitle, wikiZhTitle, googleZhTitle) {
    let combinedText = `${media.title.native} ${media.title.english || ''} ${media.title.romaji || ''}`.toLowerCase();
    let coreTitle = wikiZhTitle || googleZhTitle || media.title.native;
    
    // 如果存在父級名稱，繼承其核心乾淨名稱，確保系列命名的一致性
    if (parentChineseTitle) {
        coreTitle = parentChineseTitle.replace(/\s*第[一二三四五六七八九十0-9]+[季期]\s*$/g, "")
                                      .replace(/\s*Season\s*[0-9]+\s*$/gi, "")
                                      .replace(/\s*\(.*\)$/g, "")
                                      .trim();
    }
    
    // 1. 判定標準季度續作
    if (combinedText.includes("season 2") || combinedText.includes("2nd season") || combinedText.includes("第2期") || combinedText.includes("第二季") || combinedText.includes("續")) {
        return coreTitle + " 第二季";
    }
    if (combinedText.includes("season 3") || combinedText.includes("3rd season") || combinedText.includes("第3期") || combinedText.includes("第三季")) {
        return coreTitle + " 第三季";
    }
    if (combinedText.includes("season 4") || combinedText.includes("4th season") || combinedText.includes("第4期") || combinedText.includes("第四季")) {
        return coreTitle + " 第四季";
    }
    
    // 2. 如果是雷達觸發的關聯作品，但不是標準季度，依據格式(Format)與年份進行精準標籤化
    if (parentChineseTitle) {
        let yearSuffix = (media.startDate && media.startDate.year) ? ` - ${media.startDate.year}年` : "";
        if (media.format === 'OVA') return `${coreTitle} (OVA${yearSuffix})`;
        if (media.format === 'SPECIAL') return `${coreTitle} (特別篇${yearSuffix})`;
        if (media.format === 'MOVIE') return `${coreTitle} (劇場版${yearSuffix})`;
        if (media.format === 'ONA') return `${coreTitle} (ONA外傳${yearSuffix})`;
        
        // 分割放送或特殊TV續篇
        return `${coreTitle} (續篇${yearSuffix})`;
    }
    
    return coreTitle;
}

// 🎬 智慧搜尋引擎 v8.5 (引進 format 與雙軌時間軸大數據)
async function searchAnime(keyword = null, isQuiet = false, parentChineseTitle = null, targetId = null) {
    let input = keyword || document.getElementById('search-input').value.trim();
    
    if(!input && !targetId) {
        if (!isQuiet) showToast("⚠️ 請先輸入動漫名稱再點擊搜尋哦！");
        return false;
    }
    
    if (!isQuiet && !targetId) {
        searchBtn.disabled = true;
        searchBtn.innerText = "⚡ 正在連線維基網路破譯中...";
    }

    let wikiJaTitle = null;
    let wikiZhTitle = null;

    if (!targetId) {
        try {
            const wikiSearchUrl = `https://zh.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(input)}&format=json&origin=*`;
            const searchRes = await fetch(wikiSearchUrl);
            const searchData = await searchRes.json();
            
            if (searchData.query && searchData.query.search && searchData.query.search.length > 0) {
                wikiZhTitle = searchData.query.search[0].title;
                const langUrl = `https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiZhTitle)}&prop=langlinks&lllang=ja&format=json&origin=*`;
                const langRes = await fetch(langUrl);
                const langData = await langRes.json();
                const pages = langData.query.pages;
                for (let pageId in pages) {
                    if (pages[pageId].langlinks && pages[pageId].langlinks.length > 0) {
                        wikiJaTitle = pages[pageId].langlinks[0]['*'];
                        break;
                    }
                }
            }
        } catch (e) { console.error(e); }
    }

    // GraphQL 注入 format 與 startDate 數據
    let query, variables;
    if (targetId) {
        query = `query ($id: Int) { Media (id: $id, type: ANIME) { id format title { native english romaji } synonyms status episodes startDate { year month day } relations { edges { relationType node { id format title { native english romaji } status } } } } }`;
        variables = { id: targetId };
    } else {
        let finalSearchKey = wikiJaTitle || input;
        query = `query ($search: String) { Media (search: $search, type: ANIME) { id format title { native english romaji } synonyms status episodes startDate { year month day } relations { edges { relationType node { id format title { native english romaji } status } } } } }`;
        variables = { search: finalSearchKey };
    }

    try {
        let response = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, variables })
        });
        let resData = await response.json();
        let media = resData.data ? resData.data.Media : null;

        if (!media && !targetId) {
            let translatedJa = await translateText(input, "ja");
            if (translatedJa) {
                response = await fetch('https://graphql.anilist.co', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: { search: translatedJa } }) });
                resData = await response.json(); media = resData.data ? resData.data.Media : null;
            }
        }

        if (!media && !targetId) {
            let translatedEn = await translateText(input, "en");
            if (translatedEn) {
                response = await fetch('https://graphql.anilist.co', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: { search: translatedEn } }) });
                resData = await response.json(); media = resData.data ? resData.data.Media : null;
            }
        }

        if(!media) {
            if (!isQuiet) showToast("❌ 智慧網格搜尋失敗，找不到該作品。");
        } else {
            if(animeList.some(a => a.id === media.id)) {
                if(!keyword && !targetId && !isQuiet) showToast("💡 清單中已經有這部作品囉！");
                if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 智慧網格搜尋"; }
                return true;
            }

            let googleZh = null;
            if (!wikiZhTitle) {
                if (media.synonyms && media.synonyms.length > 0) wikiZhTitle = media.synonyms.find(s => /[\u4e00-\u9fa5]/.test(s) && !hasJapaneseKana(s));
                if (!wikiZhTitle) googleZh = await translateText(media.title.native, "zh-TW");
            }

            // 呼叫全新的格式判別引擎
            let finalTitle = generateSmartTitle(media, parentChineseTitle, wikiZhTitle, googleZh);

            let category = (media.status === 'NOT_YET_RELEASED') ? 'waiting' : ((media.status === 'FINISHED') ? 'backlog' : 'watching');
            let airDate = (media.startDate && media.startDate.year) ? `${media.startDate.year}年${media.startDate.month || '?'}月` : "未定";

            const newAnime = { id: media.id, title: finalTitle, status: media.status, episodes: media.episodes || "??", watched: 0, category: category, airDate: airDate, relations: media.relations ? media.relations.edges : [] };
            animeList.push(newAnime); saveAndRender();
            if(!keyword && !isQuiet) document.getElementById('search-input').value = "";
            
            let catNames = { waiting: '⏳ 敲碗等待開播', watching: '⚡ 正在連載 / 正在追', backlog: '🎬 官方已完結（補番中）' };
            if (!isQuiet) showToast(`🛰️ 偵測並成功加入作品：<br><b style="color:#60a5fa;">《${finalTitle}》</b><br>已依狀態放入 <b>${catNames[category]}</b> ！`);

            if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 智慧網格搜尋"; }

            // 背景安靜執行續作與外傳深度追蹤
            if (category !== 'waiting') checkAndAddSequel(newAnime, true);
            
            return true;
        }
    } catch (error) { 
        if (!isQuiet) showToast("❌ 發生未知連線錯誤。"); 
    }
    
    if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 智慧網格搜尋"; }
    return false;
}

async function checkAndAddSequel(anime, isQuiet = false) {
    if (!anime || !anime.relations || anime.relations.length === 0) return false;
    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
    if (sequelEdge) {
        const sequelNode = sequelEdge.node;
        if (!animeList.some(a => a.id === sequelNode.id)) {
            return await searchAnime(null, isQuiet, anime.title, sequelNode.id);
        }
    }
    return false;
}

async function manualScanSequels() {
    showToast("🛰️ 正在手動啟動高精度雷達...<br>正在逐一比對【已追完】清單中的大數據續作情報...");
    let foundAny = false;
    
    for (let anime of animeList) {
        if (anime && anime.category === 'completed') {
            const query = `query ($id: Int) { Media (id: $id, type: ANIME) { id format title { native english romaji } startDate { year } relations { edges { relationType node { id format title { native english romaji } status } } } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { id: anime.id } })
                });
                const resData = await response.json();
                const media = resData.data ? resData.data.Media : null;
                if (media && media.relations) {
                    anime.relations = media.relations.edges;
                    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
                    if (sequelEdge) {
                        const sequelNode = sequelEdge.node;
                        if (!animeList.some(a => a.id === sequelNode.id)) {
                            let success = await searchAnime(null, true, anime.title, sequelNode.id);
                            if(success) foundAny = true;
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }
    }
    
    if (!foundAny) {
        setTimeout(() => { showToast("🛰️ 雷達全網掃描完畢！<br>目前清單內的所有已追完動漫，皆無未入庫的全新關聯續作。"); }, 1200);
    }
}

async function autoScanSequels() {
    for (let anime of animeList) {
        if (anime && anime.category === 'completed') {
            const query = `query ($id: Int) { Media (id: $id, type: ANIME) { id format title { native english romaji } startDate { year } relations { edges { relationType node { id format title { native english romaji } status } } } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { id: anime.id } })
                });
                const resData = await response.json();
                const media = resData.data ? resData.data.Media : null;
                if (media && media.relations) {
                    anime.relations = media.relations.edges;
                    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
                    if (sequelEdge) {
                        const sequelNode = sequelEdge.node;
                        if (!animeList.some(a => a.id === sequelNode.id)) {
                            await searchAnime(null, true, anime.title, sequelNode.id);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }
    }
}

function editTitle(id) { const anime = animeList.find(a => a.id === id); if (anime) { const newTitle = prompt(`請輸入新名字：`, anime.title); if (newTitle && newTitle.trim() !== "") { anime.title = newTitle.trim(); saveAndRender(); } } }

function moveCategory(id, newCat) { 
    const anime = animeList.find(a => a.id === id); 
    if(anime) { 
        if (anime.category === 'completed' && newCat === 'watching') anime.watched = 0; 
        anime.category = newCat; 
        if(newCat === 'completed') {
            anime.watched = anime.episodes; 
            checkAndAddSequel(anime, false);
        }
        saveAndRender(); 
    } 
}

function updateProgress(id, delta) { 
    const anime = animeList.find(a => a.id === id); 
    if(anime) { 
        anime.watched = Math.max(0, (Number(anime.watched) || 0) + delta); 
        if(anime.watched >= Number(anime.episodes)) {
            anime.category = 'completed'; 
            checkAndAddSequel(anime, false);
        }
        saveAndRender(); 
    } 
}

function deleteAnime(id) { animeList = animeList.filter(a => a.id !== id); saveAndRender(); }

function renderList() {
    const lists = { watching: '', backlog: '', waiting: '', completed: '' };
    if (!Array.isArray(animeList)) animeList = [];
    
    animeList.forEach(anime => {
        if (!anime) return;
        let actionButtons = (anime.category === 'watching' || anime.category === 'backlog') ? `<button onclick="updateProgress(${anime.id}, 1)">➕ 看了 1 集</button><button class="btn-next" onclick="moveCategory(${anime.id}, 'completed')">🎉 追完</button>` : (anime.category === 'waiting' ? `<div class="status-radar">🛰️ 智慧雷達自動監測中...</div>` : `<button onclick="moveCategory(${anime.id}, 'watching')">🔄 重看</button>`);
        const html = `<div class="anime-item"><div class="anime-title">${anime.title}</div><div class="anime-meta">${(anime.category === 'watching' || anime.category === 'backlog') ? `進度：${anime.watched} / ${anime.episodes} 集` : (anime.category === 'waiting' ? `預計開播：<span style="color:#f59e0b;font-weight:bold;">${anime.airDate}</span>` : `✨ 全 ${anime.episodes} 集觀看完畢`)}</div><div class="btn-group">${actionButtons}<button class="btn-edit" onclick="editTitle(${anime.id})">✏️ 改名</button><button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button></div></div>`;
        if(lists[anime.category] !== undefined) lists[anime.category] += html;
    });
    document.getElementById('list-watching').innerHTML = lists.watching || '<div style="color:#64748b;font-size:12px;">暫無連載中動漫</div>';
    document.getElementById('list-backlog').innerHTML = lists.backlog || '<div style="color:#64748b;font-size:12px;">暫無補番中動漫</div>';
    document.getElementById('list-waiting').innerHTML = lists.waiting || '<div style="color:#64748b;font-size:12px;">暫無敲碗中動漫</div>';
    document.getElementById('list-completed').innerHTML = lists.completed || '<div style="color:#64748b;font-size:12px;">暫無已追完動漫</div>';
}

function exportData() { if (animeList.length === 0) return; const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(animeList)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `anime_backup.json`); dl.click(); }
function importData(e) { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = function(evt) { try { const list = JSON.parse(evt.target.result); if (Array.isArray(list)) { animeList = list; saveAndRender(); } } catch(err) {} }; r.readAsText(file); }

renderList();
setTimeout(autoScanSequels, 1500);
</script>
</body>
</html>
