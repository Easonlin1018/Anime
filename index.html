<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v6.7</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:disabled { background-color: #475569; }
        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .anime-title { font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
        .anime-meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-group button { padding: 6px; font-size: 12px; margin: 0; width: auto; flex: 1; min-width: 60px; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .btn-scan { background-color: #7c3aed; }
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--accent-color);
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%; max-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 全自動動漫追番基地 v6.7</h1>

    <!-- 新增區塊 -->
    <div class="section">
        <div class="section-title">➕ 一鍵自動化新增</div>
        <input type="text" id="search-input" placeholder="輸入動漫關鍵字（如：艾莉同學）">
        <button id="search-btn" onclick="searchAnime()">🔍 自動搜尋並加入</button>
    </div>

    <!-- 1. 連載區 -->
    <div class="section">
        <div class="section-title">⚡ 正在連載 / 正在追</div>
        <div id="list-watching"></div>
    </div>

    <!-- 2. 補番區 -->
    <div class="section">
        <div class="section-title">🎬 官方已完結（補番中）</div>
        <div id="list-backlog"></div>
    </div>

    <!-- 3. 敲碗區 -->
    <div class="section">
        <div class="section-title">⏳ 敲碗等待開播</div>
        <div id="list-waiting"></div>
    </div>

    <!-- 4. 追完區 -->
    <div class="section">
        <div class="section-title">🎉 已追完 / 看完了</div>
        <div id="list-completed"></div>
    </div>
</div>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px; width:auto; padding:5px 15px;" onclick="closeToast()">關閉</button>
</div>

<script>
let animeList = JSON.parse(localStorage.getItem('anime_list_v6_7')) || [];

// 從舊版 v6.6 順暢轉移資料
if (animeList.length === 0 && localStorage.getItem('anime_list_v6_6')) {
    animeList = JSON.parse(localStorage.getItem('anime_list_v6_6'));
    localStorage.setItem('anime_list_v6_7', JSON.stringify(animeList));
}

const searchBtn = document.getElementById('search-btn');

function saveAndRender() {
    localStorage.setItem('anime_list_v6_7', JSON.stringify(animeList));
    renderList();
}

function showToast(msg) {
    document.getElementById('toast-msg').innerHTML = msg;
    document.getElementById('toast-box').style.display = 'block';
}
function closeToast() { document.getElementById('toast-box').style.display = 'none'; }

// 升級版搜尋：支援父級中文名稱傳遞、加入中文別名抓取
async function searchAnime(keyword = null, isQuiet = false, parentChineseTitle = null) {
    const input = keyword || document.getElementById('search-input').value.trim();
    if(!input) return;
    
    if (!isQuiet) {
        searchBtn.disabled = true;
        searchBtn.innerText = "⚡ 正在連網抓取資料...";
    }

    // 增加了 synonyms 的查詢
    const query = `
    query ($search: String) {
      Media (search: $search, type: ANIME) {
        id
        title { native english romaji }
        synonyms
        status
        episodes
        startDate { year month day }
        relations {
          edges {
            relationType
            node {
              id
              title { native }
              status
              startDate { year month day }
            }
          }
        }
      }
    }`;

    try {
        const response = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, variables: { search: input } })
        });
        const resData = await response.json();
        const media = resData.data.Media;

        if(!media) {
            if (!isQuiet) showToast("❌ 找不到該作品。請縮短關鍵字再試試。");
        } else {
            if(animeList.some(a => a.id === media.id)) {
                if(!keyword && !isQuiet) showToast("💡 清單中已經有這部作品囉！");
                if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 自動搜尋並加入"; }
                return;
            }

            // ✨ 核心中文化篩選邏輯
            let chosenTitle = media.title.native;
            if (media.synonyms && media.synonyms.length > 0) {
                // 利用正規表達式尋找含有中文字（Hanzi）的別名
                const chiSyn = media.synonyms.find(s => /[\u4e00-\u9fa5]/.test(s));
                if (chiSyn) chosenTitle = chiSyn;
            }
            
            // 如果沒撈到中文別名，但是有上游給的中文名（通常是自動續作），就自動組合
            if (chosenTitle === media.title.native) {
                if (parentChineseTitle) {
                    chosenTitle = parentChineseTitle + " 第二季";
                } else if (keyword && /[\u4e00-\u9fa5]/.test(keyword)) {
                    chosenTitle = keyword; // 如果使用者輸入的就是中文，直接沿用
                }
            }

            let category = 'watching';
            if(media.status === 'NOT_YET_RELEASED') category = 'waiting';
            if(media.status === 'FINISHED') category = 'backlog';

            let airDate = "未定";
            if(media.startDate && media.startDate.year) {
                airDate = `${media.startDate.year}年${media.startDate.month || '?'}月`;
            }

            const newAnime = {
                id: media.id,
                title: chosenTitle, // 儲存漂亮的中文標題！
                status: media.status,
                episodes: media.episodes || "??",
                watched: 0,
                category: category,
                airDate: airDate,
                relations: media.relations ? media.relations.edges : []
            };

            animeList.push(newAnime);
            saveAndRender();
            if(!keyword && !isQuiet) document.getElementById('search-input').value = "";
            
            if (category !== 'waiting') {
                await checkAndAddSequel(newAnime, true);
            }
        }
    } catch (error) {
        if (!isQuiet) showToast("❌ 連線失敗，請檢查網路。");
    }
    if (!isQuiet) {
        searchBtn.disabled = false;
        searchBtn.innerText = "🔍 自動搜尋並加入";
    }
}

async function checkAndAddSequel(anime, isQuiet = false) {
    if (!anime.relations || anime.relations.length === 0) return;
    
    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
    if (sequelEdge) {
        const sequelNode = sequelEdge.node;
        if (!animeList.some(a => a.id === sequelNode.id)) {
            if (!isQuiet) {
                showToast(`🎉 偵測到有全新續作！<br>已自動將續作加入【敲碗等待開播】。`);
            }
            // 💡 關鍵傳遞：將目前的中文名傳給下一季，確保下一季也能完美中文化
            await searchAnime(sequelNode.title.native, true, anime.title);
        }
    }
}

function moveCategory(id, newCat) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        if (anime.category === 'completed' && newCat === 'watching') {
            anime.watched = 0;
        }
        anime.category = newCat;
        if(newCat === 'completed') {
            anime.watched = anime.episodes;
            checkAndAddSequel(anime, false);
        }
        saveAndRender();
    }
}

function updateProgress(id, delta) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        let currentWatched = Number(anime.watched) || 0;
        anime.watched = Math.max(0, currentWatched + delta);
        const totalEps = Number(anime.episodes);
        if(!isNaN(totalEps) && anime.watched >= totalEps) {
            anime.category = 'completed';
            checkAndAddSequel(anime, false);
        }
        saveAndRender();
    }
}

async function forceCheck(id) {
    const anime = animeList.find(a => a.id === id);
    if (anime) {
        showToast(`🛰️ 正在為《${anime.title}》強制雷達掃描續作...`);
        await checkAndAddSequel(anime, false);
    }
}

function deleteAnime(id) {
    animeList = animeList.filter(a => a.id !== id);
    saveAndRender();
}

function renderList() {
    const lists = { watching: '', backlog: '', waiting: '', completed: '' };
    
    animeList.forEach(anime => {
        let actionButtons = '';
        if(anime.category === 'watching' || anime.category === 'backlog') {
            actionButtons = `
                <button onclick="updateProgress(${anime.id}, 1)">➕ 看了 1 集</button>
                <button class="btn-next" onclick="moveCategory(${anime.id}, 'completed')">🎉 追完</button>
            `;
        } else if(anime.category === 'waiting') {
            actionButtons = `<button class="btn-next" onclick="moveCategory(${anime.id}, 'watching')">📺 開播移至連載</button>`;
        } else if(anime.category === 'completed') {
            actionButtons = `
                <button onclick="moveCategory(${anime.id}, 'watching')">🔄 重看</button>
                <button class="btn-scan" onclick="forceCheck(${anime.id})">🛰️ 查續作</button>
            `;
        }

        const html = `
            <div class="anime-item">
                <div class="anime-title">${anime.title}</div>
                <div class="anime-meta">
                    ${(anime.category === 'watching' || anime.category === 'backlog') ? `進度：${anime.watched} / ${anime.episodes} 集` : ''}
                    ${anime.category === 'waiting' ? `預計開播：<span style="color:#f59e0b;font-weight:bold;">${anime.airDate}</span>` : ''}
                    ${anime.category === 'completed' ? `✨ 全 ${anime.episodes} 集觀看完畢` : ''}
                </div>
                <div class="btn-group">
                    ${actionButtons}
                    <button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button>
                </div>
            </div>
        `;
        if(lists[anime.category] !== undefined) lists[anime.category] += html;
    });

    document.getElementById('list-watching').innerHTML = lists.watching || '<div style="color:#64748b;font-size:12px;">暫無連載中動漫</div>';
    document.getElementById('list-backlog').innerHTML = lists.backlog || '<div style="color:#64748b;font-size:12px;">暫無補番中動漫</div>';
    document.getElementById('list-waiting').innerHTML = lists.waiting || '<div style="color:#64748b;font-size:12px;">暫無敲碗中動漫</div>';
    document.getElementById('list-completed').innerHTML = lists.completed || '<div style="color:#64748b;font-size:12px;">暫無已追完動漫</div>';
}

// 🚀 特殊核心功能：自動把原本在畫面上的舊日文標題轉化成中文
async function autoTranslateExisting() {
    let changed = false;
    for (let anime of animeList) {
        // 如果偵測到名字裡包含日文假名（平假名/片假名），就代表它是舊的日文資料
        if (/[\u3040-\u309F\u30A0-\u30FF]/.test(anime.title)) {
            const query = `query ($id: Int) { Media (id: $id, type: ANIME) { title { native } synonyms } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { id: anime.id } })
                });
                const resData = await response.json();
                const media = resData.data.Media;
                if (media && media.synonyms) {
                    const chiSyn = media.synonyms.find(s => /[\u4e00-\u9fa5]/.test(s));
                    if (chiSyn) {
                        anime.title = chiSyn;
                        changed = true;
                    } else if (anime.title.includes("Season 2") || anime.title.includes("第2期")) {
                        // 如果是第二季且沒中文，就用通俗中文暫代
                        anime.title = "鄰座的艾莉同學 第二季";
                        changed = true;
                    }
                }
            } catch (e) { console.error(e); }
        }
    }
    if (changed) {
        saveAndRender();
    }
}

renderList();
// 網頁載入後 1 秒鐘，偷偷在背景把所有日文名字自動洗成中文！
setTimeout(autoTranslateExisting, 1000);
</script>
</body>
</html>
