<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v6.0</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:disabled { background-color: #475569; }
        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .anime-title { font-weight: bold; margin-bottom: 6px; }
        .anime-meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-group button { padding: 6px; font-size: 12px; margin: 0; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--accent-color);
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%; max-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 全自動動漫追番基地 v6.0</h1>

    <!-- 新增區塊 -->
    <div class="section">
        <div class="section-title">➕ 一鍵自動化新增</div>
        <input type="text" id="search-input" placeholder="輸入動漫關鍵字（如：艾莉同學）">
        <button id="search-btn" onclick="searchAnime()">⚡ 正在連網抓取資料...</button>
    </div>

    <!-- 追番區塊 -->
    <div class="section">
        <div class="section-title">⚡ 正在連載 / 正在追</div>
        <div id="list-watching"></div>
    </div>

    <!-- 敲碗區塊 -->
    <div class="section">
        <div class="section-title">⏳ 敲碗等待開播</div>
        <div id="list-waiting"></div>
    </div>

    <!-- 完結區塊 -->
    <div class="section">
        <div class="section-title">🎉 已完結 / 追完</div>
        <div id="list-completed"></div>
    </div>
</div>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px; width:auto; padding:5px 15px;" onclick="closeToast()">關閉</button>
</div>

<script>
let animeList = JSON.parse(localStorage.getItem('anime_list_v6')) || [];
const searchBtn = document.getElementById('search-btn');
searchBtn.innerText = "🔍 自動搜尋並加入";

function saveAndRender() {
    localStorage.setItem('anime_list_v6', JSON.stringify(animeList));
    renderList();
}

function showToast(msg) {
    document.getElementById('toast-msg').innerHTML = msg;
    document.getElementById('toast-box').style.display = 'block';
}
function closeToast() { document.getElementById('toast-box').style.display = 'none'; }

async function searchAnime(keyword = null) {
    const input = keyword || document.getElementById('search-input').value.trim();
    if(!input) return;
    
    searchBtn.disabled = true;
    searchBtn.innerText = "⚡ 正在連網抓取資料...";

    const query = `
    query ($search: String) {
      Media (search: $search, type: ANIME) {
        id
        title { native }
        status
        episodes
        startDate { year month day }
        relations {
          edges {
            relationType
            node {
              id
              title { native }
              status
              startDate { year month day }
            }
          }
        }
      }
    }`;

    try {
        const response = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, variables: { search: input } })
        });
        const resData = await response.json();
        const media = resData.data.Media;

        if(!media) {
            showToast("❌ 找不到該作品。請嘗試縮短關鍵字（例如只打：艾莉同學）。");
        } else {
            // 檢查是否重複
            if(animeList.some(a => a.id === media.id)) {
                if(!keyword) showToast("💡 清單中已經有這部作品囉！");
                searchBtn.disabled = false;
                searchBtn.innerText = "🔍 自動搜尋並加入";
                return;
            }

            let category = 'watching';
            if(media.status === 'NOT_YET_RELEASED') category = 'waiting';
            if(media.status === 'FINISHED') category = 'completed';

            let airDate = "未定";
            if(media.startDate && media.startDate.year) {
                airDate = `${media.startDate.year}年${media.startDate.month || '?'}月`;
            }

            const newAnime = {
                id: media.id,
                title: media.title.native,
                status: media.status,
                episodes: media.episodes || "??",
                watched: category === 'completed' ? (media.episodes || 0) : 0,
                category: category,
                airDate: airDate,
                relations: media.relations.edges
            };

            animeList.push(newAnime);
            saveAndRender();
            if(!keyword) document.getElementById('search-input').value = "";
        }
    } catch (error) {
        showToast("❌ 連線失敗，請檢查網路。");
    }
    searchBtn.disabled = false;
    searchBtn.innerText = "🔍 自動搜尋並加入";
}

// 核心功能：當移到已完結時，自動雷達搜尋續作
async function checkAndAddSequel(anime) {
    if (!anime.relations) return;
    
    // 找出關係是 SEQUEL (續作) 且還沒開播的作品
    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
    if (sequelEdge) {
        const sequelNode = sequelEdge.node;
        // 如果這部續作還沒加入過清單，就自動幫忙搜尋並加進敲碗區
        if (!animeList.some(a => a.id === sequelNode.id)) {
            showToast(`🎉 偵測到《${anime.title}》有全新續作！<br>系統已自動將《${sequelNode.title}》加入【敲碗等待開播】區！`);
            await searchAnime(sequelNode.title);
        }
    }
}

function moveCategory(id, newCat) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        anime.category = newCat;
        if(newCat === 'completed' && typeof anime.episodes === 'number') {
            anime.watched = anime.episodes;
            // 觸發續作檢查
            checkAndAddSequel(anime);
        }
        saveAndRender();
    }
}

function updateProgress(id, delta) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        anime.watched = Math.max(0, anime.watched + delta);
        if(typeof anime.episodes === 'number' && anime.watched >= anime.episodes) {
            anime.category = 'completed';
            checkAndAddSequel(anime);
        }
        saveAndRender();
    }
}

function deleteAnime(id) {
    animeList = animeList.filter(a => a.id !== id);
    saveAndRender();
}

function renderList() {
    const lists = { watching: '', waiting: '', completed: '' };
    
    animeList.forEach(anime => {
        let actionButtons = '';
        if(anime.category === 'watching') {
            actionButtons = `
                <button onclick="updateProgress(${anime.id}, 1)">➕ 看了 1 集</button>
                <button class="btn-next" onclick="moveCategory(${anime.id}, 'completed')">🎬 完結</button>
            `;
        } else if(anime.category === 'waiting') {
            actionButtons = `<button class="btn-next" onclick="moveCategory(${anime.id}, 'watching')">📺 開播移至連載</button>`;
        } else if(anime.category === 'completed') {
            actionButtons = `<button onclick="moveCategory(${anime.id}, 'watching')">🔄 重看</button>`;
        }

        const html = `
            <div class="anime-item">
                <div class="anime-title">${anime.title}</div>
                <div class="anime-meta">
                    ${anime.category === 'watching' ? `進度：${anime.watched} / ${anime.episodes} 集` : ''}
                    ${anime.category === 'waiting' ? `預計開播：<span style="color:#f59e0b;font-weight:bold;">${anime.airDate}</span>` : ''}
                    ${anime.category === 'completed' ? `✨ 全 ${anime.episodes} 集觀看完畢` : ''}
                </div>
                <div class="btn-group">
                    ${actionButtons}
                    <button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button>
                </div>
            </div>
        `;
        if(lists[anime.category] !== undefined) lists[anime.category] += html;
    });

    document.getElementById('list-watching').innerHTML = lists.watching || '<div style="color:#64748b;font-size:12px;">暫無連載中動漫</div>';
    document.getElementById('list-waiting').innerHTML = lists.waiting || '<div style="color:#64748b;font-size:12px;">暫無敲碗中動漫</div>';
    document.getElementById('list-completed').innerHTML = lists.completed || '<div style="color:#64748b;font-size:12px;">暫無已完結動漫</div>';
}

// 初始渲染
renderList();
</script>
</body>
</html>
