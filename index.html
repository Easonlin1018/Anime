}

function requestEventNotifications() {
    if (!("Notification" in window)) return showToast("此瀏覽器不支援通知。", 4000);
    Notification.requestPermission().then(permission => {
        showToast(permission === "granted" ? "🔔 瀏覽器通知已開啟！" : "⚠️ 通知權限未開啟。", 4000);
    });
}

function notifyNewEvents(events) {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    const oldIds = new Set(JSON.parse(localStorage.getItem(EVENT_SEEN_KEY) || "[]"));
    const fresh = events.filter(event => !oldIds.has(event.id));
    if (oldIds.size > 0 && fresh.length > 0) {
        const first = fresh[0];
        new Notification(`發現 ${fresh.length} 個新動漫活動`, { body:first.title, icon:"" });
    }
    localStorage.setItem(EVENT_SEEN_KEY, JSON.stringify(events.map(event => event.id).slice(0, 500)));
}

function normalizeMatchText(value) {
    return String(value || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/&(?:amp|quot|apos|lt|gt);/g, " ")
        .replace(/(?:電視)?動畫(?:版)?|動畫作品|劇場版|電影版|特別篇|外傳/gi, " ")
        .replace(/第\s*[一二三四五六七八九十百0-9]+\s*[季期部篇章]/g, " ")
        .replace(/\b(?:anime|animation|tv|season|part|movie|ova|ona|special)\b/gi, " ")
        .replace(/[^\p{L}\p{N}]+/gu, "");
}

function normalizeAnimeAliasList(values) {
    const unique = new Map();
    for (const raw of Array.isArray(values) ? values.flat(Infinity) : [values]) {
        const value = String(raw || "")
            .normalize("NFKC")
            .replace(/\s+/g, " ")
            .trim();
        if (value.length < 2 || value.length > 140) continue;
        const key = value.toLowerCase();
        if (!unique.has(key)) unique.set(key, value);
    }
    return [...unique.values()].slice(0, 80);
}

function buildWorkAliasesFromMedia(media, displayTitle = "", extraAliases = []) {
    return normalizeAnimeAliasList([
        displayTitle,
        media?.title?.native,
        media?.title?.english,
        media?.title?.romaji,
        ...(Array.isArray(media?.synonyms) ? media.synonyms : []),
        ...(Array.isArray(extraAliases) ? extraAliases : [extraAliases])
    ]);
}

function deriveAliasVariants(value) {
    const original = String(value || "")
        .normalize("NFKC")
        .replace(/\((?:動畫|anime|電視動畫)\)|（(?:動畫|anime|電視動畫)）/gi, " ")
        .replace(/\s+/g, " ")
        .trim();

    const variants = new Set();
    const add = candidate => {
        const normalized = normalizeMatchText(candidate);
        if (normalized.length >= 2) variants.add(normalized);
    };

    add(original);
    add(getCoreTitle(original));

    for (const part of original.split(/\s*(?:[:：／/|｜\-–—])\s*/)) {
        if (part.length >= 2) add(part);
    }

    const cjkRuns = original.match(/[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}]{4,}/gu) || [];
    for (const run of cjkRuns) {
        const normalizedRun = normalizeMatchText(run);
        if (normalizedRun.length < 4) continue;

        // 以 4～10 字片段支援各作品的自然簡稱，不綁死任何特定動漫。
        const maxWindow = Math.min(10, normalizedRun.length);
        for (let size = 4; size <= maxWindow; size++) {
            variants.add(normalizedRun.slice(0, size));
            variants.add(normalizedRun.slice(-size));
        }

        // 長標題加入少量中段片段，支援簡稱位於標題中間的作品。
        if (normalizedRun.length <= 36) {
            for (let start = 1; start < normalizedRun.length - 3; start += 2) {
                const piece = normalizedRun.slice(
                    start,
                    start + Math.min(8, normalizedRun.length - start)
                );
                if (piece.length >= 4) variants.add(piece);
            }
        }
    }

    const latinWords = original.match(/[A-Za-z0-9][A-Za-z0-9'’._-]{2,}/g) || [];
    latinWords.forEach(add);

    return [...variants].slice(0, 160);
}

function localWorkAliasesForQuery(value) {
    const queryNormalized = normalizeMatchText(value);
    const aliases = new Set([String(value || "").trim()]);

    for (const anime of animeList) {
        const animeAliases = normalizeAnimeAliasList([
            anime.title,
            ...(Array.isArray(anime.aliases) ? anime.aliases : [])
        ]);
        const matched = animeAliases.some(alias => {
            const normalized = normalizeMatchText(alias);
            return normalized && queryNormalized &&
                (normalized.includes(queryNormalized) || queryNormalized.includes(normalized));
        });
        if (matched) animeAliases.forEach(alias => aliases.add(alias));
    }

    const cached = workAliasCache[queryNormalized];
    if (cached && Array.isArray(cached.terms)) {
        cached.terms.forEach(term => aliases.add(term));
    }

    return normalizeAnimeAliasList([...aliases]);
}

async function resolveWorkAliases(value) {
    const query = String(value || "").trim();
    const queryNormalized = normalizeMatchText(query);
    if (!queryNormalized) return [];

    const aliases = new Set(localWorkAliasesForQuery(query));
    const cached = workAliasCache[queryNormalized];
    const cacheAge = cached?.updatedAt
        ? Date.now() - new Date(cached.updatedAt).getTime()
        : Infinity;

    if (!cached || cacheAge > 30 * 86400000) {
        try {
            let lookup = query;
            let wikiZhTitle = "";
            let wikiJaTitle = "";

            try {
                const wiki = await searchWikipedia(query);
                wikiZhTitle = wiki?.wikiZhTitle || "";
                wikiJaTitle = wiki?.wikiJaTitle || "";
                lookup = wikiJaTitle || query;
            } catch {}

            let media = await requestAniList(SEARCH_QUERY, { search: lookup });
            if (!media && lookup !== query) {
                media = await requestAniList(SEARCH_QUERY, { search: query });
            }

            if (media) {
                buildWorkAliasesFromMedia(media, "", [
                    query,
                    wikiZhTitle,
                    wikiJaTitle
                ]).forEach(alias => aliases.add(alias));
            } else {
                [query, wikiZhTitle, wikiJaTitle]
                    .filter(Boolean)
                    .forEach(alias => aliases.add(alias));
            }
        } catch (error) {
            console.warn("作品別名解析失敗，改用本機比對：", error);
        }

        workAliasCache[queryNormalized] = {
            terms: normalizeAnimeAliasList([...aliases]),
            updatedAt: new Date().toISOString()
        };
        localStorage.setItem(
            WORK_ALIAS_CACHE_KEY,
            JSON.stringify(workAliasCache)
        );
    }

    const expanded = new Set();
    normalizeAnimeAliasList([...aliases]).forEach(alias => {
        expanded.add(alias);
        deriveAliasVariants(alias).forEach(variant => expanded.add(variant));
    });

    return [...expanded].filter(Boolean).slice(0, 500);
}

function expandWorkSearchTerms(value) {
    const aliases = localWorkAliasesForQuery(value);
    const expanded = new Set();

    aliases.forEach(alias => {
        expanded.add(alias);
        deriveAliasVariants(alias).forEach(variant => expanded.add(variant));
    });

    return [...expanded].filter(Boolean).slice(0, 500);
}

function eventSearchText(event) {
    return [
        event?.title,
        event?.summary,
        event?.venue,
        ...(Array.isArray(event?.workTitles) ? event.workTitles : []),
        event?.searchCorpus
    ].filter(Boolean).join(" ");
}

function eventMatchesWorkTerms(event, terms) {
    const rawText = eventSearchText(event)
        .normalize("NFKC")
        .toLowerCase();
    const normalizedText = normalizeMatchText(rawText);

    return (Array.isArray(terms) ? terms : []).some(term => {
        const rawTerm = String(term || "")
            .normalize("NFKC")
            .toLowerCase()
            .trim();
        const normalizedTerm = normalizeMatchText(term);

        if (rawTerm.length >= 2 && rawText.includes(rawTerm)) return true;
        return normalizedTerm.length >= 3 &&
            normalizedText.includes(normalizedTerm);
    });
}

function matchingAnime(event) {
    return animeList.filter(anime => {
        const aliases = normalizeAnimeAliasList([
            anime.title,
            ...(Array.isArray(anime.aliases) ? anime.aliases : [])
        ]);
        const expanded = aliases.flatMap(deriveAliasVariants);
        return eventMatchesWorkTerms(event, expanded);
    }).slice(0, 3);
}

function isOldLiveSearchEvent(event) {
    const isLive = event?.sourceTag === "即時搜尋" || String(event?.discoverySource || "").startsWith("即時搜尋：");
    if (!isLive) return false;

    const today = todayDateKey();
    if (event.eventEndDate && event.eventEndDate < today) return true;

    if (event.eventStartDate && !event.eventEndDate) {
        const daysAfterStart = dateDiffDays(today, event.eventStartDate);
        const corpus = eventSearchText(event);
        const openEnded = /即日起|起至|長期|常設|持續舉辦|展期未定/.test(corpus);
        if (daysAfterStart > 21 && !openEnded) return true;
    }

    if (!event.eventStartDate && !event.eventEndDate) {
        const published = Date.parse(event.publishedAt || "");
        if (!Number.isFinite(published) || Date.now() - published > 180 * 86400000) return true;
        const currentYear = Number(today.slice(0,4));
        const years = [...eventSearchText(event).matchAll(/(?:^|\D)(20\d{2})(?:\D|$)/g)].map(match => Number(match[1]));
        if (years.length && Math.max(...years) < currentYear) return true;
    }

    return false;
}

function isExpiredEvent(event) {
    const today = todayDateKey();
    return event.eventStatus === "expired" || Boolean(event.eventEndDate && event.eventEndDate < today) || isOldLiveSearchEvent(event);
}

function eventStatusInfo(event) {
    if (isExpiredEvent(event)) return { label:"⚫ 已結束", className:"unknown" };
    if (event.eventStatus === "ongoing") return { label:"🟢 進行中", className:"ongoing" };
    if (event.eventStatus === "ongoing-unconfirmed") return { label:"🟢 可能進行中", className:"ongoing" };
    if (event.eventStatus === "upcoming") return { label:"🔵 即將開始", className:"upcoming" };
    return { label:"🟡 日期待確認", className:"unknown" };
}

function eventCountdown(event) {
    const today = todayDateKey();
    if (isExpiredEvent(event)) return "已結束";
    if (event.eventStartDate && event.eventStartDate > today) {
        const days = dateDiffDays(event.eventStartDate, today);
        return days === 0 ? "今天開始" : `${days} 天後開始`;
    }
    if (event.eventEndDate && event.eventEndDate >= today) {
        const days = dateDiffDays(event.eventEndDate, today);
        return days === 0 ? "今天最後一天" : `剩 ${days} 天`;
    }
    return "日期待確認";
}

function formatEventPeriod(event) {
    if (event.eventStartDate && event.eventEndDate) return `${formatEventDate(event.eventStartDate)} ～ ${formatEventDate(event.eventEndDate)}`;
    if (event.eventStartDate) return `${formatEventDate(event.eventStartDate)} 起（結束日期待確認）`;
    return "活動期間待確認，請查看原文";
}

function eventSortValue(event) {
    const statusRank = { ongoing:0, "ongoing-unconfirmed":1, upcoming:2, "date-unknown":3, expired:9 };
    return { rank:statusRank[event.eventStatus] ?? 8, date:event.eventStartDate || event.publishedAt || "9999-12-31" };
}

function fillLocationChips() {
    const box = document.getElementById("location-chips");
    const locations = ["全部","台北","新北","桃園","新竹","台中","台南","高雄"];
    const active = document.getElementById("event-location")?.value || eventSettings.region || "";
    box.innerHTML = locations.map(location => {
        const value = location === "全部" ? "" : location;
        return `<button class="${active === value ? "active" : ""}" onclick="quickLocation('${value}')">${location}</button>`;
    }).join("");
}

function quickLocation(location) {
    document.getElementById("event-location").value = location;
    fillLocationChips();
    renderEvents();
}

const REGION_GROUPS = {
    north: ["台北","新北","桃園","新竹","基隆","宜蘭"],
    central: ["苗栗","台中","彰化","南投","雲林"],
    south: ["嘉義","台南","高雄","屏東"],
    east: ["花蓮","台東"]
};

function regionGroupOf(location) {
    for (const [group, names] of Object.entries(REGION_GROUPS)) if (names.some(name => String(location || "").includes(name))) return group;
    return "unknown";
}

function eventVenueText(event) {
    return event.venue || `${(event.locations || []).join(" ")} ${event.title}`.trim();
}

function eventMapUrl(event) {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(eventVenueText(event))}`;
}

function eventDirectionsUrl(event) {
    const destination = encodeURIComponent(eventVenueText(event));
    const origin = eventSettings.region ? `&origin=${encodeURIComponent(eventSettings.region)}` : "";
    return `https://www.google.com/maps/dir/?api=1${origin}&destination=${destination}&travelmode=transit`;
}

function eventTransportHint(event) {
    const home = eventSettings.region || "";
    const destination = (event.locations || [])[0] || "";
    if (!home) return "設定我的地區後，可顯示交通距離分類";
    if (destination.includes(home) || home.includes(destination)) return "同地區活動，通常較方便前往";
    const homeGroup = regionGroupOf(home), destinationGroup = regionGroupOf(destination);
    if (homeGroup !== "unknown" && homeGroup === destinationGroup) return "同區域跨縣市，建議查看大眾運輸路線";
    if (destination === "全台" || destination === "台灣") return "多地點活動，請查看原文選擇最近場次";
    return "跨區距離較遠，建議先查看交通時間與末班車";
}

function fillEventFilters() {
    const locationSelect = document.getElementById("event-location");
    const typeSelect = document.getElementById("event-type");
    const admissionSelect = document.getElementById("event-admission");
    const all = [...eventList, ...eventArchive].map(applyEventOverride);
    const locations = [...new Set(all.flatMap(event => Array.isArray(event.locations) ? event.locations : []))].sort();
    const types = [...new Set(all.map(event => event.type).filter(Boolean))].sort();
    const admissions = [...new Set(all.map(event => event.admissionType || "待確認").filter(Boolean))].sort();
    const oldLocation = locationSelect.value || eventSettings.region || "";
    const oldType = typeSelect.value;
    const oldAdmission = admissionSelect?.value || "";
    locationSelect.innerHTML = '<option value="">全部地區</option>' + locations.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
    typeSelect.innerHTML = '<option value="">全部類型</option>' + types.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
    if (admissionSelect) admissionSelect.innerHTML = '<option value="">全部入場方式</option>' + admissions.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
    locationSelect.value = locations.includes(oldLocation) ? oldLocation : "";
    typeSelect.value = types.includes(oldType) ? oldType : "";
    if (admissionSelect) admissionSelect.value = admissions.includes(oldAdmission) ? oldAdmission : "";
    fillLocationChips();
}

function updateEventStatus() {
    const status = document.getElementById("event-status");
    const updateTime = eventMeta.updatedAt ? formatEventDate(eventMeta.updatedAt) : "尚未更新";
    if (eventMeta.fetchStatus === "error") {
        status.innerHTML = `❌ 本次自動更新失敗，但上一版有效資料仍保留。<br>${escapeHtml(eventMeta.lastError || "")}`;
        return;
    }
    if (!eventMeta.updatedAt || eventMeta.fetchStatus === "not-run") {
        status.innerHTML = "⚠️ 活動資料尚未執行更新。請到 GitHub Actions 執行『更新多來源動漫活動』。";
        return;
    }
    const statusText = eventMeta.fetchStatus === "partial"
        ? "⚠️ 部分來源暫時限速；已保留舊資料並顯示成功取得的活動"
        : "✅ 多來源活動更新正常";
    status.innerHTML = `${statusText}<br>最後更新：${escapeHtml(updateTime)}｜目前：${eventList.length} 則｜歷史：${eventArchive.length} 則<br>新活動：${Number(eventMeta.newEventCount || 0)}｜快取沿用：${Number(eventMeta.cachedEventCount || 0)}｜429：${Number(eventMeta.rateLimitedCount || 0)}`;
}

function editEvent(id) {
    const original = [...eventList, ...eventArchive].find(event => event.id === id);
    if (!original) return;
    const current = applyEventOverride(original);
    const title = prompt("活動名稱", current.title); if (title === null) return;
    const start = prompt("開始日期 YYYY-MM-DD（可留空）", current.eventStartDate || ""); if (start === null) return;
    const end = prompt("結束日期 YYYY-MM-DD（可留空）", current.eventEndDate || ""); if (end === null) return;
    const location = prompt("地區，多個請用逗號分隔", (current.locations || []).join(",")); if (location === null) return;
    const venue = prompt("場館名稱（可留空）", current.venue || ""); if (venue === null) return;
    const admissionType = prompt("入場方式：免費入場／購票入場／需預約／消費入場／抽選制／整理券／待確認", current.admissionType || "待確認"); if (admissionType === null) return;
    eventOverrides[id] = { ...eventOverrides[id], title:title.trim() || current.title, eventStartDate:start.trim() || null, eventEndDate:end.trim() || null, locations:location.split(/[,，]/).map(x => x.trim()).filter(Boolean), venue:venue.trim(), admissionType:admissionType.trim() || "待確認" };
    saveEventLocalData(); fillEventFilters(); renderEvents(); showToast("✏️ 活動資料已在本機修正");
}

function markEventEnded(id) {
    eventOverrides[id] = { ...eventOverrides[id], eventStatus:"expired", eventEndDate:todayDateKey() };
    saveEventLocalData(); renderEvents();
}

function exportEventData() {
    const payload = { version:"10.1", prefs:eventPrefs, overrides:eventOverrides, settings:eventSettings };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `anime_event_data_${todayDateKey()}.json`; link.click(); URL.revokeObjectURL(link.href);
}

function importEventData(inputEvent) {
    const file = inputEvent.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { try { const data=JSON.parse(e.target.result); eventPrefs=data.prefs||{}; eventOverrides=data.overrides||{}; eventSettings=data.settings||{}; saveEventLocalData(); fillEventFilters(); renderEvents(); showToast("📥 活動收藏與修正資料已還原"); } catch { showToast("❌ 活動資料格式錯誤"); } inputEvent.target.value=""; };
    reader.readAsText(file);
}

function renderEvents() {
    const keyword = document.getElementById("event-keyword").value.trim().toLowerCase();
    const normalizedKeyword = normalizeMatchText(keyword);
    const workSearchTerms =
        activeWorkSearch.query &&
        normalizeMatchText(activeWorkSearch.query) === normalizedKeyword
            ? activeWorkSearch.terms
            : expandWorkSearchTerms(keyword);
    const location = document.getElementById("event-location").value;
    const type = document.getElementById("event-type").value;
    const admission = document.getElementById("event-admission")?.value || "";
    const source = eventTab === "archive" ? eventArchive : eventList;
    const filtered = source.map(applyEventOverride).filter(event => {
        const pref = eventPreference(event.id);
        const matches = matchingAnime(event);
        if (eventTab === "want" && pref.state !== "want") return false;
        if (eventTab === "going" && pref.state !== "going") return false;
        if (eventTab === "visited" && pref.state !== "visited") return false;
        if (eventTab === "matched" && matches.length === 0) return false;
        if (eventTab !== "archive" && (pref.dismissed || isExpiredEvent(event))) return false;
        const text = eventSearchText(event).toLowerCase();
        const normalizedText = normalizeMatchText(text);
        const matchesWorkAlias = eventMatchesWorkTerms(
            event,
            workSearchTerms
        );
        return (!keyword || text.includes(keyword) || (normalizedKeyword.length >= 2 && normalizedText.includes(normalizedKeyword)) || matchesWorkAlias) && (!type || event.type === type) && (!admission || (event.admissionType || "待確認") === admission) && (!location || (event.locations || []).includes(location));
    }).sort((a,b) => { const A=eventSortValue(a), B=eventSortValue(b); return A.rank-B.rank || A.date.localeCompare(B.date); });

    document.getElementById("event-count").textContent = `顯示 ${filtered.length} 則｜收藏 ${Object.values(eventPrefs).filter(x=>x.state==='want').length}｜要去 ${Object.values(eventPrefs).filter(x=>x.state==='going').length}`;
    const container = document.getElementById("event-list");
    if (!filtered.length) { container.innerHTML='<div class="empty">目前沒有符合條件的活動。</div>'; return; }
    container.innerHTML = filtered.map(event => {
        const pref=eventPreference(event.id), matches=matchingAnime(event), state=eventStatusInfo(event);
        const cardClass = `${event.eventStatus === "upcoming" ? "upcoming" : event.confidence === "high" ? "high" : "candidate"} ${matches.length ? "matched" : ""}`;
        return `<article class="event-card ${cardClass}">
            <div class="event-title">${escapeHtml(event.title)}</div>
            <div class="event-badges"><span class="event-badge">${escapeHtml(event.type || "活動")}</span><span class="event-state ${state.className}">${state.label}</span><span class="event-badge event-countdown">⏳ ${escapeHtml(eventCountdown(event))}</span><span class="event-badge event-admission">🎟️ ${escapeHtml(event.admissionType || "待確認")}${event.feeText ? `・${escapeHtml(event.feeText)}` : ""}</span>${(event.locations||[]).map(x=>`<span class="event-badge location">📍 ${escapeHtml(x)}</span>`).join("")}${matches.length?`<span class="event-badge event-match">💜 ${escapeHtml(matches.map(x=>x.title).join("、"))}</span>`:""}</div>
            <div class="event-date">📅 活動期間：${escapeHtml(formatEventPeriod(event))}</div>
            ${event.venue ? `<div class="event-meta">🏢 場館：${escapeHtml(event.venue)}</div>` : ""}
            <div class="event-travel">🚆 ${escapeHtml(eventTransportHint(event))}</div>
            <div class="event-meta">📰 ${escapeHtml(formatEventDate(event.publishedAt))}<br>來源：${escapeHtml(event.source || "公開來源")}${event.discoverySource?`｜${escapeHtml(event.discoverySource)}`:""}</div>
            ${event.summary?`<div class="event-summary">${escapeHtml(event.summary)}</div>`:""}
            <div class="event-actions">
                <button class="want ${pref.state==='want'?'selected':''}" onclick="updateEventPreference('${event.id}',{state:'want'})">⭐ 想去</button>
                <button class="going ${pref.state==='going'?'selected':''}" onclick="updateEventPreference('${event.id}',{state:'going'})">✅ 要去</button>
                <button class="visited ${pref.state==='visited'?'selected':''}" onclick="updateEventPreference('${event.id}',{state:'visited'})">🎫 去過</button>
                <button class="edit" onclick="editEvent('${event.id}')">✏️ 修正</button>
                <button class="hide" onclick="markEventEnded('${event.id}')">📦 已結束</button>
                <button class="hide" onclick="updateEventPreference('${event.id}',{dismissed:true})">🙈 隱藏</button>
            </div>
            <a class="event-link" href="${escapeHtml(event.url)}" target="_blank" rel="noopener noreferrer">查看原始公告</a>
            <a class="event-link" href="${escapeHtml(eventMapUrl(event))}" target="_blank" rel="noopener noreferrer">🗺️ 地圖</a>
            <a class="event-link" href="${escapeHtml(eventDirectionsUrl(event))}" target="_blank" rel="noopener noreferrer">🚆 導航</a>
        </article>`;
    }).join("");
}

async function loadEvents(showMessage = false) {
    const status=document.getElementById("event-status"); status.textContent="正在讀取活動資料……";
    try {
        const response=await fetch(`events.json?t=${Date.now()}`,{cache:"no-store"}); if(!response.ok) throw new Error(`events.json HTTP ${response.status}`);
        const data=await response.json(); eventMeta=data?.meta||{}; eventList=Array.isArray(data?.events)?data.events:[]; eventArchive=Array.isArray(data?.archive)?data.archive:[];
        fillEventFilters(); updateEventStatus(); renderEvents(); notifyNewEvents(eventList);
        if(showMessage) showToast(`🇹🇼 已重新載入 ${eventList.length} 則活動！`);
    } catch(error) { status.innerHTML=`❌ 無法讀取 events.json：${escapeHtml(error.message)}`; document.getElementById("event-list").innerHTML='<div class="empty">活動資料暫時無法顯示。</div>'; }
}

document.getElementById("search-input").addEventListener("keydown", event => {
    if (event.key === "Enter" && !searchBtn.disabled) {
        event.preventDefault();
        searchAnime();
    }
});

const animeListSearchInput = document.getElementById("anime-list-search");
const animeListSortSelect = document.getElementById("anime-list-sort");
if ([...animeListSortSelect.options].some(option => option.value === animeListSort)) {
    animeListSortSelect.value = animeListSort;
} else {
    animeListSort = "watching-first";
    animeListSortSelect.value = animeListSort;
}
animeListSearchInput.addEventListener("input", event => {
    animeListQuery = event.target.value;
    renderList();
});
document.getElementById("anime-list-clear").addEventListener("click", () => {
    animeListQuery = "";
    animeListSearchInput.value = "";
    animeListSearchInput.focus();
    renderList();
});
animeListSortSelect.addEventListener("change", event => {
    animeListSort = event.target.value;
    localStorage.setItem(ANIME_SORT_KEY, animeListSort);
    renderList();
});

document.getElementById("event-keyword").addEventListener("input", event => {
    if (
        activeWorkSearch.query &&
        normalizeMatchText(event.target.value) !==
            normalizeMatchText(activeWorkSearch.query)
    ) {
        activeWorkSearch = { query: "", terms: [] };
    }
    renderEvents();
});
document.getElementById("event-location").addEventListener("change", () => { fillLocationChips(); renderEvents(); });
document.getElementById("event-type").addEventListener("change", renderEvents);
document.getElementById("event-admission").addEventListener("change", renderEvents);
document.getElementById("work-event-input").addEventListener("keydown", event => { if (event.key === "Enter") { event.preventDefault(); searchEventsByWork(); } });

loadStoredAnime();
renderList();
loadEvents().finally(resumePendingLiveSearch);
maybeAutoSyncAnimeMetadata();
</script>
</body>
</html>
