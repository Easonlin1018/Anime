<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v7.8</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:disabled { background-color: #475569; }
        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .anime-title { font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
        .anime-meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .btn-group button { padding: 6px; font-size: 12px; margin: 0; width: auto; flex: 1; min-width: 55px; }
        .btn-edit { background-color: #0284c7; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .btn-scan { background-color: #7c3aed; }
        .btn-backup { background-color: #0d9488; }
        .status-radar { font-size: 12px; color: #a855f7; font-weight: bold; padding: 6px 0; }
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--accent-color);
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%; max-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 全自動動漫追番基地 v7.8</h1>

    <!-- ➕ 新增區塊 -->
    <div class="section">
        <div class="section-title">➕ 一鍵自動化新增</div>
        <input type="text" id="search-input" placeholder="輸入動漫關鍵字（中/日/英皆可）">
        <button id="search-btn" onclick="searchAnime()">🔍 自動搜尋並加入</button>
    </div>

    <!-- ⚙️ 備份還原區 -->
    <div class="section">
        <div class="section-title">⚙️ 資料備份與移轉</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-backup" onclick="exportData()" style="margin-bottom:0;">📤 匯出資料檔案</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn-edit" onclick="document.getElementById('import-file').click()" style="margin-bottom:0;">📥 匯入檔案還原</button>
        </div>
    </div>

    <!-- 1. 連載區 -->
    <div class="section">
        <div class="section-title">⚡ 正在連載 / 正在追</div>
        <div id="list-watching"></div>
    </div>

    <!-- 2. 補番區 -->
    <div class="section">
        <div class="section-title">🎬 官方已完結（補番中）</div>
        <div id="list-backlog"></div>
    </div>

    <!-- 3. 敲碗區 -->
    <div class="section">
        <div class="section-title">⏳ 敲碗等待開播</div>
        <div id="list-waiting"></div>
    </div>

    <!-- 4. 追完區 -->
    <div class="section">
        <div class="section-title">🎉 已追完 / 看完了</div>
        <div id="list-completed"></div>
    </div>
</div>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px; width:auto; padding:5px 15px;" onclick="closeToast()">關閉</button>
</div>

<script>
let animeList = JSON.parse(localStorage.getItem('anime_list_v7_8')) || [];

// 完美無縫繼承轉移舊版本資料
if (animeList.length === 0) {
    const oldKeys = ['anime_list_v7_7', 'anime_list_v7_6', 'anime_list_v7_5', 'anime_list_v7_4', 'anime_list_v7_3', 'anime_list_v7_2', 'anime_list_v7_1', 'anime_list_v7_0'];
    for (let key of oldKeys) {
        if (localStorage.getItem(key)) {
            animeList = JSON.parse(localStorage.getItem(key));
            break;
        }
    }
    localStorage.setItem('anime_list_v7_8', JSON.stringify(animeList));
}

const searchBtn = document.getElementById('search-btn');

function saveAndRender() {
    localStorage.setItem('anime_list_v7_8', JSON.stringify(animeList));
    renderList();
}

function showToast(msg) {
    document.getElementById('toast-msg').innerHTML = msg;
    document.getElementById('toast-box').style.display = 'block';
}
function closeToast() { document.getElementById('toast-box').style.display = 'none'; }

// 📤 📥 備份與還原
function exportData() {
    if (animeList.length === 0) { showToast("💡 目前清單是空的，沒有資料可以備份喔！"); return; }
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(animeList, null, 2));
    const downloadAnchor = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", `anime_list_backup_${date}.json`);
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
    showToast("🎉 備份檔案已成功下載！");
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedList = JSON.parse(e.target.result);
            if (Array.isArray(importedList)) {
                if (confirm("⚠️ 確定要匯入此檔案嗎？這將會完全覆蓋目前的清單資料！")) {
                    animeList = importedList;
                    saveAndRender();
                    showToast("🎉 資料還原成功！已完美套用備份進度。");
                }
            } else { showToast("❌ 檔案格式不正確。"); }
        } catch (err) { showToast("❌ 讀取檔案失敗。"); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// 🌐 Google 翻譯引擎
async function translateText(text, toLang = "zh-TW") {
    try {
        const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await response.json();
        if (data && data[0] && data[0][0] && data[0][0][0]) {
            return data[0][0][0];
        }
    } catch (e) { console.error(e); }
    return null;
}

function hasJapaneseKana(str) {
    return /[\u3040-\u309F\u30A0-\u30FF]/.test(str);
}

function applySeasonSuffix(currentTitle, nativeTitle, englishTitle, romajiTitle, extraKeyword = "") {
    const combined = `${nativeTitle} ${englishTitle || ''} ${romajiTitle || ''} ${extraKeyword}`.toLowerCase();
    let cleanTitle = currentTitle.replace(/\s*第[一二三四五六七八九十0-9]+[季期]\s*$/g, "");
    cleanTitle = cleanTitle.replace(/\s*Season\s*[0-9]+\s*$/gi, "");

    if (combined.includes("season 2") || combined.includes("2nd season") || combined.includes("第2期") || combined.includes("第二期") || combined.includes("第2季") || combined.includes("第二季") || combined.includes("續") || combined.includes("续") || /part\s*2\b/.test(combined)) {
        return cleanTitle + " 第二季";
    } else if (combined.includes("season 3") || combined.includes("3rd season") || combined.includes("第3期") || combined.includes("第三期") || combined.includes("第3季") || combined.includes("第三季")) {
        return cleanTitle + " 第三季";
    }
    return cleanTitle;
}

// ⚡ 本地端【閃電攔截顯示修正器】渲染時強制校正名稱，不走網路
function instantFixDictionary() {
    let needSave = false;
    animeList.forEach(anime => {
        let lowerTitle = anime.title.toLowerCase();

        // 🎯 消滅式森
        if (lowerTitle.includes("可愛いだけじゃない") || lowerTitle.includes("式守") || lowerTitle.includes("式森")) {
            if (anime.title !== "式守同學不只可愛而已") {
                anime.title = "式守同學不只可愛而已"; needSave = true;
            }
        }
        // 🎯 精準修正艾莉同學的顯示名稱
        if (lowerTitle.includes("時々ボソッと") || lowerTitle.includes("ロシア語") || lowerTitle.includes("艾莉")) {
            if (lowerTitle.includes("2") || lowerTitle.includes("二") || lowerTitle.includes("第2期")) {
                if (anime.title !== "不時輕聲地以俄語遮羞的鄰座艾莉同學 第二季") {
                    anime.title = "不時輕聲地以俄語遮羞的鄰座艾莉同學 第二季"; needSave = true;
                }
            } else {
                if (anime.title !== "不時輕聲地以俄語遮羞的鄰座艾莉同學") {
                    anime.title = "不時輕聲地以俄語遮羞的鄰座艾莉同學"; needSave = true;
                }
            }
        }
        if (lowerTitle.includes("アオのハコ") || lowerTitle.includes("blue box")) {
            if (anime.title !== "青之箱 第二季") { anime.title = "青之箱 第二季"; needSave = true; }
        }
        if (lowerTitle.includes("2番目に可愛い") && anime.title.includes("第二季")) {
            if (anime.title !== "我成了班上第二可愛女生的朋友") { anime.title = "我成了班上第二可愛女生的朋友"; needSave = true; }
        }
        if (lowerTitle.includes("总之就是非常可爱") || lowerTitle.includes("總之就是非常可愛") || lowerTitle.includes("tonikaku")) {
            let eps = Number(anime.episodes);
            let targetTitle = "總之就是非常可愛";
            if (eps === 12) {
                targetTitle = anime.title.includes("2") || anime.title.includes("第二季") ? "總之就是非常可愛 第二季" : "總之就是非常可愛 第一季";
            } else if (eps === 1) { targetTitle = "總之就是非常可愛 OVA特別篇"; }
            else if (eps === 4) { targetTitle = "總之就是非常可愛 女高中生篇"; }
            if (anime.title !== targetTitle) { anime.title = targetTitle; needSave = true; }
        }
    });
    if (needSave) { localStorage.setItem('anime_list_v7_8', JSON.stringify(animeList)); }
}

// 🎬 搜尋核心
async function searchAnime(keyword = null, isQuiet = false, parentChineseTitle = null) {
    let input = keyword || document.getElementById('search-input').value.trim();
    if(!input) return;
    
    // 🔥 【v7.8 新增】關鍵字防禦攔截器：直接跳過機翻，把正確官方原名塞給伺服器！
    let checkInput = input.toLowerCase();
    if (checkInput.includes("艾莉同學") || checkInput.includes("鄰座艾莉") || checkInput.includes("俄語遮羞")) {
        if (checkInput.includes("2") || checkInput.includes("二") || checkInput.includes("第2季") || checkInput.includes("第二季")) {
            input = "時々ボソッとロシア語でデレる鄰のアーリャさん 第2期";
        } else {
            input = "時々ボソッとロシア語でデレる隣のアーリャさん";
        }
    } else if (checkInput.includes("式守")) {
        input = "可愛いだけじゃない式守さん";
    } else if (checkInput.includes("芙莉蓮") || checkInput.includes("福利連")) {
        input = "葬送のフリーレン";
    }

    if (!isQuiet) {
        searchBtn.disabled = true;
        searchBtn.innerText = "⚡ 正在搜尋 AniList 總庫...";
    }

    const query = `
    query ($search: String) {
      Media (search: $search, type: ANIME) {
        id
        title { native english romaji }
        synonyms
        status
        episodes
        startDate { year month day }
        relations {
          edges { relationType node { id title { native } status startDate { year month day } } }
        }
      }
    }`;

    async function fetchFromAniList(searchKey) {
        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { search: searchKey } })
            });
            const resData = await response.json();
            return resData.data ? resData.data.Media : null;
        } catch (e) { return null; }
    }

    try {
        let media = await fetchFromAniList(input);

        if (!media) {
            let translatedJa = await translateText(input, "ja");
            if (translatedJa) media = await fetchFromAniList(translatedJa);
            
            if (!media) {
                let translatedEn = await translateText(input, "en");
                if (translatedEn) media = await fetchFromAniList(translatedEn);
            }
        }

        if(!media) {
            if (!isQuiet) showToast("❌ 全球資料庫都翻遍了，還是找不到這部作品。");
        } else {
            if(animeList.some(a => a.id === media.id)) {
                if(!keyword && !isQuiet) showToast("💡 清單中已經有這部作品囉！");
                if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 自動搜尋並加入"; }
                return;
            }

            let chosenTitle = null;
            if (media.synonyms && media.synonyms.length > 0) {
                chosenTitle = media.synonyms.find(s => /[\u4e00-\u9fa5]/.test(s) && !hasJapaneseKana(s));
            }
            
            if (!chosenTitle || hasJapaneseKana(chosenTitle)) {
                let googleZh = await translateText(media.title.native, "zh-TW");
                chosenTitle = googleZh || media.title.native;
            }

            if (parentChineseTitle) chosenTitle = parentChineseTitle;
            chosenTitle = applySeasonSuffix(chosenTitle, media.title.native, media.title.english, media.title.romaji, input || "");

            let category = 'watching';
            if(media.status === 'NOT_YET_RELEASED') category = 'waiting';
            if(media.status === 'FINISHED') category = 'backlog';

            let airDate = "未定";
            if(media.startDate && media.startDate.year) {
                airDate = `${media.startDate.year}年${media.startDate.month || '?'}月`;
            }

            const newAnime = {
                id: media.id,
                title: chosenTitle,
                status: media.status,
                episodes: media.episodes || "??",
                watched: 0,
                category: category,
                airDate: airDate,
                relations: media.relations ? media.relations.edges : []
            };

            animeList.push(newAnime);
            saveAndRender();
            if(!keyword && !isQuiet) document.getElementById('search-input').value = "";
            
            if (category !== 'waiting') {
                await checkAndAddSequel(newAnime, true);
            }
        }
    } catch (error) { if (!isQuiet) showToast("❌ 發生未知連線錯誤。"); }
    if (!isQuiet) { searchBtn.disabled = false; searchBtn.innerText = "🔍 自動搜尋並加入"; }
}

async function checkAndAddSequel(anime, isQuiet = false) {
    if (!anime.relations || anime.relations.length === 0) return;
    const sequelEdge = anime.relations.find(edge => edge.relationType === 'SEQUEL');
    if (sequelEdge) {
        const sequelNode = sequelEdge.node;
        if (!animeList.some(a => a.id === sequelNode.id)) {
            if (!isQuiet) showToast(`🎉 偵測到有全新續作！<br>已自動將續作加入【敲碗等待開播】。`);
            await searchAnime(sequelNode.title.native, true, anime.title);
        }
    }
}

function editTitle(id) {
    const anime = animeList.find(a => a.id === id);
    if (anime) {
        const newTitle = prompt(`請輸入《${anime.title}》的新名字：`, anime.title);
        if (newTitle && newTitle.trim() !== "") { anime.title = newTitle.trim(); saveAndRender(); }
    }
}

function moveCategory(id, newCat) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        if (anime.category === 'completed' && newCat === 'watching') anime.watched = 0;
        anime.category = newCat;
        if(newCat === 'completed') { anime.watched = anime.episodes; checkAndAddSequel(anime, false); }
        saveAndRender();
    }
}

function updateProgress(id, delta) {
    const anime = animeList.find(a => a.id === id);
    if(anime) {
        let currentWatched = Number(anime.watched) || 0;
        anime.watched = Math.max(0, currentWatched + delta);
        const totalEps = Number(anime.episodes);
        if(!isNaN(totalEps) && anime.watched >= totalEps) { anime.category = 'completed'; checkAndAddSequel(anime, false); }
        saveAndRender();
    }
}

async function forceCheck(id) {
    const anime = animeList.find(a => a.id === id);
    if (anime) { showToast(`🛰️ 正在為《${anime.title}》強行連線檢查最新狀態...`); await autoRefreshAndCheck(); }
}

function deleteAnime(id) { animeList = animeList.filter(a => a.id !== id); saveAndRender(); }

function renderList() {
    instantFixDictionary();

    const lists = { watching: '', backlog: '', waiting: '', completed: '' };
    animeList.forEach(anime => {
        let actionButtons = '';
        if(anime.category === 'watching' || anime.category === 'backlog') {
            actionButtons = `
                <button onclick="updateProgress(${anime.id}, 1)">➕ 看了 1 集</button>
                <button class="btn-next" onclick="moveCategory(${anime.id}, 'completed')">🎉 追完</button>
            `;
        } else if(anime.category === 'waiting') {
            actionButtons = `<div class="status-radar">🛰️ 智慧雷達自動監測中...</div>`;
        } else if(anime.category === 'completed') {
            actionButtons = `
                <button onclick="moveCategory(${anime.id}, 'watching')">🔄 重看</button>
                <button class="btn-scan" onclick="forceCheck(${anime.id})">🛰️ 查續作</button>
            `;
        }

        const html = `
            <div class="anime-item">
                <div class="anime-title">${anime.title}</div>
                <div class="anime-meta">
                    ${(anime.category === 'watching' || anime.category === 'backlog') ? `進度：${anime.watched} / ${anime.episodes} 集` : ''}
                    ${anime.category === 'waiting' ? `預計開播：<span style="color:#f59e0b;font-weight:bold;">${anime.airDate}</span>` : ''}
                    ${anime.category === 'completed' ? `✨ 全 ${anime.episodes} 集觀看完畢` : ''}
                </div>
                <div class="btn-group">
                    ${actionButtons}
                    <button class="btn-edit" onclick="editTitle(${anime.id})">✏️ 改名</button>
                    <button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button>
                </div>
            </div>
        `;
        if(lists[anime.category] !== undefined) lists[anime.category] += html;
    });

    document.getElementById('list-watching').innerHTML = lists.watching || '<div style="color:#64748b;font-size:12px;">暫無連載中動漫</div>';
    document.getElementById('list-backlog').innerHTML = lists.backlog || '<div style="color:#64748b;font-size:12px;">暫無補番中動漫</div>';
    document.getElementById('list-waiting').innerHTML = lists.waiting || '<div style="color:#64748b;font-size:12px;">暫無敲碗中動漫</div>';
    document.getElementById('list-completed').innerHTML = lists.completed || '<div style="color:#64748b;font-size:12px;">暫無已追完動漫</div>';
}

async function autoRefreshAndCheck() {
    for (let anime of animeList) {
        const query = `query ($id: Int) { Media (id: $id, type: ANIME) { status title { native english romaji } synonyms episodes } }`;
        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id: anime.id } })
            });
            const resData = await response.json();
            const media = resData.data ? resData.data.Media : null;
            if (media) {
                let changed = false;
                if (anime.category === 'waiting') {
                    if (media.status === 'RELEASING') { anime.category = 'watching'; changed = true; }
                    else if (media.status === 'FINISHED') { anime.category = 'backlog'; changed = true; }
                }
                if (media.episodes && anime.episodes !== media.episodes) { anime.episodes = media.episodes; changed = true; }
                if (anime.status !== media.status) { anime.status = media.status; changed = true; }
                
                if (!anime.title.includes("式守同學") && !anime.title.includes("艾莉同學") && !anime.title.includes("青之箱") && !anime.title.includes("第二可愛") && !anime.title.includes("總之就是非常可愛")) {
                    let baseChinese = anime.title;
                    if (hasJapaneseKana(baseChinese)) {
                        let corrected = await translateText(media.title.native, "zh-TW");
                        if (corrected) baseChinese = corrected;
                    } else if (media.synonyms && media.synonyms.length > 0) {
                        const chiSyn = media.synonyms.find(s => /[\u4e00-\u9fa5]/.test(s) && !hasJapaneseKana(s));
                        if (chiSyn) baseChinese = chiSyn;
                    }
                    let repairedTitle = applySeasonSuffix(baseChinese, media.title.native, media.title.english, media.title.romaji, anime.title);
                    if (anime.title !== repairedTitle) { anime.title = repairedTitle; changed = true; }
                }
                if (changed) saveAndRender();
            }
        } catch (e) { console.error(e); }
    }
}

renderList();
setTimeout(autoRefreshAndCheck, 1500);
</script>
</body>
