<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v9.1.0</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 620px; }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        input, textarea, button, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
        }

        select {
            cursor: pointer;
            font-weight: bold;
            background-color: #1e293b;
            color: #38bdf8;
        }

        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button:active { filter: brightness(0.8); }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .series-group {
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .series-group[open] {
            border-color: #7c3aed;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
        }

        .series-summary {
            padding: 14px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            user-select: none;
            list-style: none;
        }

        .series-summary::-webkit-details-marker { display: none; }

        .series-summary::after {
            content: "展開 ▾";
            font-size: 11px;
            color: #38bdf8;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-weight: normal;
        }

        details[open] .series-summary::after {
            content: "收起 ▴";
            color: #f43f5e;
        }

        .series-content {
            padding: 10px;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 6px;
        }

        .series-content .anime-item {
            border-left: 4px solid #7c3aed;
            background: #1e293b;
        }

        .anime-title {
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .anime-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-group button {
            padding: 6px;
            font-size: 12px;
            margin: 0;
            width: auto;
            flex: 1;
            min-width: 55px;
        }

        .btn-edit { background-color: #0284c7; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .btn-review { background-color: #9333ea; }
        .btn-scan { background-color: #7c3aed; margin-bottom: 12px; }
        .btn-batch { background-color: #f59e0b; color: #0f172a; }
        .btn-backup { background-color: #0d9488; }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.97);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%;
            max-width: 320px;
            line-height: 1.6;
        }

        .event-status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 9px;
            background: #111827;
            color: #cbd5e1;
            font-size: 12px;
            line-height: 1.6;
        }

        .event-controls {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 7px;
            margin-bottom: 10px;
        }

        .event-controls input,
        .event-controls select {
            margin-bottom: 0;
            min-width: 0;
        }

        .event-card {
            padding: 13px;
            margin-bottom: 10px;
            background: #111827;
            border: 1px solid var(--border-color);
            border-left: 4px solid #8b5cf6;
            border-radius: 10px;
        }

        .event-card.high { border-left-color: #22c55e; }
        .event-card.candidate { border-left-color: #f59e0b; }
        .event-card.upcoming { border-left-color: #38bdf8; }

        .event-date {
            margin: 8px 0;
            padding: 8px 9px;
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.09);
            color: #bae6fd;
            font-size: 12px;
            line-height: 1.6;
        }

        .event-state {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            font-weight: bold;
        }

        .event-state.ongoing {
            background: #14532d;
            color: #bbf7d0;
        }

        .event-state.upcoming {
            background: #164e63;
            color: #a5f3fc;
        }

        .event-state.unknown {
            background: #78350f;
            color: #fde68a;
        }

        .event-title {
            font-size: 15px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .event-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }

        .event-badge {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            background: #312e81;
            color: #ddd6fe;
        }

        .event-badge.location {
            background: #164e63;
            color: #a5f3fc;
        }

        .event-meta,
        .event-summary,
        .event-warning {
            font-size: 12px;
            line-height: 1.6;
        }

        .event-meta { color: #94a3b8; }
        .event-summary { color: #cbd5e1; margin: 8px 0; }

        .event-warning {
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.1);
            padding: 7px 8px;
            border-radius: 7px;
            margin: 8px 0;
        }

        .event-link {
            display: inline-block;
            padding: 8px 10px;
            border-radius: 7px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }

        .empty {
            color: #64748b;
            font-size: 12px;
            line-height: 1.7;
            text-align: center;
            padding: 14px;
        }

        @media (max-width: 600px) {
            .event-controls { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🎬 全自動動漫追番基地 v9.1.0</h1>

    <div class="section">
        <div class="section-title">➕ 一鍵自動化新增（單部搜尋）</div>
        <input type="text" id="search-input" placeholder="輸入單部動漫名稱">
        <button id="search-btn" onclick="searchAnime()">🔍 智慧網格搜尋</button>
    </div>

    <div class="section">
        <div class="section-title">🚀 批次自動化多載入網格</div>
        <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:5px;">
            請選擇這批動漫要歸類到哪裡：
        </label>

        <select id="batch-category-target">
            <option value="backlog">🎬 官方已完結（補番中）</option>
            <option value="watching">⚡ 正在連載 / 正在追</option>
            <option value="review">🧠 溫故知新（需要複習區）</option>
            <option value="waiting">⏳ 敲碗等待開播</option>
        </select>

        <textarea id="batch-input" placeholder="在此處貼入大量動漫名稱&#10;每行一部作品..."></textarea>
        <button id="batch-btn" class="btn-batch" onclick="batchSearchAnime()">⚡ 啟動批次雷達搜尋</button>
    </div>

    <div class="section">
        <div class="section-title">⚙️ 資料控制與智慧雷達</div>
        <button class="btn-scan" onclick="manualScanSequels()">🛰️ 立即手動主動偵測續作</button>

        <div style="display:flex;gap:10px;">
            <button class="btn-backup" onclick="exportData()" style="margin-bottom:0;flex:1;">📤 匯出資料</button>
            <input type="file" id="import-file" accept=".json,application/json" style="display:none;" onchange="importData(event)">
            <button class="btn-edit" onclick="document.getElementById('import-file').click()" style="margin-bottom:0;flex:1;">📥 匯入還原</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <span>🇹🇼 台灣動漫活動雷達</span>
            <button onclick="loadEvents(true)" style="width:auto;margin:0;padding:6px 9px;font-size:11px;background:#7c3aed;">重新載入</button>
        </div>

        <div id="event-status" class="event-status">正在讀取活動資料……</div>

        <div class="event-controls">
            <input id="event-keyword" type="search" placeholder="搜尋活動或作品">
            <select id="event-location">
                <option value="">全部地區</option>
            </select>
            <select id="event-type">
                <option value="">全部類型</option>
            </select>
        </div>

        <div id="event-count" class="anime-meta"></div>
        <div id="event-list"></div>
    </div>

    <div class="section"><div class="section-title">⚡ 正在連載 / 正在追</div><div id="list-watching"></div></div>
    <div class="section"><div class="section-title">🎬 官方已完結（補番中）</div><div id="list-backlog"></div></div>
    <div class="section"><div class="section-title">🧠 溫故知新（需要複習區）</div><div id="list-review"></div></div>
    <div class="section"><div class="section-title">⏳ 敲碗等待開播</div><div id="list-waiting"></div></div>
    <div class="section"><div class="section-title">🎉 已追完 / 看完了</div><div id="list-completed"></div></div>
</div>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px;margin-bottom:0;width:auto;padding:5px 15px;background:#475569;" onclick="closeToast()">關閉</button>
</div>

<script>
const STORAGE_KEY = "anime_list_v8_8";
const OLD_KEYS = [
    "anime_list_v8_7", "anime_list_v8_6", "anime_list_v8_5",
    "anime_list_v8_4", "anime_list_v8_3", "anime_list_v8_2",
    "anime_list_v8_1", "anime_list_v8_0"
];

let animeList = [];
let eventList = [];
let eventMeta = {};
let toastTimer = null;

const searchBtn = document.getElementById("search-btn");
const batchBtn = document.getElementById("batch-btn");

function loadStoredAnime() {
    try {
        const current = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(current)) animeList = current;
    } catch {
        animeList = [];
    }

    if (animeList.length === 0) {
        for (const key of OLD_KEYS) {
            try {
                const old = JSON.parse(localStorage.getItem(key) || "[]");
                if (Array.isArray(old) && old.length > 0) {
                    animeList = old;
                    break;
                }
            } catch {}
        }
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
}

function saveAndRender() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
    renderList();
}

function showToast(message, duration = 3500) {
    clearTimeout(toastTimer);
    document.getElementById("toast-msg").innerHTML = message;
    document.getElementById("toast-box").style.display = "block";
    toastTimer = setTimeout(closeToast, duration);
}

function closeToast() {
    clearTimeout(toastTimer);
    document.getElementById("toast-box").style.display = "none";
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function setSearchLoading(loading) {
    searchBtn.disabled = loading;
    searchBtn.innerText = loading
        ? "⚡ 正在搜尋中..."
        : "🔍 智慧網格搜尋";
}

async function fetchWithTimeout(url, options = {}, timeout = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);

    try {
        const response = await fetch(url, {
            ...options,
            signal: controller.signal
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        return response;
    } finally {
        clearTimeout(timer);
    }
}

async function translateText(text, toLang = "zh-TW") {
    if (!text) return null;

    try {
        const response = await fetchWithTimeout(
            "https://translate.googleapis.com/translate_a/single" +
            `?client=gtx&sl=auto&tl=${encodeURIComponent(toLang)}` +
            `&dt=t&q=${encodeURIComponent(text)}`,
            {},
            10000
        );

        const data = await response.json();

        if (Array.isArray(data?.[0])) {
            return data[0]
                .map(item => Array.isArray(item) ? item[0] || "" : "")
                .join("") || null;
        }
    } catch (error) {
        console.warn("翻譯服務失敗：", error);
    }

    return null;
}

async function batchSearchAnime() {
    const inputArea = document.getElementById("batch-input");
    const targetCategory = document.getElementById("batch-category-target").value;
    const lines = inputArea.value
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

    if (lines.length === 0) {
        showToast("⚠️ 文字框內沒有動漫名稱！");
        return;
    }

    batchBtn.disabled = true;
    let successCount = 0;
    const failed = [];

    try {
        for (let i = 0; i < lines.length; i++) {
            batchBtn.innerHTML =
                `⚡ 正在載入 (${i + 1}/${lines.length})<br>` +
                `🎬 《${escapeHtml(lines[i])}》`;

            const success = await searchAnime(
                lines[i],
                true,
                null,
                null,
                targetCategory
            );

            if (success) successCount++;
            else failed.push(lines[i]);

            await delay(850);
        }
    } finally {
        batchBtn.disabled = false;
        batchBtn.innerText = "⚡ 啟動批次雷達搜尋";
    }

    inputArea.value = failed.join("\n");

    showToast(
        `批次完成！<br>成功：<b style="color:#22c55e">${successCount}</b> 部<br>` +
        `未成功或重複：<b style="color:#ef4444">${failed.length}</b> 部`,
        5000
    );
}

function getCoreTitle(title) {
    return String(title || "")
        .replace(/\s*第[一二三四五六七八九十百0-9]+[季期]\s*$/g, "")
        .replace(/\s*Season\s*[0-9]+\s*$/gi, "")
        .replace(/\s*\((OVA|特別篇|劇場版|ONA外傳|續篇).*?\)\s*$/gi, "")
        .trim();
}

function generateSmartTitle(media, parentChineseTitle, wikiZhTitle, googleZhTitle) {
    const combinedText = [
        media.title?.native || "",
        media.title?.english || "",
        media.title?.romaji || ""
    ].join(" ");

    const lower = combinedText.toLowerCase();

    let coreTitle =
        wikiZhTitle ||
        googleZhTitle ||
        media.title?.native ||
        media.title?.romaji ||
        media.title?.english ||
        "未命名作品";

    if (parentChineseTitle) {
        coreTitle = getCoreTitle(parentChineseTitle);
    }

    const seasons = [
        [5, ["season 5", "5th season", "第5期", "第五季"]],
        [4, ["season 4", "4th season", "第4期", "第四季"]],
        [3, ["season 3", "3rd season", "第3期", "第三季"]],
        [2, ["season 2", "2nd season", "第2期", "第二季"]]
    ];

    for (const [number, words] of seasons) {
        if (
            words.some(word =>
                lower.includes(word.toLowerCase()) ||
                combinedText.includes(word)
            )
        ) {
            return `${coreTitle} 第${["", "一", "二", "三", "四", "五"][number]}季`;
        }
    }

    if (parentChineseTitle) {
        const yearSuffix = media.startDate?.year
            ? ` - ${media.startDate.year}年`
            : "";

        if (media.format === "OVA") return `${coreTitle} (OVA${yearSuffix})`;
        if (media.format === "SPECIAL") return `${coreTitle} (特別篇${yearSuffix})`;
        if (media.format === "MOVIE") return `${coreTitle} (劇場版${yearSuffix})`;
        if (media.format === "ONA") return `${coreTitle} (ONA外傳${yearSuffix})`;
        return `${coreTitle} (續篇${yearSuffix})`;
    }

    return coreTitle;
}

async function searchWikipedia(input) {
    try {
        const searchResponse = await fetchWithTimeout(
            "https://zh.wikipedia.org/w/api.php" +
            `?action=query&list=search&srsearch=${encodeURIComponent(input)}` +
            "&format=json&origin=*",
            {},
            10000
        );

        const searchData = await searchResponse.json();
        const wikiZhTitle = searchData?.query?.search?.[0]?.title || null;

        if (!wikiZhTitle) {
            return { wikiZhTitle: null, wikiJaTitle: null };
        }

        const languageResponse = await fetchWithTimeout(
            "https://zh.wikipedia.org/w/api.php" +
            `?action=query&titles=${encodeURIComponent(wikiZhTitle)}` +
            "&prop=langlinks&lllang=ja&format=json&origin=*",
            {},
            10000
        );

        const languageData = await languageResponse.json();
        const pages = languageData?.query?.pages || {};
        let wikiJaTitle = null;

        for (const pageId in pages) {
            wikiJaTitle = pages[pageId]?.langlinks?.[0]?.["*"] || null;
            if (wikiJaTitle) break;
        }

        return { wikiZhTitle, wikiJaTitle };
    } catch (error) {
        console.warn("維基搜尋失敗：", error);
        return { wikiZhTitle: null, wikiJaTitle: null };
    }
}

const SEARCH_QUERY = `
query ($search: String) {
    Media(search: $search, type: ANIME) {
        id format
        title { native english romaji }
        status episodes
        startDate { year month day }
        relations {
            edges {
                relationType
                node {
                    id format
                    title { native english romaji }
                    status
                }
            }
        }
    }
}`;

const ID_QUERY = `
query ($id: Int) {
    Media(id: $id, type: ANIME) {
        id format
        title { native english romaji }
        status episodes
        startDate { year month day }
        relations {
            edges {
                relationType
                node {
                    id format
                    title { native english romaji }
                    status
                }
            }
        }
    }
}`;

async function requestAniList(query, variables) {
    const response = await fetchWithTimeout(
        "https://graphql.anilist.co",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({ query, variables })
        },
        15000
    );

    const data = await response.json();
    return data?.data?.Media || null;
}

async function searchAnime(
    keyword = null,
    isQuiet = false,
    parentChineseTitle = null,
    targetId = null,
    forcedCategory = null
) {
    const inputElement = document.getElementById("search-input");
    const input = keyword || inputElement.value.trim();
    const isManual = !isQuiet && !targetId;

    if (!input && !targetId) {
        if (!isQuiet) showToast("⚠️ 請先輸入動漫名稱！");
        return false;
    }

    if (isManual) setSearchLoading(true);

    try {
        let wikiZhTitle = null;
        let wikiJaTitle = null;

        if (!targetId) {
            const wiki = await searchWikipedia(input);
            wikiZhTitle = wiki.wikiZhTitle;
            wikiJaTitle = wiki.wikiJaTitle;
        }

        let media;

        if (targetId) {
            media = await requestAniList(ID_QUERY, {
                id: Number(targetId)
            });
        } else {
            media = await requestAniList(SEARCH_QUERY, {
                search: wikiJaTitle || input
            });

            if (!media && wikiJaTitle) {
                media = await requestAniList(SEARCH_QUERY, {
                    search: input
                });
            }

            if (!media) {
                const translated = await translateText(input, "ja");

                if (translated) {
                    media = await requestAniList(SEARCH_QUERY, {
                        search: translated
                    });
                }
            }
        }

        if (!media) {
            if (!isQuiet) {
                showToast(`❌ 找不到《${escapeHtml(input)}》`);
            }
            return false;
        }

        const duplicate = animeList.find(
            anime => Number(anime.id) === Number(media.id)
        );

        if (duplicate) {
            if (!isQuiet) {
                showToast(`⚠️ 《${escapeHtml(duplicate.title)}》已經在清單裡！`);
            }
            return false;
        }

        const googleZh = await translateText(
            media.title?.native ||
            media.title?.romaji ||
            media.title?.english ||
            "",
            "zh-TW"
        );

        const finalTitle = generateSmartTitle(
            media,
            parentChineseTitle,
            wikiZhTitle,
            googleZh
        );

        const category =
            forcedCategory ||
            (
                media.status === "NOT_YET_RELEASED"
                    ? "waiting"
                    : media.status === "FINISHED"
                        ? "backlog"
                        : "watching"
            );

        const airDate = media.startDate?.year
            ? `${media.startDate.year}年${media.startDate.month || "?"}月`
            : "未定";

        const newAnime = {
            id: Number(media.id),
            title: finalTitle,
            status: media.status || "UNKNOWN",
            episodes: media.episodes || "??",
            watched: 0,
            category,
            airDate,
            relations: Array.isArray(media.relations?.edges)
                ? media.relations.edges
                : []
        };

        animeList.push(newAnime);
        saveAndRender();

        if (!keyword && !isQuiet && !targetId) {
            inputElement.value = "";
        }

        if (!isQuiet) {
            showToast(
                `🛰️ 成功加入：<b style="color:#60a5fa">《${escapeHtml(finalTitle)}》</b>`
            );
        }

        if (!forcedCategory && category !== "waiting") {
            checkAndAddSequel(newAnime, true);
        }

        return true;
    } catch (error) {
        console.error("搜尋錯誤：", error);

        if (!isQuiet) {
            showToast(
                error.name === "AbortError"
                    ? "❌ 搜尋逾時，請稍後再試。"
                    : "❌ 搜尋失敗，請稍後再試。"
            );
        }

        return false;
    } finally {
        if (isManual) setSearchLoading(false);
    }
}

async function checkAndAddSequel(anime, isQuiet = false) {
    const sequel = anime?.relations?.find(
        edge => edge?.relationType === "SEQUEL"
    )?.node;

    if (
        !sequel ||
        animeList.some(item => Number(item.id) === Number(sequel.id))
    ) {
        return false;
    }

    await delay(500);

    return await searchAnime(
        null,
        isQuiet,
        anime.title,
        sequel.id
    );
}

async function manualScanSequels() {
    showToast("🛰️ 正在掃描已追完作品的續作……", 5000);
    let found = 0;

    for (const anime of animeList.filter(item => item.category === "completed")) {
        try {
            const media = await requestAniList(ID_QUERY, {
                id: Number(anime.id)
            });

            anime.relations = media?.relations?.edges || [];

            if (await checkAndAddSequel(anime, true)) {
                found++;
            }

            await delay(600);
        } catch (error) {
            console.warn("續作掃描失敗：", error);
        }
    }

    saveAndRender();

    showToast(
        found > 0
            ? `🎉 找到並新增 ${found} 部續作！`
            : "🛰️ 掃描完成，目前沒有未入庫的續作。",
        5000
    );
}

function editTitle(id) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    const title = prompt("請輸入新名字：", anime.title);

    if (title?.trim()) {
        anime.title = title.trim();
        saveAndRender();
    }
}

function moveCategory(id, category) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    if (anime.category === "completed" && ["watching", "review"].includes(category)) {
        anime.watched = 0;
    }

    anime.category = category;

    if (category === "completed") {
        const total = Number(anime.episodes);

        if (Number.isFinite(total) && total > 0) {
            anime.watched = total;
        }

        checkAndAddSequel(anime, false);
    }

    saveAndRender();
}

function updateProgress(id, delta) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    anime.watched = Math.max(
        0,
        (Number(anime.watched) || 0) + Number(delta)
    );

    const total = Number(anime.episodes);

    if (
        Number.isFinite(total) &&
        total > 0 &&
        anime.watched >= total
    ) {
        moveCategory(id, "completed");
    } else {
        saveAndRender();
    }
}

function deleteAnime(id) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    if (!confirm(`確定刪除《${anime.title}》嗎？`)) return;

    animeList = animeList.filter(
        item => Number(item.id) !== Number(id)
    );

    saveAndRender();
}

function buildAnimeItem(anime) {
    let badge = "";

    if (anime.title.includes("(OVA")) badge = '<span class="badge" style="background:#0284c7">OVA</span>';
    else if (anime.title.includes("(特別篇")) badge = '<span class="badge" style="background:#f59e0b">特別篇</span>';
    else if (anime.title.includes("(劇場版")) badge = '<span class="badge" style="background:#e11d48">劇場版</span>';
    else if (anime.title.includes("(ONA外傳")) badge = '<span class="badge" style="background:#7c3aed">外傳</span>';
    else if (anime.title.includes("(續篇")) badge = '<span class="badge" style="background:#4b5563">續篇</span>';

    let actions = "";

    if (["watching", "backlog"].includes(anime.category)) {
        actions =
            `<button onclick="updateProgress(${anime.id},1)">➕ 看了 1 集</button>` +
            `<button class="btn-next" onclick="moveCategory(${anime.id},'completed')">🎉 追完</button>`;
    } else if (anime.category === "review") {
        actions =
            `<button onclick="updateProgress(${anime.id},1)">➕ 複習 1 集</button>` +
            `<button class="btn-next" onclick="moveCategory(${anime.id},'completed')">🎉 複習完</button>`;
    } else if (anime.category === "waiting") {
        actions = '<div style="font-size:11px;color:#94a3b8;padding:6px;">🛰️ 智慧監測開播中……</div>';
    } else {
        actions =
            `<button onclick="moveCategory(${anime.id},'watching')">🔄 重看</button>` +
            `<button class="btn-review" onclick="moveCategory(${anime.id},'review')">🧠 複習</button>`;
    }

    let meta;

    if (["watching", "backlog"].includes(anime.category)) {
        meta = `進度：${anime.watched} / ${escapeHtml(anime.episodes)} 集`;
    } else if (anime.category === "review") {
        meta = `🧠 已複習 ${anime.watched} / ${escapeHtml(anime.episodes)} 集`;
    } else if (anime.category === "waiting") {
        meta = `預計開播：<span style="color:#f59e0b;font-weight:bold">${escapeHtml(anime.airDate)}</span>`;
    } else {
        meta = `✨ 全 ${escapeHtml(anime.episodes)} 集觀看完畢`;
    }

    return `
        <div class="anime-item">
            <div class="anime-title">${badge}<span>${escapeHtml(anime.title)}</span></div>
            <div class="anime-meta">${meta}</div>
            <div class="btn-group">
                ${actions}
                <button class="btn-edit" onclick="editTitle(${anime.id})">✏️ 改名</button>
                <button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button>
            </div>
        </div>
    `;
}

function renderList() {
    const openGroups = new Set();

    document
        .querySelectorAll("details.series-group[open]")
        .forEach(detail =>
            openGroups.add(detail.dataset.groupkey)
        );

    const categories = {
        watching: [],
        backlog: [],
        review: [],
        waiting: [],
        completed: []
    };

    for (const anime of animeList) {
        if (anime && categories[anime.category]) {
            categories[anime.category].push(anime);
        }
    }

    for (const [category, items] of Object.entries(categories)) {
        const seriesMap = {};

        for (const anime of items) {
            const core = getCoreTitle(anime.title) || anime.title;
            (seriesMap[core] ||= []).push(anime);
        }

        let html = "";

        for (const [core, series] of Object.entries(seriesMap)) {
            if (series.length === 1) {
                html += buildAnimeItem(series[0]);
                continue;
            }

            const key = `${category}_${core}`;
            html += `
                <details class="series-group" data-groupkey="${escapeHtml(key)}" ${openGroups.has(key) ? "open" : ""}>
                    <summary class="series-summary">
                        <span>📦 ${escapeHtml(core)}
                            <small style="color:#94a3b8;font-weight:normal;margin-left:6px;">(共 ${series.length} 部)</small>
                        </span>
                    </summary>
                    <div class="series-content">${series.map(buildAnimeItem).join("")}</div>
                </details>
            `;
        }

        const emptyMessages = {
            watching: "暫無連載中動漫",
            backlog: "暫無補番中動漫",
            review: "目前空空如也",
            waiting: "暫無敲碗中動漫",
            completed: "暫無已追完動漫"
        };

        document.getElementById(`list-${category}`).innerHTML =
            html ||
            `<div class="empty">${emptyMessages[category]}</div>`;
    }
}

function exportData() {
    if (animeList.length === 0) {
        showToast("⚠️ 目前沒有資料可以匯出。");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(animeList, null, 2)],
        { type: "application/json;charset=utf-8" }
    );

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `anime_backup_${new Date().toISOString().slice(0, 10)}.json`;
    link.click();
    URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = loadEvent => {
        try {
            const list = JSON.parse(loadEvent.target.result);

            if (!Array.isArray(list)) {
                throw new Error("格式錯誤");
            }

            if (!confirm("匯入會覆蓋目前追番清單，確定繼續嗎？")) {
                return;
            }

            animeList = list;
            saveAndRender();
            showToast(`📥 已還原 ${animeList.length} 部作品！`);
        } catch {
            showToast("❌ 匯入失敗，請確認是正確的 JSON 備份。");
        } finally {
            event.target.value = "";
        }
    };

    reader.readAsText(file);
}

function formatEventDate(value) {
    if (!value) return "日期不明";

    const date = new Date(value.length === 10 ? `${value}T00:00:00Z` : value);
    if (Number.isNaN(date.getTime())) return "日期不明";

    return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        timeZone: "Asia/Taipei"
    }).format(date);
}

function todayDateKey() {
    const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
    }).formatToParts(new Date());

    const values = Object.fromEntries(
        parts
            .filter(part => part.type !== "literal")
            .map(part => [part.type, part.value])
    );

    return `${values.year}-${values.month}-${values.day}`;
}

function isVisibleEvent(event) {
    const today = todayDateKey();

    if (event.eventStatus === "expired") return false;
    if (event.eventEndDate && event.eventEndDate < today) return false;

    return true;
}

function eventStatusInfo(event) {
    if (event.eventStatus === "ongoing") {
        return { label: "🟢 進行中", className: "ongoing" };
    }

    if (event.eventStatus === "ongoing-unconfirmed") {
        return { label: "🟢 可能進行中", className: "ongoing" };
    }

    if (event.eventStatus === "upcoming") {
        return { label: "🔵 即將開始", className: "upcoming" };
    }

    return { label: "🟡 日期待確認", className: "unknown" };
}

function formatEventPeriod(event) {
    if (event.eventStartDate && event.eventEndDate) {
        return `${formatEventDate(event.eventStartDate)} ～ ${formatEventDate(event.eventEndDate)}`;
    }

    if (event.eventStartDate) {
        return `${formatEventDate(event.eventStartDate)} 起（結束日期待確認）`;
    }

    return "活動期間待確認，請查看原文";
}

function eventSortValue(event) {
    const statusRank = {
        ongoing: 0,
        "ongoing-unconfirmed": 1,
        upcoming: 2,
        "date-unknown": 3
    };

    const rank = statusRank[event.eventStatus] ?? 9;
    const date = event.eventStartDate || event.publishedAt || "9999-12-31";
    return { rank, date };
}

function fillEventFilters() {
    const locationSelect = document.getElementById("event-location");
    const typeSelect = document.getElementById("event-type");

    const locations = [
        ...new Set(
            eventList.flatMap(event =>
                Array.isArray(event.locations)
                    ? event.locations
                    : []
            )
        )
    ].sort();

    const types = [
        ...new Set(
            eventList.map(event => event.type).filter(Boolean)
        )
    ].sort();

    const oldLocation = locationSelect.value;
    const oldType = typeSelect.value;

    locationSelect.innerHTML =
        '<option value="">全部地區</option>' +
        locations.map(location =>
            `<option value="${escapeHtml(location)}">${escapeHtml(location)}</option>`
        ).join("");

    typeSelect.innerHTML =
        '<option value="">全部類型</option>' +
        types.map(type =>
            `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`
        ).join("");

    locationSelect.value = oldLocation;
    typeSelect.value = oldType;
}

function updateEventStatus() {
    const status = document.getElementById("event-status");
    const updateTime = eventMeta.updatedAt
        ? formatEventDate(eventMeta.updatedAt)
        : "尚未更新";

    if (eventMeta.fetchStatus === "error") {
        status.innerHTML =
            `❌ 本次自動更新失敗，但上一版有效資料仍保留。<br>` +
            `${escapeHtml(eventMeta.lastError || "")}`;
        return;
    }

    if (eventMeta.fetchStatus === "not-run") {
        status.innerHTML =
            "⚠️ 已清除舊的錯誤活動資料。請到 GitHub Actions 執行一次「更新巴哈姆特動漫活動」。";
        return;
    }

    const statusText =
        eventMeta.fetchStatus === "partial"
            ? "⚠️ 部分文章讀取失敗，已顯示成功確認的活動"
            : "✅ 已排除過期、回顧與舊年份活動";

    status.innerHTML =
        `${statusText}<br>` +
        `最後更新：${escapeHtml(updateTime)}｜` +
        `目前顯示：${Number(eventMeta.storedEventCount || eventList.length)} 則<br>` +
        `本次排除過期：${Number(eventMeta.expiredRemovedCount || 0)} 則｜` +
        `排除落幕／回顧：${Number(eventMeta.recapRemovedCount || 0)} 則`;
}

function renderEvents() {
    const keyword = document.getElementById("event-keyword").value.trim().toLowerCase();
    const location = document.getElementById("event-location").value;
    const type = document.getElementById("event-type").value;

    const filtered = eventList
        .filter(isVisibleEvent)
        .filter(event => {
            const text = `${event.title || ""} ${event.summary || ""}`.toLowerCase();

            return (
                (!keyword || text.includes(keyword)) &&
                (!type || event.type === type) &&
                (
                    !location ||
                    (
                        Array.isArray(event.locations) &&
                        event.locations.includes(location)
                    )
                )
            );
        })
        .sort((a, b) => {
            const valueA = eventSortValue(a);
            const valueB = eventSortValue(b);

            if (valueA.rank !== valueB.rank) {
                return valueA.rank - valueB.rank;
            }

            return valueA.date.localeCompare(valueB.date);
        });

    document.getElementById("event-count").textContent =
        `顯示 ${filtered.length} / ${eventList.length} 則近期活動消息`;

    const container = document.getElementById("event-list");

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty">
                目前沒有符合條件的近期活動。<br>
                若剛更新檔案，請先到 GitHub Actions 執行一次更新。
            </div>
        `;
        return;
    }

    container.innerHTML = filtered.map(event => {
        const locations = Array.isArray(event.locations)
            ? event.locations
            : [];
        const state = eventStatusInfo(event);
        const cardClass = event.eventStatus === "upcoming"
            ? "upcoming"
            : event.confidence === "high"
                ? "high"
                : "candidate";

        return `
            <article class="event-card ${cardClass}">
                <div class="event-title">${escapeHtml(event.title)}</div>

                <div class="event-badges">
                    <span class="event-badge">${escapeHtml(event.type || "活動")}</span>
                    <span class="event-state ${state.className}">${state.label}</span>
                    ${locations.map(item =>
                        `<span class="event-badge location">📍 ${escapeHtml(item)}</span>`
                    ).join("")}
                </div>

                <div class="event-date">
                    📅 活動期間：${escapeHtml(formatEventPeriod(event))}
                </div>

                <div class="event-meta">
                    📰 消息發布：${escapeHtml(formatEventDate(event.publishedAt))}<br>
                    資料來源：${escapeHtml(event.source || "巴哈姆特 GNN")}
                    ${event.discoverySource ? `｜${escapeHtml(event.discoverySource)}` : ""}
                </div>

                ${event.summary
                    ? `<div class="event-summary">${escapeHtml(event.summary)}</div>`
                    : ""
                }

                <div class="event-warning">
                    ⚠️ ${escapeHtml(event.verification || "活動詳情請以原文與主辦方公告為準。")}
                </div>

                <a class="event-link" href="${escapeHtml(event.url)}" target="_blank" rel="noopener noreferrer">
                    前往巴哈姆特查看原文
                </a>
            </article>
        `;
    }).join("");
}

async function loadEvents(showMessage = false) {
    const status = document.getElementById("event-status");
    status.textContent = "正在讀取活動資料……";

    try {
        const response = await fetch(
            `events.json?t=${Date.now()}`,
            { cache: "no-store" }
        );

        if (!response.ok) {
            throw new Error(`events.json HTTP ${response.status}`);
        }

        const data = await response.json();
        eventMeta = data?.meta || {};
        eventList = Array.isArray(data?.events)
            ? data.events.filter(isVisibleEvent)
            : [];

        fillEventFilters();
        updateEventStatus();
        renderEvents();

        if (showMessage) {
            showToast(`🇹🇼 已重新載入 ${eventList.length} 則近期活動！`);
        }
    } catch (error) {
        status.innerHTML =
            `❌ 無法讀取 events.json：${escapeHtml(error.message)}<br>` +
            "請確認 events.json 和 index.html 位於同一層。";

        document.getElementById("event-list").innerHTML =
            '<div class="empty">活動資料暫時無法顯示。</div>';
    }
}

document.getElementById("search-input").addEventListener("keydown", event => {
    if (event.key === "Enter" && !searchBtn.disabled) {
        event.preventDefault();
        searchAnime();
    }
});

document.getElementById("event-keyword").addEventListener("input", renderEvents);
document.getElementById("event-location").addEventListener("change", renderEvents);
document.getElementById("event-type").addEventListener("change", renderEvents);

loadStoredAnime();
renderList();
loadEvents();
</script>
