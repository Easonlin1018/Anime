<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動動漫追番基地 v10.5.0</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 620px; }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        input, textarea, button, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
        }

        select {
            cursor: pointer;
            font-weight: bold;
            background-color: #1e293b;
            color: #38bdf8;
        }

        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button:active { filter: brightness(0.8); }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .series-group {
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .series-group[open] {
            border-color: #7c3aed;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
        }

        .series-summary {
            padding: 14px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            user-select: none;
            list-style: none;
        }

        .series-summary::-webkit-details-marker { display: none; }

        .series-summary::after {
            content: "展開 ▾";
            font-size: 11px;
            color: #38bdf8;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-weight: normal;
        }

        details[open] .series-summary::after {
            content: "收起 ▴";
            color: #f43f5e;
        }

        .series-content {
            padding: 10px;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 6px;
        }

        .series-content .anime-item {
            border-left: 4px solid #7c3aed;
            background: #1e293b;
        }

        .anime-title {
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .anime-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .anime-list-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(150px, .8fr) auto;
            gap: 8px;
            margin-bottom: 8px;
        }

        .anime-list-toolbar input,
        .anime-list-toolbar select,
        .anime-list-toolbar button { margin: 0; min-width: 0; }
        .anime-list-toolbar button { width: auto; white-space: nowrap; background: #475569; }
        .anime-list-summary { color: #94a3b8; font-size: 12px; margin: 0 0 12px; }
        .anime-list-no-results { display: none; }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-group button {
            padding: 6px;
            font-size: 12px;
            margin: 0;
            width: auto;
            flex: 1;
            min-width: 55px;
        }

        .btn-edit { background-color: #0284c7; }
        .btn-del { background-color: var(--accent-color); }
        .btn-next { background-color: #16a34a; }
        .btn-review { background-color: #9333ea; }
        .btn-scan { background-color: #7c3aed; margin-bottom: 12px; }
        .btn-batch { background-color: #f59e0b; color: #0f172a; }
        .btn-backup { background-color: #0d9488; }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.97);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%;
            max-width: 320px;
            line-height: 1.6;
        }

        .event-status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 9px;
            background: #111827;
            color: #cbd5e1;
            font-size: 12px;
            line-height: 1.6;
        }

        .event-controls {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr 1fr;
            gap: 7px;
            margin-bottom: 10px;
        }

        .event-controls input,
        .event-controls select {
            margin-bottom: 0;
            min-width: 0;
        }

        .event-card {
            padding: 13px;
            margin-bottom: 10px;
            background: #111827;
            border: 1px solid var(--border-color);
            border-left: 4px solid #8b5cf6;
            border-radius: 10px;
        }

        .event-card.high { border-left-color: #22c55e; }
        .event-card.candidate { border-left-color: #f59e0b; }
        .event-card.upcoming { border-left-color: #38bdf8; }

        .event-date {
            margin: 8px 0;
            padding: 8px 9px;
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.09);
            color: #bae6fd;
            font-size: 12px;
            line-height: 1.6;
        }

        .event-state {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            font-weight: bold;
        }

        .event-state.ongoing {
            background: #14532d;
            color: #bbf7d0;
        }

        .event-state.upcoming {
            background: #164e63;
            color: #a5f3fc;
        }

        .event-state.unknown {
            background: #78350f;
            color: #fde68a;
        }

        .event-title {
            font-size: 15px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .event-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }

        .event-badge {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            background: #312e81;
            color: #ddd6fe;
        }

        .event-badge.location {
            background: #164e63;
            color: #a5f3fc;
        }

        .event-meta,
        .event-summary,
        .event-warning {
            font-size: 12px;
            line-height: 1.6;
        }

        .event-meta { color: #94a3b8; }
        .event-summary { color: #cbd5e1; margin: 8px 0; }

        .event-warning {
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.1);
            padding: 7px 8px;
            border-radius: 7px;
            margin: 8px 0;
        }

        .event-link {
            display: inline-block;
            padding: 8px 10px;
            border-radius: 7px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }

        .empty {
            color: #64748b;
            font-size: 12px;
            line-height: 1.7;
            text-align: center;
            padding: 14px;
        }



        .event-toolbar, .event-tabs, .location-chips, .event-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 10px;
        }
        .event-toolbar button, .event-tabs button, .location-chips button, .event-actions button {
            width: auto;
            margin: 0;
            padding: 7px 10px;
            font-size: 11px;
            flex: none;
        }
        .event-tabs button.active, .location-chips button.active { background: #7c3aed; }
        .event-card.matched { box-shadow: 0 0 0 1px #a855f7, 0 0 18px rgba(168,85,247,.2); }
        .event-card.dismissed { opacity: .45; }
        .event-match { background:#581c87; color:#f3e8ff; }
        .event-countdown { font-weight: 700; color:#fef08a; }
        .event-actions .want { background:#ca8a04; }
        .event-actions .going { background:#059669; }
        .event-actions .visited { background:#7c3aed; }
        .event-actions .edit { background:#0284c7; }
        .event-actions .hide { background:#475569; }
        .event-actions button.selected { outline:2px solid #fff; }
        .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .settings-grid > * { margin-bottom:0; }
        .tiny-note { color:#94a3b8; font-size:11px; line-height:1.6; margin:8px 0; }
        .archive-title { margin:16px 0 8px; font-weight:bold; color:#c4b5fd; }


        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 8px;
        }

        .calendar-day {
            background: #111827;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-height: 110px;
            padding: 9px;
        }

        .calendar-day.today { border-color: #38bdf8; }
        .calendar-day-title { font-size: 12px; font-weight: bold; color: #93c5fd; margin-bottom: 7px; }
        .calendar-anime { background: #1e293b; border-radius: 7px; padding: 7px; margin-bottom: 6px; font-size: 11px; line-height: 1.45; }
        .calendar-time { color: #fcd34d; font-weight: bold; }
        .anime-extra { margin: 7px 0; padding: 8px; border-radius: 7px; background: rgba(15,23,42,.65); font-size: 11px; line-height: 1.65; color: #cbd5e1; }
        .platform-links { display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
        .platform-link { display:inline-block; padding:3px 7px; border-radius:999px; background:#164e63; color:#a5f3fc; text-decoration:none; font-size:10px; }
        .work-event-search { display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:8px; margin-bottom:8px; }
        .work-event-search input, .work-event-search button { margin-bottom:0; }
        .work-event-search button { width:auto; }
        .live-search-status {
            display:none;
            margin:0 0 10px;
            padding:9px 11px;
            border-radius:8px;
            border:1px solid #334155;
            background:#111827;
            color:#cbd5e1;
            font-size:11px;
            line-height:1.6;
        }
        .live-search-status.running { display:block; border-color:#0369a1; background:#082f49; color:#bae6fd; }
        .live-search-status.success { display:block; border-color:#047857; background:#052e2b; color:#a7f3d0; }
        .live-search-status.warning { display:block; border-color:#a16207; background:#422006; color:#fde68a; }
        .live-search-status.error { display:block; border-color:#b91c1c; background:#450a0a; color:#fecaca; }
        .event-travel { color:#a5b4fc; font-size:11px; margin:7px 0; }
        .event-admission { background:#713f12; color:#fef3c7; }
        .bottom-nav { display:none; }

        @media (max-width: 760px) {
            body { padding-bottom: 78px; }
            .calendar-grid { grid-template-columns: 1fr; }
            .work-event-search { grid-template-columns: 1fr; }
            .bottom-nav {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 90;
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 1px;
                background: #0f172a;
                border-top: 1px solid #334155;
                padding: 7px 6px max(7px, env(safe-area-inset-bottom));
            }
            .bottom-nav button {
                margin: 0;
                padding: 7px 2px;
                border-radius: 7px;
                background: #1e293b;
                font-size: 10px;
                min-width: 0;
            }
        }

        @media (max-width: 600px) {
            .event-controls { grid-template-columns: 1fr; }
            .anime-list-toolbar { grid-template-columns: 1fr; }
            .anime-list-toolbar button { width: 100%; }
            .btn-group button { flex: 1 1 calc(50% - 5px); min-width: 0; }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🎬 全自動動漫追番基地 v10.5.0</h1>

    <div class="section" id="add-section">
        <div class="section-title">➕ 一鍵自動化新增（單部搜尋）</div>
        <input type="text" id="search-input" placeholder="輸入單部動漫名稱">
        <button id="search-btn" onclick="searchAnime()">🔍 智慧網格搜尋</button>
    </div>

    <div class="section">
        <div class="section-title">🚀 批次自動化多載入網格</div>
        <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:5px;">
            請選擇這批動漫要歸類到哪裡：
        </label>

        <select id="batch-category-target">
            <option value="backlog">🎬 官方已完結（補番中）</option>
            <option value="watching">⚡ 正在連載 / 正在追</option>
            <option value="review">🧠 溫故知新（需要複習區）</option>
            <option value="waiting">⏳ 敲碗等待開播</option>
        </select>

        <textarea id="batch-input" placeholder="在此處貼入大量動漫名稱&#10;每行一部作品..."></textarea>
        <button id="batch-btn" class="btn-batch" onclick="batchSearchAnime()">⚡ 啟動批次雷達搜尋</button>
    </div>

    <div class="section" id="settings-section">
        <div class="section-title">⚙️ 資料控制與智慧雷達</div>
        <button class="btn-scan" onclick="manualScanSequels()">🛰️ 立即手動主動偵測續作</button>

        <div style="display:flex;gap:10px;">
            <button class="btn-backup" onclick="exportData()" style="margin-bottom:0;flex:1;">📤 匯出資料</button>
            <input type="file" id="import-file" accept=".json,application/json" style="display:none;" onchange="importData(event)">
            <button class="btn-edit" onclick="document.getElementById('import-file').click()" style="margin-bottom:0;flex:1;">📥 匯入還原</button>
        </div>
    </div>


    <div class="section" id="calendar-section">
        <div class="section-title">
            <span>📅 新番播出日曆</span>
            <button onclick="syncAnimeMetadata(true)" style="width:auto;margin:0;padding:6px 9px;font-size:11px;background:#0d9488;">同步集數</button>
        </div>
        <div id="calendar-status" class="event-status">正在整理追番播出資訊……</div>
        <div id="airing-calendar" class="calendar-grid"></div>
    </div>

    <div class="section" id="events-section">
        <div class="section-title">
            <span>🇹🇼 台灣動漫活動雷達 v10.5</span>
            <button onclick="loadEvents(true)" style="width:auto;margin:0;padding:6px 9px;font-size:11px;background:#7c3aed;">重新載入</button>
        </div>

        <div id="event-status" class="event-status">正在讀取活動資料……</div>

        <div class="event-toolbar">
            <button onclick="requestEventNotifications()">🔔 開啟瀏覽器提醒</button>
            <button onclick="configureEventRegion()">📍 設定我的地區</button>
            <button onclick="exportEventData()">📤 匯出活動資料</button>
            <input type="file" id="event-import-file" accept=".json,application/json" style="display:none" onchange="importEventData(event)">
            <button onclick="document.getElementById('event-import-file').click()">📥 匯入活動資料</button>
        </div>

        <div class="event-tabs" id="event-tabs">
            <button data-tab="all" class="active" onclick="setEventTab('all')">全部</button>
            <button data-tab="want" onclick="setEventTab('want')">⭐ 想去</button>
            <button data-tab="going" onclick="setEventTab('going')">✅ 要去</button>
            <button data-tab="visited" onclick="setEventTab('visited')">🎫 去過</button>
            <button data-tab="matched" onclick="setEventTab('matched')">💜 追番相關</button>
            <button data-tab="archive" onclick="setEventTab('archive')">📦 歷史活動</button>
        </div>

        <div class="location-chips" id="location-chips"></div>

        <div class="work-event-search">
            <input id="work-event-input" list="anime-title-options" type="search" placeholder="輸入任意作品，立即上網搜尋相關活動">
            <datalist id="anime-title-options"></datalist>
            <button id="work-event-btn" onclick="searchEventsByWork()">⚡ 即時搜尋作品活動</button>
            <button onclick="configureLiveSearch()" style="background:#475569;">⚙️ 搜尋設定</button>
        </div>
        <div id="live-search-status" class="live-search-status"></div>

        <div class="event-controls">
            <input id="event-keyword" type="search" placeholder="搜尋活動、作品或場館">
            <select id="event-location"><option value="">全部地區</option></select>
            <select id="event-type"><option value="">全部類型</option></select>
            <select id="event-admission"><option value="">全部入場方式</option></select>
        </div>

        <div class="tiny-note">收藏、修正、隱藏與去過狀態會保存在這台裝置。Discord、Telegram、Email 通知可透過 GitHub Secrets 啟用。</div>
        <div id="event-count" class="anime-meta"></div>
        <div id="event-list"></div>
    </div>

    <div class="section" id="anime-section"><div class="section-title">⚡ 正在連載 / 正在追</div><div id="list-watching"></div></div>
    <div class="section" id="backlog-section">
        <div class="section-title">🎬 官方已完結（補番中）</div>
        <div class="anime-list-toolbar" role="search" aria-label="搜尋與排序動漫">
            <input id="anime-list-search" type="search" placeholder="搜尋作品名稱、別名、平台或筆記" autocomplete="off">
            <select id="anime-list-sort" aria-label="動漫排序方式">
                <option value="watching-first">正在看優先</option>
                <option value="recent-watched">最近觀看</option>
                <option value="name">名稱</option>
                <option value="progress-desc">進度最高</option>
                <option value="progress-asc">進度最低</option>
                <option value="recent-added">最近新增</option>
            </select>
            <button id="anime-list-clear" type="button">清除搜尋</button>
        </div>
        <div id="anime-list-summary" class="anime-list-summary" aria-live="polite"></div>
        <div id="anime-list-no-results" class="empty anime-list-no-results">找不到符合條件的動漫</div>
        <div id="list-backlog"></div>
    </div>
    <div class="section"><div class="section-title">🧠 溫故知新（需要複習區）</div><div id="list-review"></div></div>
    <div class="section"><div class="section-title">⏳ 敲碗等待開播</div><div id="list-waiting"></div></div>
    <div class="section"><div class="section-title">🎉 已追完 / 看完了</div><div id="list-completed"></div></div>
</div>

<nav class="bottom-nav" aria-label="手機版導覽">
    <button onclick="scrollToSection('anime-section')">🎬<br>追番</button>
    <button onclick="scrollToSection('calendar-section')">📅<br>日曆</button>
    <button onclick="scrollToSection('events-section')">🎪<br>活動</button>
    <button onclick="openFavoriteEvents()">⭐<br>收藏</button>
    <button onclick="scrollToSection('settings-section')">⚙️<br>設定</button>
</nav>

<div id="toast-box" class="toast">
    <div id="toast-msg"></div>
    <button style="margin-top:15px;margin-bottom:0;width:auto;padding:5px 15px;background:#475569;" onclick="closeToast()">關閉</button>
</div>

<script>
const STORAGE_KEY = "anime_list_v8_8";
const ANIME_SORT_KEY = "anime_list_sort_v10_6";
const OLD_KEYS = [
    "anime_list_v8_7", "anime_list_v8_6", "anime_list_v8_5",
    "anime_list_v8_4", "anime_list_v8_3", "anime_list_v8_2",
    "anime_list_v8_1", "anime_list_v8_0"
];

let animeList = [];
let animeListQuery = "";
let animeListSort = localStorage.getItem(ANIME_SORT_KEY) || "watching-first";
let eventList = [];
let eventArchive = [];
let eventMeta = {};
let eventTab = "all";
let activeWorkSearch = { query: "", terms: [] };
let animeSyncing = false;
const ANIME_SYNC_KEY = "anime_metadata_sync_v10_1";
const WORK_ALIAS_CACHE_KEY = "anime_work_alias_cache_v10_4";
const LIVE_SEARCH_API_KEY = "anime_live_search_api_v10_4";
const LIVE_SEARCH_PENDING_KEY = "anime_live_search_pending_v10_4";
const EVENT_PREFS_KEY = "anime_event_prefs_v10";
const EVENT_OVERRIDES_KEY = "anime_event_overrides_v10";
const EVENT_SETTINGS_KEY = "anime_event_settings_v10";
const EVENT_SEEN_KEY = "anime_event_seen_v10";
let eventPrefs = JSON.parse(localStorage.getItem(EVENT_PREFS_KEY) || "{}");
let eventOverrides = JSON.parse(localStorage.getItem(EVENT_OVERRIDES_KEY) || "{}");

try {
    workAliasCache = JSON.parse(localStorage.getItem(WORK_ALIAS_CACHE_KEY) || "{}") || {};

}
let toastTimer = null;

const searchBtn = document.getElementById("search-btn");
const batchBtn = document.getElementById("batch-btn");

function loadStoredAnime() {
    try {
        const current = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(current)) animeList = current;
    } catch {
        animeList = [];
    }

    if (animeList.length === 0) {
        for (const key of OLD_KEYS) {
            try {
                const old = JSON.parse(localStorage.getItem(key) || "[]");
                if (Array.isArray(old) && old.length > 0) {
                    animeList = old;
                    break;
                }
            } catch {}
        }
    }

    animeList = animeList.map(item => ({
        ...item,
        lastWatchedAt: item.lastWatchedAt || null,
        addedAt: item.addedAt || null,
        aliases: normalizeAnimeAliasList([
            item.title,
            ...(Array.isArray(item.aliases) ? item.aliases : [])
        ])
    }));

    localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
}

function saveAndRender() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
    renderList();
}

function showToast(message, duration = 3500) {
    clearTimeout(toastTimer);
    document.getElementById("toast-msg").innerHTML = message;
    document.getElementById("toast-box").style.display = "block";
    toastTimer = setTimeout(closeToast, duration);
}

function closeToast() {
    clearTimeout(toastTimer);
    document.getElementById("toast-box").style.display = "none";
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function setSearchLoading(loading) {
    searchBtn.disabled = loading;
    searchBtn.innerText = loading
        ? "⚡ 正在搜尋中..."
        : "🔍 智慧網格搜尋";
}

async function fetchWithTimeout(url, options = {}, timeout = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);

    try {
        const response = await fetch(url, {
            ...options,
            signal: controller.signal
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        return response;
    } finally {
        clearTimeout(timer);
    }
}

async function translateText(text, toLang = "zh-TW") {
    if (!text) return null;

    try {
        const response = await fetchWithTimeout(
            "https://translate.googleapis.com/translate_a/single" +
            `?client=gtx&sl=auto&tl=${encodeURIComponent(toLang)}` +
            `&dt=t&q=${encodeURIComponent(text)}`,
            {},
            10000
        );

        const data = await response.json();

        if (Array.isArray(data?.[0])) {
            return data[0]
                .map(item => Array.isArray(item) ? item[0] || "" : "")
                .join("") || null;
        }
    } catch (error) {
        console.warn("翻譯服務失敗：", error);
    }

    return null;
}

async function batchSearchAnime() {
    const inputArea = document.getElementById("batch-input");
    const targetCategory = document.getElementById("batch-category-target").value;
    const lines = inputArea.value
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

    if (lines.length === 0) {
        showToast("⚠️ 文字框內沒有動漫名稱！");
        return;
    }

    batchBtn.disabled = true;
    let successCount = 0;
    const failed = [];

    try {
        for (let i = 0; i < lines.length; i++) {
            batchBtn.innerHTML =
                `⚡ 正在載入 (${i + 1}/${lines.length})<br>` +
                `🎬 《${escapeHtml(lines[i])}》`;

            const success = await searchAnime(
                lines[i],
                true,
                null,
                null,
                targetCategory
            );

            if (success) successCount++;
            else failed.push(lines[i]);

            await delay(850);
        }
    } finally {
        batchBtn.disabled = false;
        batchBtn.innerText = "⚡ 啟動批次雷達搜尋";
    }

    inputArea.value = failed.join("\n");

    showToast(
        `批次完成！<br>成功：<b style="color:#22c55e">${successCount}</b> 部<br>` +
        `未成功或重複：<b style="color:#ef4444">${failed.length}</b> 部`,
        5000
    );
}

function getCoreTitle(title) {
    return String(title || "")
        .replace(/\s*第[一二三四五六七八九十百0-9]+[季期]\s*$/g, "")
        .replace(/\s*Season\s*[0-9]+\s*$/gi, "")
        .replace(/\s*\((OVA|特別篇|劇場版|ONA外傳|續篇).*?\)\s*$/gi, "")
        .trim();
}

function generateSmartTitle(media, parentChineseTitle, wikiZhTitle, googleZhTitle) {
    const combinedText = [
        media.title?.native || "",
        media.title?.english || "",
        media.title?.romaji || ""
    ].join(" ");

    const lower = combinedText.toLowerCase();

    let coreTitle =
        wikiZhTitle ||
        googleZhTitle ||
        media.title?.native ||
        media.title?.romaji ||
        media.title?.english ||
        "未命名作品";

    if (parentChineseTitle) {
        coreTitle = getCoreTitle(parentChineseTitle);
    }

    const seasons = [
        [5, ["season 5", "5th season", "第5期", "第五季"]],
        [4, ["season 4", "4th season", "第4期", "第四季"]],
        [3, ["season 3", "3rd season", "第3期", "第三季"]],
        [2, ["season 2", "2nd season", "第2期", "第二季"]]
    ];

    for (const [number, words] of seasons) {
        if (
            words.some(word =>
                lower.includes(word.toLowerCase()) ||
                combinedText.includes(word)
            )
        ) {
            return `${coreTitle} 第${["", "一", "二", "三", "四", "五"][number]}季`;
        }
    }

    if (parentChineseTitle) {
        const yearSuffix = media.startDate?.year
            ? ` - ${media.startDate.year}年`
            : "";

        if (media.format === "OVA") return `${coreTitle} (OVA${yearSuffix})`;
        if (media.format === "SPECIAL") return `${coreTitle} (特別篇${yearSuffix})`;
        if (media.format === "MOVIE") return `${coreTitle} (劇場版${yearSuffix})`;
        if (media.format === "ONA") return `${coreTitle} (ONA外傳${yearSuffix})`;
        return `${coreTitle} (續篇${yearSuffix})`;
    }

    return coreTitle;
}

async function searchWikipedia(input) {
    try {
        const searchResponse = await fetchWithTimeout(
            "https://zh.wikipedia.org/w/api.php" +
            `?action=query&list=search&srsearch=${encodeURIComponent(input)}` +
            "&format=json&origin=*",
            {},
            10000
        );

        const searchData = await searchResponse.json();
        const wikiZhTitle = searchData?.query?.search?.[0]?.title || null;

        if (!wikiZhTitle) {
            return { wikiZhTitle: null, wikiJaTitle: null };
        }

        const languageResponse = await fetchWithTimeout(
            "https://zh.wikipedia.org/w/api.php" +
            `?action=query&titles=${encodeURIComponent(wikiZhTitle)}` +
            "&prop=langlinks&lllang=ja&format=json&origin=*",
            {},
            10000
        );

        const languageData = await languageResponse.json();
        const pages = languageData?.query?.pages || {};
        let wikiJaTitle = null;

        for (const pageId in pages) {
            wikiJaTitle = pages[pageId]?.langlinks?.[0]?.["*"] || null;
            if (wikiJaTitle) break;
        }

        return { wikiZhTitle, wikiJaTitle };
    } catch (error) {
        console.warn("維基搜尋失敗：", error);
        return { wikiZhTitle: null, wikiJaTitle: null };
    }
}

const MEDIA_FIELDS = `
    id format
    title { native english romaji }
    synonyms
    status episodes
    startDate { year month day }
    endDate { year month day }
    nextAiringEpisode { airingAt episode timeUntilAiring }
    externalLinks { site url type }
    relations {
        edges {
            relationType
            node {
                id format
                title { native english romaji }
                status
            }
        }
    }
`;

const SEARCH_QUERY = `
query ($search: String) {
    Media(search: $search, type: ANIME) {
        ${MEDIA_FIELDS}
    }
}`;

const ID_QUERY = `
query ($id: Int) {
    Media(id: $id, type: ANIME) {
        ${MEDIA_FIELDS}
    }
}`;

const ANIME_BATCH_QUERY = `
query ($ids: [Int]) {
    Page(page: 1, perPage: 50) {
        media(id_in: $ids, type: ANIME) {
            ${MEDIA_FIELDS}
        }
    }
}`;

async function requestAniList(query, variables) {
    const response = await fetchWithTimeout(
        "https://graphql.anilist.co",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({ query, variables })
        },
        15000
    );

    const data = await response.json();
    return data?.data?.Media || null;
}

async function requestAniListMediaPage(ids) {
    const response = await fetchWithTimeout(
        "https://graphql.anilist.co",
        {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ query: ANIME_BATCH_QUERY, variables: { ids } })
        },
        20000
    );
    const data = await response.json();
    if (data?.errors?.length) throw new Error(data.errors[0].message || "AniList 批次同步失敗");
    return Array.isArray(data?.data?.Page?.media) ? data.data.Page.media : [];
}

function normalizeStreamingLinks(links) {
    const known = ["巴哈姆特", "bahamut", "netflix", "disney", "crunchyroll", "youtube", "bilibili", "amazon", "hami", "friDay", "myvideo", "catchplay"];
    const unique = new Map();
    for (const link of Array.isArray(links) ? links : []) {
        if (!link?.url || !link?.site) continue;
        const site = String(link.site);
        const isStreaming = String(link.type || "").toUpperCase() === "STREAMING" || known.some(name => site.toLowerCase().includes(name.toLowerCase()));
        if (isStreaming && !unique.has(site)) unique.set(site, { site, url: link.url });
    }
    return [...unique.values()].slice(0, 8);
}

function releasedEpisodeCount(media, existing = {}) {
    if (media?.nextAiringEpisode?.episode) return Math.max(0, Number(media.nextAiringEpisode.episode) - 1);
    if (media?.status === "FINISHED" && Number(media?.episodes) > 0) return Number(media.episodes);
    return Number(existing.releasedEpisodes) || 0;
}

function applyMediaMetadata(anime, media) {
    anime.status = media.status || anime.status || "UNKNOWN";
    if (Number(media.episodes) > 0) anime.episodes = Number(media.episodes);
    anime.releasedEpisodes = releasedEpisodeCount(media, anime);
    anime.nextEpisode = media.nextAiringEpisode?.episode || null;
    anime.nextAiringAt = media.nextAiringEpisode?.airingAt || null;
    anime.streamingLinks = normalizeStreamingLinks(media.externalLinks);
    anime.aliases = normalizeAnimeAliasList([
        anime.title,
        ...(Array.isArray(anime.aliases) ? anime.aliases : []),
        ...buildWorkAliasesFromMedia(media, anime.title)
    ]);
    anime.lastMetadataSync = new Date().toISOString();
    anime.relations = Array.isArray(media.relations?.edges) ? media.relations.edges : anime.relations || [];
    if (anime.category === "waiting" && media.status === "RELEASING") anime.category = "watching";
    return anime;
}

async function searchAnime(
    keyword = null,
    isQuiet = false,
    parentChineseTitle = null,
    targetId = null,
    forcedCategory = null
) {
    const inputElement = document.getElementById("search-input");
    const input = keyword || inputElement.value.trim();
    const isManual = !isQuiet && !targetId;

    if (!input && !targetId) {
        if (!isQuiet) showToast("⚠️ 請先輸入動漫名稱！");
        return false;
    }

    if (isManual) setSearchLoading(true);

    try {
        let wikiZhTitle = null;
        let wikiJaTitle = null;

        if (!targetId) {
            const wiki = await searchWikipedia(input);
            wikiZhTitle = wiki.wikiZhTitle;
            wikiJaTitle = wiki.wikiJaTitle;
        }

        let media;

        if (targetId) {
            media = await requestAniList(ID_QUERY, {
                id: Number(targetId)
            });
        } else {
            media = await requestAniList(SEARCH_QUERY, {
                search: wikiJaTitle || input
            });

            if (!media && wikiJaTitle) {
                media = await requestAniList(SEARCH_QUERY, {
                    search: input
                });
            }

            if (!media) {
                const translated = await translateText(input, "ja");

                if (translated) {
                    media = await requestAniList(SEARCH_QUERY, {
                        search: translated
                    });
                }
            }
        }

        if (!media) {
            if (!isQuiet) {
                showToast(`❌ 找不到《${escapeHtml(input)}》`);
            }
            return false;
        }

        const duplicate = animeList.find(
            anime => Number(anime.id) === Number(media.id)
        );

        if (duplicate) {
            if (!isQuiet) {
                showToast(`⚠️ 《${escapeHtml(duplicate.title)}》已經在清單裡！`);
            }
            return false;
        }

        const googleZh = await translateText(
            media.title?.native ||
            media.title?.romaji ||
            media.title?.english ||
            "",
            "zh-TW"
        );

        const finalTitle = generateSmartTitle(
            media,
            parentChineseTitle,
            wikiZhTitle,
            googleZh
        );

        const category =
            forcedCategory ||
            (
                media.status === "NOT_YET_RELEASED"
                    ? "waiting"
                    : media.status === "FINISHED"
                        ? "backlog"
                        : "watching"
            );

        const airDate = media.startDate?.year
            ? `${media.startDate.year}年${media.startDate.month || "?"}月`
            : "未定";

        const newAnime = {
            id: Number(media.id),
            title: finalTitle,
            aliases: buildWorkAliasesFromMedia(media, finalTitle, [
                wikiZhTitle,
                wikiJaTitle,
                googleZh,
                input
            ]),
            status: media.status || "UNKNOWN",
            episodes: media.episodes || "??",
            watched: 0,
            category,
            airDate,
            releasedEpisodes: releasedEpisodeCount(media),
            nextEpisode: media.nextAiringEpisode?.episode || null,
            nextAiringAt: media.nextAiringEpisode?.airingAt || null,
            streamingLinks: normalizeStreamingLinks(media.externalLinks),
            rating: null,
            note: "",
            customPlatform: "",
            lastWatchedAt: category === "watching" ? new Date().toISOString() : null,
            addedAt: new Date().toISOString(),
            relations: Array.isArray(media.relations?.edges)
                ? media.relations.edges
                : []
        };

        animeList.push(newAnime);
        saveAndRender();

        if (!keyword && !isQuiet && !targetId) {
            inputElement.value = "";
        }

        if (!isQuiet) {
            showToast(
                `🛰️ 成功加入：<b style="color:#60a5fa">《${escapeHtml(finalTitle)}》</b>`
            );
        }

        if (!forcedCategory && category !== "waiting") {
            checkAndAddSequel(newAnime, true);
        }

        return true;
    } catch (error) {
        console.error("搜尋錯誤：", error);

        if (!isQuiet) {
            showToast(
                error.name === "AbortError"
                    ? "❌ 搜尋逾時，請稍後再試。"
                    : "❌ 搜尋失敗，請稍後再試。"
            );
        }

        return false;
    } finally {
        if (isManual) setSearchLoading(false);
    }
}

async function checkAndAddSequel(anime, isQuiet = false) {
    const sequel = anime?.relations?.find(
        edge => edge?.relationType === "SEQUEL"
    )?.node;

    if (
        !sequel ||
        animeList.some(item => Number(item.id) === Number(sequel.id))
    ) {
        return false;
    }

    await delay(500);

    return await searchAnime(
        null,
        isQuiet,
        anime.title,
        sequel.id
    );
}

async function manualScanSequels() {
    showToast("🛰️ 正在掃描已追完作品的續作……", 5000);
    let found = 0;

    for (const anime of animeList.filter(item => item.category === "completed")) {
        try {
            const media = await requestAniList(ID_QUERY, {
                id: Number(anime.id)
            });

            anime.relations = media?.relations?.edges || [];

            if (await checkAndAddSequel(anime, true)) {
                found++;
            }

            await delay(600);
        } catch (error) {
            console.warn("續作掃描失敗：", error);
        }
    }

    saveAndRender();

    showToast(
        found > 0
            ? `🎉 找到並新增 ${found} 部續作！`
            : "🛰️ 掃描完成，目前沒有未入庫的續作。",
        5000
    );
}

function formatAiringDateTime(timestamp) {
    if (!timestamp) return "尚無播出時間";
    return new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei", weekday: "short", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false
    }).format(new Date(Number(timestamp) * 1000));
}

function renderAiringCalendar() {
    const container = document.getElementById("airing-calendar");
    const status = document.getElementById("calendar-status");
    if (!container || !status) return;
    const scheduled = animeList.filter(anime => anime.nextAiringAt).sort((a,b) => a.nextAiringAt - b.nextAiringAt);
    const weekdays = ["週一","週二","週三","週四","週五","週六","週日"];
    const groups = Object.fromEntries(weekdays.map(day => [day, []]));
    for (const anime of scheduled) {
        const date = new Date(Number(anime.nextAiringAt) * 1000);
        const day = new Intl.DateTimeFormat("zh-TW", { timeZone:"Asia/Taipei", weekday:"short" }).format(date).replace("星期", "週");
        (groups[day] ||= []).push(anime);
    }
    const today = new Intl.DateTimeFormat("zh-TW", { timeZone:"Asia/Taipei", weekday:"short" }).format(new Date()).replace("星期", "週");
    container.innerHTML = weekdays.map(day => `<div class="calendar-day ${day===today?'today':''}"><div class="calendar-day-title">${day}${day===today?'・今天':''}</div>${groups[day].length ? groups[day].map(anime => `<div class="calendar-anime"><b>${escapeHtml(anime.title)}</b><br><span class="calendar-time">第 ${escapeHtml(anime.nextEpisode || '?')} 集</span><br>${escapeHtml(formatAiringDateTime(anime.nextAiringAt))}</div>`).join('') : '<div class="empty" style="padding:7px 0">暫無資料</div>'}</div>`).join('');
    const last = localStorage.getItem(ANIME_SYNC_KEY);
    status.innerHTML = `已取得 ${scheduled.length} 部作品的下集時間｜${last ? `上次同步：${escapeHtml(formatEventDate(last))}` : '尚未同步集數'}`;
}

async function syncAnimeMetadata(showMessage = false) {
    if (animeSyncing) return;
    const ids = animeList.map(anime => Number(anime.id)).filter(Number.isFinite);
    if (ids.length === 0) {
        renderAiringCalendar();
        if (showMessage) showToast("目前沒有動漫可以同步。");
        return;
    }
    animeSyncing = true;
    const status = document.getElementById("calendar-status");
    if (status) status.textContent = "正在從 AniList 同步集數、下集時間與觀看平台……";
    try {
        let synced = 0;
        for (let i = 0; i < ids.length; i += 50) {
            const mediaList = await requestAniListMediaPage(ids.slice(i, i + 50));
            for (const media of mediaList) {
                const anime = animeList.find(item => Number(item.id) === Number(media.id));
                if (anime) { applyMediaMetadata(anime, media); synced++; }
            }
            if (i + 50 < ids.length) await delay(800);
        }
        const now = new Date().toISOString();
        localStorage.setItem(ANIME_SYNC_KEY, now);
        saveAndRender();
        renderAiringCalendar();
        if (showMessage) showToast(`✅ 已同步 ${synced} 部作品的播出資訊！`, 4500);
    } catch (error) {
        console.error(error);
        if (status) status.textContent = `同步失敗：${error.message}`;
        if (showMessage) showToast("❌ 集數同步失敗，稍後再試。", 4500);
    } finally {
        animeSyncing = false;
    }
}

function maybeAutoSyncAnimeMetadata() {
    const last = Date.parse(localStorage.getItem(ANIME_SYNC_KEY) || "");
    if (!Number.isFinite(last) || Date.now() - last > 6 * 60 * 60 * 1000) syncAnimeMetadata(false);
    else renderAiringCalendar();
}

function editAnimeReview(id) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;
    const ratingInput = prompt("評分 0～10（留空可清除）", anime.rating ?? "");
    if (ratingInput === null) return;
    const note = prompt("觀看筆記／短評", anime.note || "");
    if (note === null) return;
    const platform = prompt("自訂觀看平台（例如：巴哈動畫瘋、Netflix）", anime.customPlatform || "");
    if (platform === null) return;
    const rating = ratingInput.trim() === "" ? null : Math.max(0, Math.min(10, Number(ratingInput)));
    anime.rating = Number.isFinite(rating) ? rating : null;
    anime.note = note.trim();
    anime.customPlatform = platform.trim();
    saveAndRender();
}

function setLiveSearchStatus(message, type = "running") {
    const box = document.getElementById("live-search-status");
    if (!box) return;
    box.className = `live-search-status ${type}`;
    box.innerHTML = message;
}

function liveSearchApiUrl() {
    return String(localStorage.getItem(LIVE_SEARCH_API_KEY) || "")
        .trim()
        .replace(/\/+$/, "");
}

async function configureLiveSearch() {
    const current = liveSearchApiUrl();
    const value = prompt(
        "貼上 Cloudflare Worker 網址，例如：https://anime-event-live-search.你的帳號.workers.dev\n留空可清除設定。",
        current
    );
    if (value === null) return;

    const clean = String(value).trim().replace(/\/+$/, "");
    if (!clean) {
        localStorage.removeItem(LIVE_SEARCH_API_KEY);
        setLiveSearchStatus("已清除即時搜尋 API。", "warning");
        return;
    }

    try {
        const response = await fetch(`${clean}/health`, { cache:"no-store" });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
        localStorage.setItem(LIVE_SEARCH_API_KEY, clean);
        setLiveSearchStatus("✅ 即時搜尋後端連線成功。搜尋只保留目前與未來活動，舊年度結果會自動排除。", "success");
        showToast("⚡ 即時搜尋後端已設定完成！", 4500);
    } catch (error) {
        setLiveSearchStatus(`❌ 無法連線到這個 Worker：${escapeHtml(error.message)}`, "error");
    }
}

function mergeLiveSearchEvents(events) {
    if (!Array.isArray(events) || !events.length) return 0;
    const map = new Map();
    const keyFor = event => event.url || event.id || `${normalizeMatchText(event.title)}|${event.eventStartDate || ""}`;
    eventList.forEach(event => map.set(keyFor(event), event));
    let added = 0;

    events.forEach(event => {
        const key = keyFor(event);
        const previous = map.get(key);
        if (previous) {
            map.set(key, {
                ...previous,
                ...event,
                id: previous.id || event.id,
                discoveredAt: previous.discoveredAt || event.discoveredAt,
                workTitles: [...new Set([...(previous.workTitles || []), ...(event.workTitles || [])])],
                matchedAliases: [...new Set([...(previous.matchedAliases || []), ...(event.matchedAliases || [])])]
            });
        } else {
            map.set(key, event);
            added++;
        }
    });

    eventList = [...map.values()];
    return added;
}

async function pollLiveSearchResult(pending, button = null) {
    const started = Date.now();
    const timeout = 7 * 60 * 1000;
    let attempts = 0;

    while (Date.now() - started < timeout) {
        attempts++;
        const elapsed = Math.max(1, Math.round((Date.now() - started) / 1000));
        setLiveSearchStatus(
            `⚡ GitHub Actions 正在搜尋「${escapeHtml(pending.query)}」的多語言名稱、新聞來源與文章全文……<br>` +
            `已等待 ${elapsed} 秒；完成後結果會自動出現，不必手動重新整理。`,
            "running"
        );

        try {
            const response = await fetch(`${pending.resultUrl}?t=${Date.now()}`, { cache:"no-store" });
            if (response.status === 404) {
                await new Promise(resolve => setTimeout(resolve, 3500));
                continue;
            }
            if (!response.ok) throw new Error(`結果檔 HTTP ${response.status}`);
            const result = await response.json();

            if (result.status === "error") {
                throw new Error(result.message || "即時搜尋失敗");
            }
            if (result.status !== "complete") {
                await new Promise(resolve => setTimeout(resolve, 3500));
                continue;
            }

            localStorage.removeItem(LIVE_SEARCH_PENDING_KEY);
            const allTerms = normalizeAnimeAliasList([
                ...(activeWorkSearch.terms || []),
                ...(Array.isArray(result.aliases) ? result.aliases : [])
            ]).flatMap(deriveAliasVariants);
            activeWorkSearch = { query: pending.query, terms:[...new Set(allTerms)].slice(0, 500) };
            const added = mergeLiveSearchEvents(result.events);
            fillEventFilters();
            renderEvents();

            const count = Array.isArray(result.events) ? result.events.length : 0;
            if (count > 0) {
                setLiveSearchStatus(
                    `✅ 即時搜尋完成：檢查 ${Number(result.sourcesChecked || 0)} 個搜尋來源、` +
                    `${Number(result.candidateArticles || 0)} 篇候選文章，找到 ${count} 個目前或未來的確認活動。` +
                    `${added ? `<br>其中 ${added} 個已立即加入目前清單。` : ""}` +
                    `${Number(result.staleLiveEventsRemoved || 0) ? `<br>已自動移除 ${Number(result.staleLiveEventsRemoved)} 個過期的舊搜尋結果。` : ""}`,
                    "success"
                );
                showToast(`🎪 即時找到 ${count} 個相關活動！`, 5500);
            } else {
                setLiveSearchStatus(
                    `⚠️ 即時搜尋已完成，不是只查本機資料。系統檢查了 ` +
                    `${Number(result.aliases?.length || 0)} 個作品名稱、${Number(result.sourcesChecked || 0)} 個搜尋來源，` +
                    `目前仍沒有找到文章明確提及這部作品。`,
                    "warning"
                );
                showToast("即時外部搜尋完成，目前沒有確認結果。", 5000);
            }
            return result;
        } catch (error) {
            if (/HTTP 404/.test(error.message)) {
                await new Promise(resolve => setTimeout(resolve, 3500));
                continue;
            }
            localStorage.removeItem(LIVE_SEARCH_PENDING_KEY);
            setLiveSearchStatus(`❌ 即時搜尋失敗：${escapeHtml(error.message)}`, "error");
            throw error;
        }
    }

    localStorage.removeItem(LIVE_SEARCH_PENDING_KEY);
    throw new Error("搜尋超過 7 分鐘仍未完成，請到 GitHub Actions 查看執行狀態。 ");
}

async function startLiveEventSearch(query, button = null) {
    const api = liveSearchApiUrl();
    if (!api) {
        setLiveSearchStatus(
            "⚠️ 現在尚未設定即時搜尋後端，所以網站只能比對 events.json。請按右邊的「⚙️ 搜尋設定」，貼上 Cloudflare Worker 網址。",
            "warning"
        );
        return null;
    }

    setLiveSearchStatus(`⚡ 正在要求後端即時搜尋「${escapeHtml(query)}」……`, "running");
    const response = await fetch(`${api}/search`, {
        method:"POST",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({ query })
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.ok) {
        throw new Error(data.error || `啟動搜尋失敗：HTTP ${response.status}`);
    }

    const pending = {
        requestId:data.requestId,
        query,
        resultUrl:data.resultUrl,
        createdAt:new Date().toISOString()
    };
    localStorage.setItem(LIVE_SEARCH_PENDING_KEY, JSON.stringify(pending));
    return await pollLiveSearchResult(pending, button);
}

async function resumePendingLiveSearch() {
    let pending;
    try {
        pending = JSON.parse(localStorage.getItem(LIVE_SEARCH_PENDING_KEY) || "null");
    } catch {
        pending = null;
    }
    if (!pending?.resultUrl || !pending?.query) return;
    const age = Date.now() - new Date(pending.createdAt || 0).getTime();
    if (!Number.isFinite(age) || age > 20 * 60 * 1000) {
        localStorage.removeItem(LIVE_SEARCH_PENDING_KEY);
        return;
    }
    pollLiveSearchResult(pending).catch(error => {
        setLiveSearchStatus(`❌ 無法恢復上次搜尋：${escapeHtml(error.message)}`, "error");
    });
}

async function searchEventsByWork(title = null) {
    const input = document.getElementById("work-event-input");
    const button = document.getElementById("work-event-btn");
    const keyword = String(title ?? input?.value ?? "").trim();

    if (!keyword) {
        showToast("請先輸入作品名稱。");
        return;
    }

    if (input) input.value = keyword;
    if (button) {
        button.disabled = true;
        button.textContent = "🔎 正在解析作品名稱…";
    }

    try {
        const terms = await resolveWorkAliases(keyword);
        activeWorkSearch = { query: keyword, terms };
        document.getElementById("event-keyword").value = keyword;
        setEventTab("all");
        scrollToSection("events-section");
        renderEvents();

        const beforeCleanup = eventList.length;
        eventList = eventList.filter(event => !isOldLiveSearchEvent(event));
        const removedOldCount = beforeCleanup - eventList.length;
        if (removedOldCount > 0) {
            fillEventFilters();
            renderEvents();
        }

        const localMatchedCount = eventList.filter(
            event => eventMatchesWorkTerms(event, terms)
        ).length;

        if (localMatchedCount > 0) {
            setLiveSearchStatus(
                `📦 目前 events.json 已有 ${localMatchedCount} 個可能相關活動；正在繼續即時上網搜尋有沒有更多結果。`,
                "running"
            );
        } else {
            setLiveSearchStatus(
                "📦 現有 events.json 沒有結果，現在開始真正的外部即時搜尋。",
                "running"
            );
        }

        if (button) button.textContent = "⚡ 正在上網搜尋…";
        await startLiveEventSearch(keyword, button);
    } catch (error) {
        setLiveSearchStatus(`❌ ${escapeHtml(error.message)}`, "error");
        showToast(`❌ ${escapeHtml(error.message)}`, 5000);
    } finally {
        if (button) {
            button.disabled = false;
            button.textContent = "⚡ 即時搜尋作品活動";
        }
    }
}

function editTitle(id) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    const title = prompt("請輸入新名字：", anime.title);

    if (title?.trim()) {
        anime.title = title.trim();
        saveAndRender();
    }
}

function moveCategory(id, category) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    if (anime.category === "completed" && ["watching", "review"].includes(category)) {
        anime.watched = 0;
    }

    anime.category = category;

    if (category === "watching") {
        anime.lastWatchedAt = new Date().toISOString();
    }

    if (category === "completed") {
        const total = Number(anime.episodes);

        if (Number.isFinite(total) && total > 0) {
            anime.watched = total;
        }

        checkAndAddSequel(anime, false);
    }

    saveAndRender();
}

function updateProgress(id, delta) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    anime.watched = Math.max(
        0,
        (Number(anime.watched) || 0) + Number(delta)
    );

    if (Number(delta) > 0) {
        anime.lastWatchedAt = new Date().toISOString();
    }

    const total = Number(anime.episodes);

    if (
        Number.isFinite(total) &&
        total > 0 &&
        anime.watched >= total
    ) {
        moveCategory(id, "completed");
    } else {
        saveAndRender();
    }
}

function deleteAnime(id) {
    const anime = animeList.find(item => Number(item.id) === Number(id));
    if (!anime) return;

    if (!confirm(`確定刪除《${anime.title}》嗎？`)) return;

    animeList = animeList.filter(
        item => Number(item.id) !== Number(id)
    );

    saveAndRender();
}

function buildAnimeItem(anime) {
    let badge = "";

    if (anime.title.includes("(OVA")) badge = '<span class="badge" style="background:#0284c7">OVA</span>';
    else if (anime.title.includes("(特別篇")) badge = '<span class="badge" style="background:#f59e0b">特別篇</span>';
    else if (anime.title.includes("(劇場版")) badge = '<span class="badge" style="background:#e11d48">劇場版</span>';
    else if (anime.title.includes("(ONA外傳")) badge = '<span class="badge" style="background:#7c3aed">外傳</span>';
    else if (anime.title.includes("(續篇")) badge = '<span class="badge" style="background:#4b5563">續篇</span>';

    let actions = "";

    if (["watching", "backlog"].includes(anime.category)) {
        actions =
            `<button onclick="updateProgress(${anime.id},1)">➕ 看了 1 集</button>` +
            `<button class="btn-next" onclick="moveCategory(${anime.id},'completed')">🎉 追完</button>`;
    } else if (anime.category === "review") {
        actions =
            `<button onclick="updateProgress(${anime.id},1)">➕ 複習 1 集</button>` +
            `<button class="btn-next" onclick="moveCategory(${anime.id},'completed')">🎉 複習完</button>`;
    } else if (anime.category === "waiting") {
        actions = '<div style="font-size:11px;color:#94a3b8;padding:6px;">🛰️ 智慧監測開播中……</div>';
    } else {
        actions =
            `<button onclick="moveCategory(${anime.id},'watching')">🔄 重看</button>` +
            `<button class="btn-review" onclick="moveCategory(${anime.id},'review')">🧠 複習</button>`;
    }

    let meta;

    if (["watching", "backlog"].includes(anime.category)) {
        meta = `進度：${anime.watched} / ${escapeHtml(anime.episodes)} 集`;
    } else if (anime.category === "review") {
        meta = `🧠 已複習 ${anime.watched} / ${escapeHtml(anime.episodes)} 集`;
    } else if (anime.category === "waiting") {
        meta = `預計開播：<span style="color:#f59e0b;font-weight:bold">${escapeHtml(anime.airDate)}</span>`;
    } else {
        meta = `✨ 全 ${escapeHtml(anime.episodes)} 集觀看完畢`;
    }

    const platformLinks = (anime.streamingLinks || []).map(link => `<a class="platform-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.site)}</a>`).join("");
    const released = Number(anime.releasedEpisodes) || 0;
    const nextInfo = anime.nextAiringAt ? `下集：第 ${escapeHtml(anime.nextEpisode || "?")} 集・${escapeHtml(formatAiringDateTime(anime.nextAiringAt))}` : "下集時間待更新";
    const reviewInfo = anime.rating !== null && anime.rating !== undefined ? `⭐ ${escapeHtml(anime.rating)}/10${anime.note ? `｜${escapeHtml(anime.note)}` : ""}` : (anime.note ? escapeHtml(anime.note) : "尚未評分");
    const customPlatform = anime.customPlatform ? `<span class="platform-link">${escapeHtml(anime.customPlatform)}</span>` : "";

    return `
        <div class="anime-item">
            <div class="anime-title">${badge}<span>${escapeHtml(anime.title)}</span></div>
            <div class="anime-meta">${meta}</div>
            <div class="anime-extra">📡 目前已播：${released || "?"} 集｜${nextInfo}<br>📝 ${reviewInfo}<div class="platform-links">${platformLinks}${customPlatform}</div></div>
            <div class="btn-group">
                ${actions}
                <button class="btn-review" onclick="editAnimeReview(${anime.id})">⭐ 評分筆記</button>
                <button class="btn-next" onclick="searchEventsByWork(decodeURIComponent('${encodeURIComponent(getCoreTitle(anime.title))}'))">🎪 查活動</button>
                <button class="btn-edit" onclick="editTitle(${anime.id})">✏️ 改名</button>
                <button class="btn-del" onclick="deleteAnime(${anime.id})">🗑️ 刪除</button>
            </div>
        </div>
    `;
}

function normalizeAnimeSearchText(value) {
    return String(value ?? "")
        .normalize("NFKC")
        .toLocaleLowerCase()
        .replace(/[\p{P}\p{S}\s]+/gu, "");
}

function animeSearchText(anime) {
    const aliases = Array.isArray(anime.aliases) ? anime.aliases : [];
    const tags = Array.isArray(anime.tags)
        ? anime.tags.map(tag => typeof tag === "string" ? tag : tag?.name)
        : [];
    const customTags = Array.isArray(anime.customTags) ? anime.customTags : [];
    const platforms = [
        anime.customPlatform,
        ...(Array.isArray(anime.streamingLinks)
            ? anime.streamingLinks.flatMap(link => [link?.site, link?.url])
            : [])
    ];
    return normalizeAnimeSearchText([
        anime.title,
        ...aliases,
        ...platforms,
        ...tags,
        ...customTags,
        anime.note
    ].filter(Boolean).join(" "));
}

function animeProgress(anime) {
    const watched = Math.max(0, Number(anime.watched) || 0);
    const total = Number(anime.episodes);
    return Number.isFinite(total) && total > 0 ? watched / total : 0;
}

function animeTime(value) {
    const timestamp = Date.parse(value || "");
    return Number.isFinite(timestamp) ? timestamp : 0;
}

function compareAnimeName(a, b) {
    return String(a.title || "").localeCompare(String(b.title || ""), "zh-Hant", {
        sensitivity: "base",
        numeric: true
    });
}

function compareAnime(a, b) {
    if (animeListSort === "watching-first") {
        const watchingDifference = Number(b.category === "watching") - Number(a.category === "watching");
        if (watchingDifference) return watchingDifference;
        if (a.category === "watching" && b.category === "watching") {
            const watchedDifference = animeTime(b.lastWatchedAt) - animeTime(a.lastWatchedAt);
            if (watchedDifference) return watchedDifference;
        }
    } else if (animeListSort === "recent-watched") {
        const difference = animeTime(b.lastWatchedAt) - animeTime(a.lastWatchedAt);
        if (difference) return difference;
    } else if (animeListSort === "name") {
        return compareAnimeName(a, b);
    } else if (animeListSort === "progress-desc" || animeListSort === "progress-asc") {
        const difference = animeProgress(b) - animeProgress(a);
        if (difference) return animeListSort === "progress-desc" ? difference : -difference;
    } else if (animeListSort === "recent-added") {
        const difference = animeTime(b.addedAt) - animeTime(a.addedAt);
        if (difference) return difference;
    }
    return compareAnimeName(a, b);
}

function renderList() {
    const openGroups = new Set();

    document
        .querySelectorAll("details.series-group[open]")
        .forEach(detail =>
            openGroups.add(detail.dataset.groupkey)
        );

    const normalizedQuery = normalizeAnimeSearchText(animeListQuery);
    const visibleAnime = animeList
        .filter(anime => !normalizedQuery || animeSearchText(anime).includes(normalizedQuery))
        .sort(compareAnime);
    const categories = {
        watching: [],
        backlog: [],
        review: [],
        waiting: [],
        completed: []
    };

    for (const anime of visibleAnime) {
        if (anime && categories[anime.category]) {
            categories[anime.category].push(anime);
        }
    }
    const summary = document.getElementById("anime-list-summary");
    if (summary) summary.textContent = `顯示 ${visibleAnime.length}／${animeList.length} 部`;
    const noResults = document.getElementById("anime-list-no-results");
    if (noResults) noResults.style.display = visibleAnime.length ? "none" : "block";

    for (const [category, items] of Object.entries(categories)) {
        const seriesMap = {};

        for (const anime of items) {
            const core = getCoreTitle(anime.title) || anime.title;
            (seriesMap[core] ||= []).push(anime);
        }

        let html = "";

        for (const [core, series] of Object.entries(seriesMap)) {
            if (series.length === 1) {
                html += buildAnimeItem(series[0]);
                continue;
            }

            const key = `${category}_${core}`;
            html += `
                <details class="series-group" data-groupkey="${escapeHtml(key)}" ${openGroups.has(key) ? "open" : ""}>
                    <summary class="series-summary">
                        <span>📦 ${escapeHtml(core)}
                            <small style="color:#94a3b8;font-weight:normal;margin-left:6px;">(共 ${series.length} 部)</small>
                        </span>
                    </summary>
                    <div class="series-content">${series.map(buildAnimeItem).join("")}</div>
                </details>
            `;
        }

        const emptyMessages = {
            watching: "暫無連載中動漫",
            backlog: "暫無補番中動漫",
            review: "目前空空如也",
            waiting: "暫無敲碗中動漫",
            completed: "暫無已追完動漫"
        };

        document.getElementById(`list-${category}`).innerHTML =
            html ||
            `<div class="empty">${emptyMessages[category]}</div>`;
    }
    const dataList = document.getElementById("anime-title-options");
    if (dataList) dataList.innerHTML = animeList.map(anime => `<option value="${escapeHtml(anime.title)}"></option>`).join("");
    renderAiringCalendar();
}

function exportData() {
    if (animeList.length === 0) {
        showToast("⚠️ 目前沒有資料可以匯出。");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(animeList, null, 2)],
        { type: "application/json;charset=utf-8" }
    );

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `anime_backup_${new Date().toISOString().slice(0, 10)}.json`;
    link.click();
    URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = loadEvent => {
        try {
            const list = JSON.parse(loadEvent.target.result);

            if (!Array.isArray(list)) {
                throw new Error("格式錯誤");
            }

            if (!confirm("匯入會覆蓋目前追番清單，確定繼續嗎？")) {
                return;
            }

            animeList = list;
            saveAndRender();
            showToast(`📥 已還原 ${animeList.length} 部作品！`);
        } catch {
            showToast("❌ 匯入失敗，請確認是正確的 JSON 備份。");
        } finally {
            event.target.value = "";
        }
    };

    reader.readAsText(file);
}

function formatEventDate(value) {
    if (!value) return "日期不明";
    const date = new Date(value.length === 10 ? `${value}T00:00:00Z` : value);
    if (Number.isNaN(date.getTime())) return "日期不明";
    return new Intl.DateTimeFormat("zh-TW", { year:"numeric", month:"2-digit", day:"2-digit", timeZone:"Asia/Taipei" }).format(date);
}

function todayDateKey() {
    return new Intl.DateTimeFormat("en-CA", { timeZone:"Asia/Taipei", year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
}

function dateDiffDays(a, b) {
    const da = new Date(`${a}T00:00:00Z`), db = new Date(`${b}T00:00:00Z`);
    return Math.round((da - db) / 86400000);
}

function saveEventLocalData() {
    localStorage.setItem(EVENT_PREFS_KEY, JSON.stringify(eventPrefs));
    localStorage.setItem(EVENT_OVERRIDES_KEY, JSON.stringify(eventOverrides));
    localStorage.setItem(EVENT_SETTINGS_KEY, JSON.stringify(eventSettings));
}

function applyEventOverride(event) {
    const override = eventOverrides[event.id] || {};
    return { ...event, ...override, locations: override.locations || event.locations };
}

function eventPreference(id) {
    return eventPrefs[id] || { state:"", dismissed:false };
}

function updateEventPreference(id, patch) {
    eventPrefs[id] = { ...eventPreference(id), ...patch };
    saveEventLocalData();
    renderEvents();
}

function setEventTab(tab) {
    eventTab = tab;
    document.querySelectorAll("#event-tabs button").forEach(button => button.classList.toggle("active", button.dataset.tab === tab));
    renderEvents();
}

function configureEventRegion() {

    if (value === null) return;
