<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>全自動動漫追番基地 v8.9.3</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #ef4444;
            --border-color: #334155;
        }

        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                sans-serif;

            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent-color);

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input,
        textarea,
        button,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
        }

        select {
            cursor: pointer;
            font-weight: bold;
            background-color: #1e293b;
            color: #38bdf8;
        }

        button {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition:
                background 0.2s,
                filter 0.2s,
                opacity 0.2s;
        }

        button:active {
            filter: brightness(0.8);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            opacity: 0.75;
        }

        .series-group {
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .series-group[open] {
            border-color: #7c3aed;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
        }

        .series-summary {
            padding: 14px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;

            display: flex;
            justify-content: space-between;
            align-items: center;

            background: var(--card-bg);
            user-select: none;
            list-style: none;
        }

        .series-summary::-webkit-details-marker {
            display: none;
        }

        .series-summary:hover {
            background: #2d3748;
        }

        .series-summary::after {
            content: "展開 ▾";
            font-size: 11px;
            color: #38bdf8;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-weight: normal;
        }

        details[open] .series-summary::after {
            content: "收起 ▴";
            color: #f43f5e;
        }

        .series-content {
            padding: 10px;
            background: rgba(15, 23, 42, 0.4);

            display: flex;
            flex-direction: column;
            gap: 8px;

            border-top: 1px solid var(--border-color);
        }

        .anime-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 2px;
        }

        .series-content .anime-item {
            border-left: 4px solid #7c3aed;
            background: #1e293b;
        }

        .anime-title {
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.4;

            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .anime-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-group button {
            padding: 6px;
            font-size: 12px;
            margin: 0;
            width: auto;
            flex: 1;
            min-width: 55px;
        }

        .btn-edit {
            background-color: #0284c7;
        }

        .btn-del {
            background-color: var(--accent-color);
        }

        .btn-next {
            background-color: #16a34a;
        }

        .btn-review {
            background-color: #9333ea;
        }

        .btn-scan {
            background-color: #7c3aed;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .btn-batch {
            background-color: #f59e0b;
            color: #0f172a;
        }

        .btn-batch:hover {
            background-color: #d97706;
        }

        .btn-backup {
            background-color: #0d9488;
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: rgba(15, 23, 42, 0.97);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            text-align: center;

            display: none;
            z-index: 100;
            width: 80%;
            max-width: 300px;
            line-height: 1.6;

            box-shadow:
                0 10px 25px -5px
                rgba(0, 0, 0, 0.5);
        }

        .empty-message {
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎬 全自動動漫追番基地 v8.9.3</h1>

    <div class="section">

        <div class="section-title">
            ➕ 一鍵自動化新增（單部搜尋）
        </div>

        <input
            type="text"
            id="search-input"
            placeholder="輸入單部動漫名稱"
            autocomplete="off"
        >

        <button
            id="search-btn"
            onclick="searchAnime()"
        >
            🔍 智慧網格搜尋
        </button>

    </div>

    <div class="section">

        <div class="section-title">
            🚀 批次自動化多載入網格
        </div>

        <label
            style="
                font-size: 12px;
                color: #94a3b8;
                display: block;
                margin-bottom: 5px;
            "
        >
            請選擇這批動漫要歸類到哪裡：
        </label>

        <select id="batch-category-target">

            <option value="backlog">
                🎬 官方已完結（補番中）
            </option>

            <option value="watching">
                ⚡ 正在連載 / 正在追
            </option>

            <option value="review">
                🧠 溫故知新（需要複習區）
            </option>

            <option value="waiting">
                ⏳ 敲碗等待開播
            </option>

        </select>

        <textarea
            id="batch-input"
            placeholder="在此處貼入大量動漫名稱&#10;每行一部作品..."
        ></textarea>

        <button
            id="batch-btn"
            class="btn-batch"
            onclick="batchSearchAnime()"
        >
            ⚡ 啟動批次雷達搜尋
        </button>

    </div>

    <div class="section">

        <div class="section-title">
            ⚙️ 資料控制與智慧雷達
        </div>

        <button
            id="scan-btn"
            class="btn-scan"
            onclick="manualScanSequels()"
        >
            🛰️ 立即手動主動偵測續作
        </button>

        <div style="display: flex; gap: 10px;">

            <button
                class="btn-backup"
                onclick="exportData()"
                style="margin-bottom: 0; flex: 1;"
            >
                📤 匯出資料檔案
            </button>

            <input
                type="file"
                id="import-file"
                accept=".json,application/json"
                style="display: none;"
                onchange="importData(event)"
            >

            <button
                class="btn-edit"
                onclick="document.getElementById('import-file').click()"
                style="margin-bottom: 0; flex: 1;"
            >
                📥 匯入檔案還原
            </button>

        </div>

    </div>

    <div class="section">
        <div class="section-title">
            ⚡ 正在連載 / 正在追
        </div>

        <div id="list-watching"></div>
    </div>

    <div class="section">
        <div class="section-title">
            🎬 官方已完結（補番中）
        </div>

        <div id="list-backlog"></div>
    </div>

    <div class="section">
        <div class="section-title">
            🧠 溫故知新（需要複習區）
        </div>

        <div id="list-review"></div>
    </div>

    <div class="section">
        <div class="section-title">
            ⏳ 敲碗等待開播
        </div>

        <div id="list-waiting"></div>
    </div>

    <div class="section">
        <div class="section-title">
            🎉 已追完 / 看完了
        </div>

        <div id="list-completed"></div>
    </div>

</div>

<div
    id="toast-box"
    class="toast"
>
    <div id="toast-msg"></div>

    <button
        style="
            margin-top: 15px;
            margin-bottom: 0;
            width: auto;
            padding: 5px 15px;
            background-color: #475569;
        "
        onclick="closeToast()"
    >
        關閉
    </button>
</div>

<script>
    /*
     * ==========================================
     * 基本資料與版本遷移
     * ==========================================
     */

    const STORAGE_KEY = "anime_list_v8_8";

    const oldKeys = [
        "anime_list_v8_7",
        "anime_list_v8_6",
        "anime_list_v8_5",
        "anime_list_v8_4",
        "anime_list_v8_3",
        "anime_list_v8_2",
        "anime_list_v8_1",
        "anime_list_v8_0"
    ];

    let animeList = [];
    let toastTimer = null;

    const searchBtn = document.getElementById("search-btn");
    const batchBtn = document.getElementById("batch-btn");
    const scanBtn = document.getElementById("scan-btn");

    loadAnimeData();


    /*
     * ==========================================
     * 資料讀取與儲存
     * ==========================================
     */

    function loadAnimeData() {
        try {
            const currentData = localStorage.getItem(STORAGE_KEY);

            if (currentData) {
                const parsedData = JSON.parse(currentData);

                if (Array.isArray(parsedData)) {
                    animeList = parsedData;
                }
            }
        } catch (error) {
            console.error("讀取目前版本資料失敗：", error);
            animeList = [];
        }

        if (animeList.length === 0) {
            for (const key of oldKeys) {
                const oldData = localStorage.getItem(key);

                if (!oldData) {
                    continue;
                }

                try {
                    const parsedOldData = JSON.parse(oldData);

                    if (Array.isArray(parsedOldData)) {
                        animeList = parsedOldData;
                        break;
                    }
                } catch (error) {
                    console.warn(
                        `舊版本資料 ${key} 讀取失敗：`,
                        error
                    );
                }
            }
        }

        normalizeAnimeList();
        saveData();
    }

    function normalizeAnimeList() {
        if (!Array.isArray(animeList)) {
            animeList = [];
            return;
        }

        animeList = animeList
            .filter(anime => anime && anime.id !== undefined)
            .map(anime => ({
                id: Number(anime.id),
                title:
                    anime.title ||
                    "未命名作品",

                status:
                    anime.status ||
                    "UNKNOWN",

                episodes:
                    anime.episodes ||
                    "??",

                watched:
                    Number(anime.watched) || 0,

                category:
                    [
                        "watching",
                        "backlog",
                        "review",
                        "waiting",
                        "completed"
                    ].includes(anime.category)
                        ? anime.category
                        : "backlog",

                airDate:
                    anime.airDate ||
                    "未定",

                relations:
                    Array.isArray(anime.relations)
                        ? anime.relations
                        : []
            }));
    }

    function saveData() {
        try {
            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(animeList)
            );
        } catch (error) {
            console.error("資料儲存失敗：", error);

            showToast(
                "❌ 資料儲存失敗，可能是瀏覽器儲存空間不足。"
            );
        }
    }

    function saveAndRender() {
        saveData();
        renderList();
    }


    /*
     * ==========================================
     * 按鈕狀態與通知
     * ==========================================
     */

    function setSearchLoading(loading) {
        searchBtn.disabled = loading;

        searchBtn.innerText = loading
            ? "⚡ 正在連線維基與 AniList 搜尋中..."
            : "🔍 智慧網格搜尋";
    }

    function setBatchLoading(loading) {
        batchBtn.disabled = loading;

        if (!loading) {
            batchBtn.innerText =
                "⚡ 啟動批次雷達搜尋";
        }
    }

    function setScanLoading(loading) {
        scanBtn.disabled = loading;

        scanBtn.innerText = loading
            ? "🛰️ 正在掃描續作..."
            : "🛰️ 立即手動主動偵測續作";
    }

    function showToast(message, duration = 3500) {
        clearTimeout(toastTimer);

        document.getElementById("toast-msg").innerHTML =
            message;

        document.getElementById("toast-box").style.display =
            "block";

        toastTimer = setTimeout(
            closeToast,
            duration
        );
    }

    function closeToast() {
        clearTimeout(toastTimer);

        document.getElementById("toast-box").style.display =
            "none";
    }


    /*
     * ==========================================
     * 網路請求工具
     * ==========================================
     */

    async function fetchWithTimeout(
        url,
        options = {},
        timeout = 12000
    ) {
        const controller = new AbortController();

        const timeoutId = setTimeout(() => {
            controller.abort();
        }, timeout);

        try {
            const response = await fetch(url, {
                ...options,
                signal: controller.signal
            });

            if (!response.ok) {
                throw new Error(
                    `HTTP 錯誤：${response.status}`
                );
            }

            return response;
        } finally {
            clearTimeout(timeoutId);
        }
    }

    async function translateText(
        text,
        toLang = "zh-TW"
    ) {
        if (!text || !text.trim()) {
            return null;
        }

        try {
            const url =
                "https://translate.googleapis.com/" +
                "translate_a/single" +
                "?client=gtx" +
                "&sl=auto" +
                `&tl=${encodeURIComponent(toLang)}` +
                "&dt=t" +
                `&q=${encodeURIComponent(text)}`;

            const response = await fetchWithTimeout(
                url,
                {},
                10000
            );

            const data = await response.json();

            if (
                Array.isArray(data) &&
                Array.isArray(data[0])
            ) {
                const translatedText = data[0]
                    .map(item => {
                        if (
                            Array.isArray(item) &&
                            typeof item[0] === "string"
                        ) {
                            return item[0];
                        }

                        return "";
                    })
                    .join("");

                return translatedText || null;
            }
        } catch (error) {
            console.warn(
                "Google 翻譯服務暫時無法使用：",
                error
            );
        }

        return null;
    }


    /*
     * ==========================================
     * 批次搜尋
     * ==========================================
     */

    async function batchSearchAnime() {
        const inputArea =
            document.getElementById("batch-input");

        const targetCategory =
            document.getElementById(
                "batch-category-target"
            ).value;

        const lines = inputArea.value
            .split("\n")
            .map(line => line.trim())
            .filter(line => line.length > 0);

        if (lines.length === 0) {
            showToast(
                "⚠️ 大文字框內沒有偵測到任何動漫名稱！"
            );

            return;
        }

        setBatchLoading(true);

        let successCount = 0;
        const failedList = [];

        try {
            for (let i = 0; i < lines.length; i++) {
                const currentTitle = lines[i];

                batchBtn.innerHTML =
                    `⚡ 正在精準載入 ` +
                    `(${i + 1}/${lines.length})` +
                    `<br>🎬 《${escapeHtml(currentTitle)}》`;

                const success = await searchAnime(
                    currentTitle,
                    true,
                    null,
                    null,
                    targetCategory
                );

                if (success) {
                    successCount++;
                } else {
                    failedList.push(currentTitle);
                }

                /*
                 * 避免短時間連續呼叫 AniList，
                 * 降低被限制請求的機率。
                 */
                await delay(850);
            }
        } finally {
            setBatchLoading(false);
        }

        if (failedList.length > 0) {
            inputArea.value =
                failedList.join("\n");

            showToast(
                `⚠️ 批次完成！<br>` +
                `成功入庫：` +
                `<b style="color:#22c55e;">` +
                `${successCount}` +
                `</b> 部<br>` +
                `未成功或重複：` +
                `<b style="color:#ef4444;">` +
                `${failedList.length}` +
                `</b> 部<br>` +
                `失敗項目已保留在文字框內。`,
                6000
            );
        } else {
            inputArea.value = "";

            showToast(
                `🎉 完美對接！<br>` +
                `成功將全部 ` +
                `<b style="color:#22c55e;">` +
                `${successCount}` +
                `</b> 部作品送入指定清單！`,
                5000
            );
        }
    }


    /*
     * ==========================================
     * 標題處理
     * ==========================================
     */

    function getCoreTitle(title) {
        return String(title || "")
            .replace(
                /\s*第[一二三四五六七八九十百0-9]+[季期]\s*$/g,
                ""
            )
            .replace(
                /\s*Season\s*[0-9]+\s*$/gi,
                ""
            )
            .replace(
                /\s*\((OVA|特別篇|劇場版|ONA外傳|續篇).*?\)\s*$/gi,
                ""
            )
            .trim();
    }

    function generateSmartTitle(
        media,
        parentChineseTitle,
        wikiZhTitle,
        googleZhTitle
    ) {
        const nativeTitle =
            media.title?.native || "";

        const englishTitle =
            media.title?.english || "";

        const romajiTitle =
            media.title?.romaji || "";

        const combinedText =
            `${nativeTitle} ` +
            `${englishTitle} ` +
            `${romajiTitle}`;

        const normalizedText =
            combinedText.toLowerCase();

        let coreTitle =
            wikiZhTitle ||
            googleZhTitle ||
            nativeTitle ||
            romajiTitle ||
            englishTitle ||
            "未命名作品";

        if (parentChineseTitle) {
            coreTitle =
                getCoreTitle(parentChineseTitle);
        }

        /*
         * 先檢查較高季數，
         * 避免某些標題同時出現多組文字。
         */

        if (
            normalizedText.includes("season 5") ||
            normalizedText.includes("5th season") ||
            combinedText.includes("第5期") ||
            combinedText.includes("第五季")
        ) {
            return `${coreTitle} 第五季`;
        }

        if (
            normalizedText.includes("season 4") ||
            normalizedText.includes("4th season") ||
            combinedText.includes("第4期") ||
            combinedText.includes("第四季")
        ) {
            return `${coreTitle} 第四季`;
        }

        if (
            normalizedText.includes("season 3") ||
            normalizedText.includes("3rd season") ||
            combinedText.includes("第3期") ||
            combinedText.includes("第三季")
        ) {
            return `${coreTitle} 第三季`;
        }

        if (
            normalizedText.includes("season 2") ||
            normalizedText.includes("2nd season") ||
            combinedText.includes("第2期") ||
            combinedText.includes("第二季")
        ) {
            return `${coreTitle} 第二季`;
        }

        if (parentChineseTitle) {
            const yearSuffix =
                media.startDate?.year
                    ? ` - ${media.startDate.year}年`
                    : "";

            if (media.format === "OVA") {
                return (
                    `${coreTitle} ` +
                    `(OVA${yearSuffix})`
                );
            }

            if (media.format === "SPECIAL") {
                return (
                    `${coreTitle} ` +
                    `(特別篇${yearSuffix})`
                );
            }

            if (media.format === "MOVIE") {
                return (
                    `${coreTitle} ` +
                    `(劇場版${yearSuffix})`
                );
            }

            if (media.format === "ONA") {
                return (
                    `${coreTitle} ` +
                    `(ONA外傳${yearSuffix})`
                );
            }

            return (
                `${coreTitle} ` +
                `(續篇${yearSuffix})`
            );
        }

        return coreTitle;
    }


    /*
     * ==========================================
     * 維基百科搜尋
     * ==========================================
     */

    async function searchWikipediaTitle(input) {
        let wikiZhTitle = null;
        let wikiJaTitle = null;

        try {
            const wikiSearchUrl =
                "https://zh.wikipedia.org/w/api.php" +
                "?action=query" +
                "&list=search" +
                `&srsearch=${encodeURIComponent(input)}` +
                "&format=json" +
                "&origin=*";

            const searchResponse =
                await fetchWithTimeout(
                    wikiSearchUrl,
                    {},
                    10000
                );

            const searchData =
                await searchResponse.json();

            const searchResults =
                searchData?.query?.search;

            if (
                !Array.isArray(searchResults) ||
                searchResults.length === 0
            ) {
                return {
                    wikiZhTitle,
                    wikiJaTitle
                };
            }

            wikiZhTitle =
                searchResults[0].title;

            const languageLinkUrl =
                "https://zh.wikipedia.org/w/api.php" +
                "?action=query" +
                `&titles=${encodeURIComponent(wikiZhTitle)}` +
                "&prop=langlinks" +
                "&lllang=ja" +
                "&format=json" +
                "&origin=*";

            const languageResponse =
                await fetchWithTimeout(
                    languageLinkUrl,
                    {},
                    10000
                );

            const languageData =
                await languageResponse.json();

            const pages =
                languageData?.query?.pages || {};

            for (const pageId in pages) {
                const langLinks =
                    pages[pageId]?.langlinks;

                if (
                    Array.isArray(langLinks) &&
                    langLinks.length > 0
                ) {
                    wikiJaTitle =
                        langLinks[0]["*"] || null;

                    break;
                }
            }
        } catch (error) {
            /*
             * 維基失敗不阻止搜尋，
             * 接下來仍直接使用 AniList。
             */
            console.warn(
                "維基百科搜尋失敗：",
                error
            );
        }

        return {
            wikiZhTitle,
            wikiJaTitle
        };
    }


    /*
     * ==========================================
     * AniList API
     * ==========================================
     */

    async function requestAniList(
        query,
        variables
    ) {
        const response = await fetchWithTimeout(
            "https://graphql.anilist.co",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },

                body: JSON.stringify({
                    query,
                    variables
                })
            },
            15000
        );

        const responseData =
            await response.json();

        if (
            Array.isArray(responseData.errors) &&
            responseData.errors.length > 0
        ) {
            console.warn(
                "AniList 回傳錯誤：",
                responseData.errors
            );
        }

        return responseData?.data?.Media || null;
    }

    function createSearchQuery() {
        return `
            query ($search: String) {
                Media(
                    search: $search,
                    type: ANIME
                ) {
                    id
                    format

                    title {
                        native
                        english
                        romaji
                    }

                    status
                    episodes

                    startDate {
                        year
                        month
                        day
                    }

                    relations {
                        edges {
                            relationType

                            node {
                                id
                                format

                                title {
                                    native
                                    english
                                    romaji
                                }

                                status
                            }
                        }
                    }
                }
            }
        `;
    }

    function createIdQuery() {
        return `
            query ($id: Int) {
                Media(
                    id: $id,
                    type: ANIME
                ) {
                    id
                    format

                    title {
                        native
                        english
                        romaji
                    }

                    status
                    episodes

                    startDate {
                        year
                        month
                        day
                    }

                    relations {
                        edges {
                            relationType

                            node {
                                id
                                format

                                title {
                                    native
                                    english
                                    romaji
                                }

                                status
                            }
                        }
                    }
                }
            }
        `;
    }


    /*
     * ==========================================
     * 單部動漫搜尋
     * ==========================================
     */

    async function searchAnime(
        keyword = null,
        isQuiet = false,
        parentChineseTitle = null,
        targetId = null,
        forcedCategory = null
    ) {
        const inputElement =
            document.getElementById("search-input");

        const input =
            keyword ||
            inputElement.value.trim();

        const isManualSearch =
            !isQuiet &&
            !targetId;

        if (!input && !targetId) {
            if (!isQuiet) {
                showToast(
                    "⚠️ 請先輸入動漫名稱再點擊搜尋！"
                );
            }

            return false;
        }

        if (isManualSearch) {
            setSearchLoading(true);
        }

        try {
            let wikiZhTitle = null;
            let wikiJaTitle = null;

            if (!targetId) {
                const wikiResult =
                    await searchWikipediaTitle(input);

                wikiZhTitle =
                    wikiResult.wikiZhTitle;

                wikiJaTitle =
                    wikiResult.wikiJaTitle;
            }

            let media = null;

            if (targetId) {
                media = await requestAniList(
                    createIdQuery(),
                    {
                        id: Number(targetId)
                    }
                );
            } else {
                const firstSearchKey =
                    wikiJaTitle || input;

                media = await requestAniList(
                    createSearchQuery(),
                    {
                        search: firstSearchKey
                    }
                );

                /*
                 * 第一次找不到時，
                 * 翻成日文後再試一次。
                 */
                if (!media) {
                    const translatedJapanese =
                        await translateText(
                            input,
                            "ja"
                        );

                    if (
                        translatedJapanese &&
                        translatedJapanese !== firstSearchKey
                    ) {
                        media = await requestAniList(
                            createSearchQuery(),
                            {
                                search:
                                    translatedJapanese
                            }
                        );
                    }
                }

                /*
                 * 如果維基日文名稱搜尋失敗，
                 * 再直接用使用者原始輸入搜尋。
                 */
                if (
                    !media &&
                    wikiJaTitle &&
                    wikiJaTitle !== input
                ) {
                    media = await requestAniList(
                        createSearchQuery(),
                        {
                            search: input
                        }
                    );
                }
            }

            if (!media) {
                if (!isQuiet) {
                    showToast(
                        `❌ 找不到作品：` +
                        `<b>${escapeHtml(input)}</b><br>` +
                        `請嘗試輸入完整中文名、日文名或英文名。`,
                        5000
                    );
                }

                return false;
            }

            const duplicateAnime =
                animeList.find(anime =>
                    Number(anime.id) ===
                    Number(media.id)
                );

            if (duplicateAnime) {
                if (!isQuiet) {
                    showToast(
                        `⚠️ ` +
                        `《${escapeHtml(duplicateAnime.title)}》` +
                        `已經在清單裡了！`
                    );
                }

                return false;
            }

            const translationSource =
                media.title?.native ||
                media.title?.romaji ||
                media.title?.english ||
                "";

            const googleZh =
                await translateText(
                    translationSource,
                    "zh-TW"
                );

            const finalTitle =
                generateSmartTitle(
                    media,
                    parentChineseTitle,
                    wikiZhTitle,
                    googleZh
                );

            let category;

            if (forcedCategory) {
                category = forcedCategory;
            } else if (
                media.status === "NOT_YET_RELEASED"
            ) {
                category = "waiting";
            } else if (
                media.status === "FINISHED"
            ) {
                category = "backlog";
            } else {
                category = "watching";
            }

            let airDate = "未定";

            if (media.startDate?.year) {
                const month =
                    media.startDate.month || "?";

                airDate =
                    `${media.startDate.year}年` +
                    `${month}月`;
            }

            const newAnime = {
                id: Number(media.id),
                title: finalTitle,
                status:
                    media.status ||
                    "UNKNOWN",
                episodes:
                    media.episodes ||
                    "??",
                watched: 0,
                category,
                airDate,
                relations:
                    Array.isArray(
                        media.relations?.edges
                    )
                        ? media.relations.edges
                        : []
            };

            animeList.push(newAnime);
            saveAndRender();

            if (
                !keyword &&
                !isQuiet &&
                !targetId
            ) {
                inputElement.value = "";
            }

            if (!isQuiet) {
                showToast(
                    `🛰️ 成功加入作品：` +
                    `<b style="color:#60a5fa;">` +
                    `《${escapeHtml(finalTitle)}》` +
                    `</b>`
                );
            }

            /*
             * 批次指定分類時，
             * 不自動新增續作，避免打亂清單。
             */
            if (
                !forcedCategory &&
                category !== "waiting"
            ) {
                checkAndAddSequel(
                    newAnime,
                    true
                );
            }

            return true;
        } catch (error) {
            console.error(
                "搜尋動漫時發生錯誤：",
                error
            );

            if (!isQuiet) {
                let message =
                    "搜尋時發生錯誤，請稍後再試。";

                if (error.name === "AbortError") {
                    message =
                        "搜尋逾時，請檢查網路後再試一次。";
                } else if (
                    String(error.message).includes("429")
                ) {
                    message =
                        "搜尋太頻繁，請過幾秒後再試。";
                }

                showToast(
                    `❌ ${message}`,
                    5000
                );
            }

            return false;
        } finally {
            /*
             * 不管成功、失敗、重複、逾時，
             * 都一定恢復搜尋按鈕。
             */
            if (isManualSearch) {
                setSearchLoading(false);
            }
        }
    }


    /*
     * ==========================================
     * 續作偵測
     * ==========================================
     */

    async function checkAndAddSequel(
        anime,
        isQuiet = false
    ) {
        if (
            !anime ||
            !Array.isArray(anime.relations) ||
            anime.relations.length === 0
        ) {
            return false;
        }

        const sequelEdge =
            anime.relations.find(edge =>
                edge?.relationType === "SEQUEL"
            );

        if (
            !sequelEdge ||
            !sequelEdge.node
        ) {
            return false;
        }

        const sequelNode =
            sequelEdge.node;

        const alreadyExists =
            animeList.some(item =>
                Number(item.id) ===
                Number(sequelNode.id)
            );

        if (alreadyExists) {
            return false;
        }

        await delay(500);

        return await searchAnime(
            null,
            isQuiet,
            anime.title,
            sequelNode.id
        );
    }

    async function manualScanSequels() {
        if (animeList.length === 0) {
            showToast(
                "⚠️ 清單目前是空的，沒有作品可以掃描。"
            );

            return;
        }

        setScanLoading(true);

        showToast(
            "🛰️ 正在啟動高精度雷達，追蹤清單中的續作...",
            5000
        );

        let foundCount = 0;
        let scannedCount = 0;

        try {
            const completedAnime =
                animeList.filter(anime =>
                    anime?.category === "completed"
                );

            if (completedAnime.length === 0) {
                showToast(
                    "⚠️ 已追完清單目前沒有作品，因此沒有可掃描的續作。"
                );

                return;
            }

            for (const anime of completedAnime) {
                scannedCount++;

                try {
                    const media =
                        await requestAniList(
                            createIdQuery(),
                            {
                                id: Number(anime.id)
                            }
                        );

                    if (
                        !media ||
                        !Array.isArray(
                            media.relations?.edges
                        )
                    ) {
                        continue;
                    }

                    anime.relations =
                        media.relations.edges;

                    saveData();

                    const sequelEdge =
                        anime.relations.find(edge =>
                            edge?.relationType ===
                            "SEQUEL"
                        );

                    if (
                        !sequelEdge ||
                        !sequelEdge.node
                    ) {
                        continue;
                    }

                    const sequelId =
                        Number(sequelEdge.node.id);

                    const alreadyExists =
                        animeList.some(item =>
                            Number(item.id) ===
                            sequelId
                        );

                    if (alreadyExists) {
                        continue;
                    }

                    await delay(650);

                    const success =
                        await searchAnime(
                            null,
                            true,
                            anime.title,
                            sequelId
                        );

                    if (success) {
                        foundCount++;
                    }
                } catch (error) {
                    console.warn(
                        `掃描《${anime.title}》續作失敗：`,
                        error
                    );
                }
            }

            if (foundCount > 0) {
                showToast(
                    `🎉 續作掃描完成！<br>` +
                    `掃描作品：${scannedCount} 部<br>` +
                    `成功新增續作：` +
                    `<b style="color:#22c55e;">` +
                    `${foundCount}` +
                    `</b> 部`,
                    6000
                );
            } else {
                showToast(
                    `🛰️ 雷達掃描完畢！<br>` +
                    `已掃描 ${scannedCount} 部作品，` +
                    `目前沒有發現尚未入庫的續作。`,
                    5000
                );
            }
        } finally {
            setScanLoading(false);
        }
    }


    /*
     * ==========================================
     * 清單操作
     * ==========================================
     */

    function editTitle(id) {
        const anime =
            animeList.find(item =>
                Number(item.id) ===
                Number(id)
            );

        if (!anime) {
            return;
        }

        const newTitle = prompt(
            "請輸入新名字：",
            anime.title
        );

        if (
            newTitle &&
            newTitle.trim() !== ""
        ) {
            anime.title =
                newTitle.trim();

            saveAndRender();
        }
    }

    function moveCategory(
        id,
        newCategory
    ) {
        const anime =
            animeList.find(item =>
                Number(item.id) ===
                Number(id)
            );

        if (!anime) {
            return;
        }

        if (
            anime.category === "completed" &&
            newCategory === "watching"
        ) {
            anime.watched = 0;
        }

        if (
            anime.category === "completed" &&
            newCategory === "review"
        ) {
            anime.watched = 0;
        }

        anime.category =
            newCategory;

        if (newCategory === "completed") {
            const episodeTotal =
                Number(anime.episodes);

            if (
                Number.isFinite(episodeTotal) &&
                episodeTotal > 0
            ) {
                anime.watched =
                    episodeTotal;
            }

            checkAndAddSequel(
                anime,
                false
            );
        }

        saveAndRender();
    }

    function updateProgress(
        id,
        delta
    ) {
        const anime =
            animeList.find(item =>
                Number(item.id) ===
                Number(id)
            );

        if (!anime) {
            return;
        }

        anime.watched = Math.max(
            0,
            (Number(anime.watched) || 0) +
            Number(delta)
        );

        const totalEpisodes =
            Number(anime.episodes);

        if (
            Number.isFinite(totalEpisodes) &&
            totalEpisodes > 0 &&
            anime.watched >= totalEpisodes
        ) {
            moveCategory(
                id,
                "completed"
            );
        } else {
            saveAndRender();
        }
    }

    function deleteAnime(id) {
        const anime =
            animeList.find(item =>
                Number(item.id) ===
                Number(id)
            );

        if (!anime) {
            return;
        }

        const confirmed = confirm(
            `確定要刪除《${anime.title}》嗎？`
        );

        if (!confirmed) {
            return;
        }

        animeList =
            animeList.filter(item =>
                Number(item.id) !==
                Number(id)
            );

        saveAndRender();

        showToast(
            `🗑️ 已刪除《${escapeHtml(anime.title)}》`
        );
    }


    /*
     * ==========================================
     * 產生動漫卡片
     * ==========================================
     */

    function buildSingleAnimeItemHtml(anime) {
        const safeTitle =
            escapeHtml(anime.title);

        let formatBadge = "";

        if (
            anime.title.includes("(OVA")
        ) {
            formatBadge =
                `<span class="badge" ` +
                `style="background:#0284c7;">` +
                `OVA</span>`;
        } else if (
            anime.title.includes("(特別篇")
        ) {
            formatBadge =
                `<span class="badge" ` +
                `style="background:#f59e0b;">` +
                `特別篇</span>`;
        } else if (
            anime.title.includes("(劇場版")
        ) {
            formatBadge =
                `<span class="badge" ` +
                `style="background:#e11d48;">` +
                `劇場版</span>`;
        } else if (
            anime.title.includes("(ONA外傳")
        ) {
            formatBadge =
                `<span class="badge" ` +
                `style="background:#7c3aed;">` +
                `外傳</span>`;
        } else if (
            anime.title.includes("(續篇")
        ) {
            formatBadge =
                `<span class="badge" ` +
                `style="background:#4b5563;">` +
                `續篇</span>`;
        }

        let actionButtons = "";

        if (
            anime.category === "watching" ||
            anime.category === "backlog"
        ) {
            actionButtons = `
                <button
                    onclick="updateProgress(${anime.id}, 1)"
                >
                    ➕ 看了 1 集
                </button>

                <button
                    class="btn-next"
                    onclick="moveCategory(${anime.id}, 'completed')"
                >
                    🎉 追完
                </button>
            `;
        } else if (
            anime.category === "review"
        ) {
            actionButtons = `
                <button
                    onclick="updateProgress(${anime.id}, 1)"
                >
                    ➕ 複習 1 集
                </button>

                <button
                    class="btn-next"
                    onclick="moveCategory(${anime.id}, 'completed')"
                >
                    🎉 複習完
                </button>
            `;
        } else if (
            anime.category === "waiting"
        ) {
            actionButtons = `
                <div
                    style="
                        font-size: 11px;
                        color: #94a3b8;
                        padding: 6px;
                    "
                >
                    🛰️ 智慧監測開播中...
                </div>
            `;
        } else if (
            anime.category === "completed"
        ) {
            actionButtons = `
                <button
                    onclick="moveCategory(${anime.id}, 'watching')"
                >
                    🔄 重看
                </button>

                <button
                    class="btn-review"
                    onclick="moveCategory(${anime.id}, 'review')"
                >
                    🧠 複習
                </button>
            `;
        }

        let metaText = "";

        if (
            anime.category === "watching" ||
            anime.category === "backlog"
        ) {
            metaText =
                `進度：${anime.watched} / ` +
                `${escapeHtml(String(anime.episodes))} 集`;
        } else if (
            anime.category === "review"
        ) {
            metaText =
                `🧠 已複習 ${anime.watched} / ` +
                `${escapeHtml(String(anime.episodes))} 集`;
        } else if (
            anime.category === "waiting"
        ) {
            metaText =
                `預計開播：` +
                `<span ` +
                `style="color:#f59e0b;font-weight:bold;">` +
                `${escapeHtml(anime.airDate)}` +
                `</span>`;
        } else {
            metaText =
                `✨ 全 ` +
                `${escapeHtml(String(anime.episodes))} ` +
                `集觀看完畢`;
        }

        return `
            <div class="anime-item">

                <div class="anime-title">
                    ${formatBadge}
                    <span>${safeTitle}</span>
                </div>

                <div class="anime-meta">
                    ${metaText}
                </div>

                <div class="btn-group">

                    ${actionButtons}

                    <button
                        class="btn-edit"
                        onclick="editTitle(${anime.id})"
                    >
                        ✏️ 改名
                    </button>

                    <button
                        class="btn-del"
                        onclick="deleteAnime(${anime.id})"
                    >
                        🗑️ 刪除
                    </button>

                </div>

            </div>
        `;
    }


    /*
     * ==========================================
     * 畫面更新
     * ==========================================
     */

    function renderList() {
        const openGroups =
            new Set();

        document
            .querySelectorAll(
                "details.series-group[open]"
            )
            .forEach(detail => {
                openGroups.add(
                    detail.getAttribute(
                        "data-groupkey"
                    )
                );
            });

        const categories = {
            watching: [],
            backlog: [],
            review: [],
            waiting: [],
            completed: []
        };

        const sectionHtml = {
            watching: "",
            backlog: "",
            review: "",
            waiting: "",
            completed: ""
        };

        if (!Array.isArray(animeList)) {
            animeList = [];
        }

        animeList.forEach(anime => {
            if (
                anime &&
                categories[anime.category] !== undefined
            ) {
                categories[anime.category].push(anime);
            }
        });

        for (const categoryName in categories) {
            const itemsInCategory =
                categories[categoryName];

            const seriesMap = {};

            itemsInCategory.forEach(anime => {
                const core =
                    getCoreTitle(anime.title) ||
                    anime.title;

                if (!seriesMap[core]) {
                    seriesMap[core] = [];
                }

                seriesMap[core].push(anime);
            });

            for (const core in seriesMap) {
                const subItems =
                    seriesMap[core];

                const groupKey =
                    `${categoryName}_${core}`;

                if (subItems.length === 1) {
                    sectionHtml[categoryName] +=
                        buildSingleAnimeItemHtml(
                            subItems[0]
                        );

                    continue;
                }

                const innerContentHtml =
                    subItems
                        .map(anime =>
                            buildSingleAnimeItemHtml(
                                anime
                            )
                        )
                        .join("");

                const keepOpen =
                    openGroups.has(groupKey)
                        ? "open"
                        : "";

                sectionHtml[categoryName] += `
                    <details
                        class="series-group"
                        data-groupkey="${escapeHtmlAttribute(groupKey)}"
                        ${keepOpen}
                    >

                        <summary class="series-summary">
                            <span>
                                📦 ${escapeHtml(core)}

                                <small
                                    style="
                                        color: #94a3b8;
                                        font-weight: normal;
                                        margin-left: 6px;
                                    "
                                >
                                    共 ${subItems.length} 部
                                </small>
                            </span>
                        </summary>

                        <div class="series-content">
                            ${innerContentHtml}
                        </div>

                    </details>
                `;
            }
        }

        document.getElementById(
            "list-watching"
        ).innerHTML =
            sectionHtml.watching ||
            emptyMessage("暫無連載中動漫");

        document.getElementById(
            "list-backlog"
        ).innerHTML =
            sectionHtml.backlog ||
            emptyMessage("暫無補番中動漫");

        document.getElementById(
            "list-review"
        ).innerHTML =
            sectionHtml.review ||
            emptyMessage("目前空空如也");

        document.getElementById(
            "list-waiting"
        ).innerHTML =
            sectionHtml.waiting ||
            emptyMessage("暫無敲碗中動漫");

        document.getElementById(
            "list-completed"
        ).innerHTML =
            sectionHtml.completed ||
            emptyMessage("暫無已追完動漫");
    }

    function emptyMessage(message) {
        return `
            <div class="empty-message">
                ${escapeHtml(message)}
            </div>
        `;
    }


    /*
     * ==========================================
     * 匯入與匯出
     * ==========================================
     */

    function exportData() {
        if (animeList.length === 0) {
            showToast(
                "⚠️ 目前沒有資料可以匯出。"
            );

            return;
        }

        try {
            const jsonText =
                JSON.stringify(
                    animeList,
                    null,
                    2
                );

            const blob =
                new Blob(
                    [jsonText],
                    {
                        type:
                            "application/json;charset=utf-8"
                    }
                );

            const url =
                URL.createObjectURL(blob);

            const downloadLink =
                document.createElement("a");

            const dateText =
                new Date()
                    .toISOString()
                    .slice(0, 10);

            downloadLink.href = url;

            downloadLink.download =
                `anime_backup_${dateText}.json`;

            document.body.appendChild(
                downloadLink
            );

            downloadLink.click();
            downloadLink.remove();

            URL.revokeObjectURL(url);

            showToast(
                "📤 動漫資料已成功匯出！"
            );
        } catch (error) {
            console.error(
                "匯出失敗：",
                error
            );

            showToast(
                "❌ 資料匯出失敗。"
            );
        }
    }

    function importData(event) {
        const file =
            event.target.files[0];

        if (!file) {
            return;
        }

        const reader =
            new FileReader();

        reader.onload = function(loadEvent) {
            try {
                const importedData =
                    JSON.parse(
                        loadEvent.target.result
                    );

                if (!Array.isArray(importedData)) {
                    throw new Error(
                        "檔案內容不是動漫清單"
                    );
                }

                const confirmed =
                    confirm(
                        "匯入後會覆蓋目前清單，確定要繼續嗎？"
                    );

                if (!confirmed) {
                    event.target.value = "";
                    return;
                }

                animeList =
                    importedData;

                normalizeAnimeList();
                saveAndRender();

                showToast(
                    `📥 匯入成功！共還原 ` +
                    `<b style="color:#22c55e;">` +
                    `${animeList.length}` +
                    `</b> 部作品。`,
                    5000
                );
            } catch (error) {
                console.error(
                    "匯入失敗：",
                    error
                );

                showToast(
                    "❌ 匯入失敗，請確認選擇的是正確的動漫備份 JSON 檔案。",
                    5000
                );
            } finally {
                event.target.value = "";
            }
        };

        reader.onerror = function() {
            showToast(
                "❌ 無法讀取這個檔案。"
            );

            event.target.value = "";
        };

        reader.readAsText(file);
    }


    /*
     * ==========================================
     * 安全與通用工具
     * ==========================================
     */

    function delay(milliseconds) {
        return new Promise(resolve => {
            setTimeout(
                resolve,
                milliseconds
            );
        });
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function escapeHtmlAttribute(value) {
        return escapeHtml(value)
            .replaceAll("`", "&#096;");
    }


    /*
     * ==========================================
     * 鍵盤操作
     * ==========================================
     */

    document
        .getElementById("search-input")
        .addEventListener(
            "keydown",
            event => {
                if (
                    event.key === "Enter" &&
                    !searchBtn.disabled
                ) {
                    event.preventDefault();
                    searchAnime();
                }
            }
        );


    /*
     * ==========================================
     * 首次顯示
     * ==========================================
     */

    renderList();
</script>

</body>
</html>
